front:
  text: 廣成集卷之十四毀二
  hash: sha256:9b128f47dbe0be97c6167f62b9ccca276f5b5f494a1d3c10dc146bcdc6b592b7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0321_HFL_014-001a, image: hfl/0339/0339-030.png}
body:
  text: 上都太清宫内供奉應制文章大德賜紫杜光庭進皇帝醮仙居山詞伏以聖主明王必臻符瑞膺圖受籙爰著謳歌旣居億兆之尊遂忝帝王之命洎臨大寳將及六年教化未泰於生靈華裔尚乖於正朔兢兢業業罔敢遑寧慮刑法之不均恐賞罰之非當屯兵絡野念富庶之未臻暴骨盈川固殺傷之不一每思首謝用贖愆尤敢言圖䜟之文併屬庸虚之士今年七月八日漢州什邡縣百姓郭迥芝於仙居觀採藥掘地得銅牌長七寸廣四寸上有六十字云老子通天記云丁卯年甲戌乙亥王生享二百年天子王從建王元膺王萬感王岳王則王道宜五字篆文未詳後云洛州北邙化章弘道天寳年留此明後聖代顧惟薄德遽捧殊祥云暦數之延長紀子孫之次第佩服玄貺益用兢慙敢罄深衷專申醮謝伏冀畢朝福地總召名山各駕仙車共歆丹懇示安社稷咸泰人民致風雨之不愆俾干戈之載戢繄頼靈貺深寘于懷不任皇帝修靈符報恩醮詞伏聞惟天降祐彰瑞於河圖洛書惟帝法天受命而膺符執契古今所禀暦數迭興臣運偶玄休德慙寡昧承土德陵夷之後億兆無依叶金莖啓創之初寰瀛推戴恭膺天寳于兹六年常以未明求衣日旰忘食兢兢業業上奉穹旻今則銅版靈文出於古觀示太上降祥之兆應承乾受命之徴名姓具彰年辰畢載斯乃豫定於九天之上先期於億歳之前秘篆昭宣眞文煥赫告延洪於寳祚表遐永於孫謀省已循懷以兢以懼欽惟靈睠彌切勵修是用虔肅寳齋依歸至道庶諧多福永庇萬方不任聖上於葛仙本命化醮詞伏以景列上玄山分下土乾坤交應罪福攸司緬彼靈蹤鎮于天府藏雲噴雨旁資生化之功玉洞瓊巖深閟神仙之宅果叶殊休之運爰膺開國之祥惟此命辰配兹眞境契清明之嘉候耀大火之靈光當人天禱福之期是鸞鶴上賔之日式陳醮祝用達精誠坐宣室以馳心望白雲而稽首所冀旁流景貺幽賛鴻圖羣生共樂於和平萬國必同於書軌永言修奉以答玄功不任皇帝又醮葛仙化詞伏以列宿麗天羣山鎮地爰通氣象以福邦家每申望秩之儀必介惟新之祐皇帝承天啓暦應運執符本命之山實惟兹化洞舎雲雨峯戞煙霞必有光靈潜弘讃祐況當令序式備醮祈翹首歸心恭希景貺伏惟諸天上聖俯鑒明誠三眞衆仙同流巨渥使帝圖延永社稷隂昌二十四峯克膺於聖壽百千萬歳長固於皇基四海九州咸賔睿化五兵戢息百穀豐穰俱登仁壽之郷並契正眞之道不任威儀道衆玉華殿謝土地醮詞伏聞三境九清林房日闕凝雲結氣宅聖棲眞因法象於上天授規模於下土觀宇之製其在兹乎所以進退全和必資嚴潔朝元降福固在清虚況乎仙跡靈壇所務蠲邪蕩穢用期安靜以契修焚當觀鳯闕乾崗龜城福地肇興隋運綿歴唐年呈祥則瑞露凝甘發地則香泉涌浪累彰禎異煥彼簡編碑鏤天章額題御筆崇樓戞漢玉殿參雲披文則劉美才盧照鄰金王相宣闡教則黎元興蔡守沖英竒間出昭灼蕃盛垂二百年偶以蠻蜑憑凌王師禦捍撤我層閤壤我循廊庭荒而緑草欺人樓碎而洪鍾委地或贍軍之日彤階爲著宰之場或屯旅之時繡檻爲狴牢之所腥羶溢鼻䙝瀆傷神寂寂虚壇乆息吟玄之韻蕭蕭古牖空餘擁座之塵肹蠁不虧光靈有待我皇帝承天啓祚縱聖康時駕豪傑而濟横流攬英雄而拯危運超羲掩皡邁舜逾堯屬念重玄凝情大教以爲清靜者理人之要無爲者成化之源三皇則務道爲先五帝則弘德爲本爰敷渥澤載葺凋零浹旬而碧嶂層分不日而飛軒四合瓊舒御殿將嚴當宇之容嶽立驎臺即寫扶天之貌香花芬馥繕飾周圎徒榮廕祐之恩未展醮祈之禮言念于此憂心惄然又自去載以來繼有危懼講堂摧圮道侣淪亡慮虧昭謝之儀是獲眞靈之譴敢虔衆懇恭啓福筵伏惟大聖貽休元尊降鑒錫殊祥於金運増福壽於聖躬一統寰區大同文軌五兵韜戢百榖豐登咸承不宰之功共樂太平之化道衆等同臻景貺各沐玄慈法教隆昌龍神和豫旁資幽顯普及生靈克遂逍遥盡蒙禎泰徃逝者生神丹霍見居者耀籍青元法界含生光承道廕犯觸之咎俱乞銷平臣等不任御史中丞劉滉九曜醮詞伏以太上玄元陶融萬化五老上帝統御羣生九曜宣照燭之光三官主賞刑之籍共司品彚以播玄功由是北臺陳校勘之科南府示奬延之籙蓋欲使人倫之内知懲勸之方各勵精修用寡尤悔有過者可期於懴滌有災者可至於祈禳廣此洪私大彰神化眞經奥典幽顯蒙恩臣猥以塵凡早崇至道棲心稽首常依清靜之門世網俗纒莫遂逍遥之願乆嬰微恙猶未痊除近屬傷寒尤増羸瘵值大運小運與生日相刑土星火星照行年之位天符飛旗臨本宫之上飛天火曜居今歳之中支命納音氣皆衰薄以兹厄㑹倍切兢憂是敢虔罄丹誠叩祈玄聖恭修醮禮披瀝上聞伏惟大道弘慈至眞下濟垂好生之澤降罔極之恩賜臣以罪咎原除𡨚仇和釋災凶銷解疾疹瘳痊續將盡之年齡鍚惟新之禄祚息幽隂之債訟絶徃世之考延六氣内調衆邪摧殄得勵爲臣之節永奉昌期誓勤修道之心常弘大教不任先鋒王承璲爲祖母九曜醮詞伏以列曜五行是司罪福上棟下宇亦有主張於成生孕育之間寧無凶吉在應護居棲之内必有愆瑕須慿道力玄功以解深災重過元皇立教三洞垂文敢按經科虔祈福祐臣祖母代國太夫人某氏年八十歳本命乙卯三月十三日戊午生今以土火二曜居三合之方天符飛旗衝大運之上五土尅於子水仍臨生日之辰以此刑妨因成微恙兢憂戰越罔敢自安伏念臣叨奉聖時獲承福緒而早悲孤藐繼履家艱惟祖母慈顔得晨夕侍奉刳心瀝懇願祝遐年今則所疾癭仍災𨇠臨照竊恐居宅之所或有犯違積世以來或有𡨚債或徃逝有考延之舋或幽隂有訟逮之文搆此衰危盡希懴解是用選求吉日恭備醮壇伏惟大道垂光衆尊憫鑒爲臣祖母某氏解鎮災咎延續年齡増生禄於南宫落罪名於北府疾瘵除蕩腠理和調神藥潜資靈官宻衞克蒙平愈永賜安貞洎乎宅宇之中常諧吉祐龍神鎮守邪惡銷亡唯冀勵修上答玄造不任蜀王青城山祈雨醮詞伏以五嶽上司總眞粤府雄稱天國峻極仙都鎮厚地以巍峩捧太穹而峭㧞眞靈所㑹水陸攸尊敷惠育於羣方廣包容於三蜀陽崖蕩日隂壑藏雲讃時則表貺垂禎叶聖則呈祥薦瑞古今宗仰遐邇依慿臣叨荷聖慈鎮臨重地兼梓遂黔巫之境亘微瀘蠻蜑之封位極台衡任崇將相毎慮功輕恩厚福過災生循分兢榮拊心憂惕自青春届序甘雨愆期農畆虧功驕陽害物雖歴申祭祀遍告神明宻雲但布於西郊膏雨未霑於南畆皇皇衆庶叩向無門竊惟大道垂文天師演教有章奏之品有祈醮之科將展焚修須依靈勝是用披心雲洞拜手仙峯佇眞侣之感通冀明誠之御達賜臣以時和歳稔拯臣以雨順風調驅肥遺於窮荒舞商羊於中境巖蠻曹屬鼓列以舒威洞府龍神震靈霳而助化消除虗魃蘇息枯苖克歆黍稷之馨允洽京坻之望臣當怳心求理勠力徇公上答靈慈求承道祐謹差尤都押衙檢校尚書右僕射前黎州剌史曹嶽與左右街弘教大師賜紫杜光庭虔誠章醮歸命希恩不任蜀王葛仙化祈雨醮詞伏以四七在天垂文定位三八鎮地設象分靈列宿所以統幽明諸化所以司罪福况心宿爲天皇之府上清乃神仙之都逈控長川倚玉輪之聳秀雄臨巨屏面銅馬之膏腴緬彼福庭廣廕庸蜀臣本命所係獲在兹山而謬握珪符仍居仙域每慮位崇任重力寡才輕超五爵以䟽封制六鎮而爲政或賞刑乖當或撫字失和下有怨咨上虧仁育兢憂未暇咎戾旋加粤自仲春即愆時雨塵侵壠畆赫日騰威風鑠郊原油雲匿影生靈歎息懼失於農功沼沚魚喁將懸於枯肆焦勞在念叩啓無由至於餚膳精豐備陳於廟貌牲牢肥腯無恡於禱祈徒罄誠心靡聞響答仰惟神仙濟物罔間幽明大道好生普均慈施太上著修禳之品三天開奏醮之科恭望神峯逺傾凡懇虔申大醮仰叩至眞伏惟憫鑒所陳大私恩宥赦其愆咎賜以福祥使雷電揚威龍神恱豫霈霑渥澤克致豐穰南山騰虺虺之音東作盛芃芃之稼永諧望歳允契有年誓勤修奉之儀上副眞靈之貺不任什邡令趙郁周天醮詞伏以天地分靈統之者至聖隂陽不測體之者至神主宰死生司明罪福有祈必應無感不通臣謬以非才理兹劇邑賦輿所總徴督所難郷里凋荒緝綏尤切洗心求瘼克巳徇公果蒙道力潜資眞靈宻助徴科辦集境土乂安疫毒不侵生靈以泰思酬玄造衆竭丹誠共崇黄籙之壇虔備焚修之㑹兼申大醮上答靈恩况境接仙山人懷道化李相國之神功宛在羅眞人之聖力時彰控諸觀之福庭摽二化之眞府必垂昭鑒納此誠祈伏惟太上延慈衆神孚祐普資幽顯遐及存亡俱錫福祥咸蒙濟祐使一方清謐百穀滋豐疫癘兵戈永無侵軼飛沈蠢動各遂安全臣等九祖七玄生天受福三途九夜離苦㕘眞然乞災厄蠲銷罪尤除蕩潜増禄祚克保年齡同力運心俱霑巨祐不任嘉州王㒒射五符鎮宅詞伏聞大道開光五篇垂教凝自然之氣成空洞之丈上正天元下安地紀中制劫運旁福生靈三界所宗萬神所禀其或葺修之地土木興功暗犯神靈明干禁忌皆慿秘篆以鎮方隅臣頃以所居須資揆搆巨功旣畢輙備焚修啓黄籙之壇場廣申懴㧞展五符之醮酌遍用鎮安伏冀太上弘慈至眞流鑒使龍神寧謐災咎蠲銷永無干犯之虞常荷乂安之福其有從來主宰五姓神靈各遂徃生並獲開度即仰荷大道罔極之恩不任張相公九曜醮詞伏聞大道凝光上玄垂象照臨九土覆育群生主緑吉凶司明罪福洪纎備察毫末無遺而金簡垂丈玉書演法開懴祈之路懸悔謝之儀虔罄明誠必賜昭祐臣某顧惟虚薄運契遭逢位極台衡務專繁劇詳評獄訟裁制典刑或爽重輕慮招咎舋或操心屬念偶結尤違或積世此生未祛𡨚債靜言循度毎用兢憂今則迍滯宫中土星所歴身位之内計都所臨神首火星仍居對照生月命位俱值天符以此災𨇠遂成災厄捫心震惕瀝懇歸依仰玄象以扣祈竭丹誠而醮酌伏惟至眞上聖列矅髙尊憫鑒塵凡降流恩宥釋前𡨚徃債原重過深瑕増績年齡銷平災厄賜臣以百關調豫六氣和平盡解凶衰全除疾苦推忠効節永酬睿主之恩潔已凝心上副尊靈之祐不任衆修三元醮詞太上無極大道元始天尊太上大道君太上老君十方自然靈寳天尊五老上帝三元君天地水三官三十六部尊經玄中大法師太極眞人三天法師天曹地府三界眞靈三官曹府一切玄司臣等塵世凡微積生福㑹得遇玄化㕘奉至眞而跡處人寰身拘俗網沈浮聲利流浪死生未窮超㧞之源徒慕清虚之旨六情三業動結罪條隂簡黑書旋増舋咎或前𡨚徃債尚繫㝠關故殺誤傷未申懴露或五行三命災運所臨暗曜明星凶神所犯常情靡測祈謝無由三元有考定之期五帝無陟明之典至或九玄七祖猶滯三途注訟相延愆過委積福盡禍至首悔何門因今某官校録之辰衆申祈醮之禮願廻玄鑒俯察丹誠介福垂恩延生保命九玄開度除右簡之罪名衆厄清銷上左宫之生録永蒙道廕常荷鴻休上願帝祚延洪天元玄晏生靈和泰逺近乂安九稼惟豐五兵自偃九幽六趣罪爽窮魂俱承曠蕩之恩各遂逍遥之性不任歸命虔誠懴請之至謹詞王宗瑑等下㑹醮六甲籙詞臣等早以庸虚志希玄奥凝心妙道歸命眞乗參六甲之祕文慕長生之要旨而寄身名宦莫遂精修三元四始之辰香燈或闕五臘六陽之㑹存注莫專恐兼故殺誤傷仍有前𡨚徃債或行年厄運或宿曜災期曽未懴陳但増憂惕敢以下㑹吉日醮籙希恩伏冀五帝髙尊降流禎福六甲眞吏洗滌罪瑕上生籍於天曹削死名於地簡舉家蒙祐七祖生天禄筭増延公私貞泰永勤焚炷以答玄慈不任三㑹爲弟子醮詞臣以庸微負荷大法敷弘眞訓開度天人授道傳經濟時行化弟子某等夙慕大道歸命至眞奉信玄科參受符籙傳付之後巳歴歳年或慮未受道之前及佩籙之後立身注意動有罪條三業十𨇠恣其愆過三元八節朝謁不專本命庚申修行有闕或噉食葷血穢亂正眞或嗜欲繁華負違禁戒非慿三㑹難遍懴祈今因某㑹之辰考校之節同申大醮拜章言功謝罪十天歸誠三寳並乞宿殃清蕩衆罪蠲除善簿定名生宫列籍𡨚仇和解債訟夷平眞氣内充百關恱豫靈官外護萬惡銷沈五行三命之中暗曜明星之内永無臨照長息災凶九祖生天六親蒙福公私貞吉動靜康宜年命増延福祚遐廣誓令修勵上答玄恩不任廣成集卷之十四
