front:
  text: 廣成集卷之十七毀五
  hash: sha256:34e14f9aff0834b804d6a3ffa11406f204c7669a34294849c592d370cf94cfc4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0321_HFL_017-001a, image: hfl/0339/0339-104.png}
body:
  text: 二都太清宫內供奉應制文章大德賜紫杜光虔進宣醮鶴鳴枯柏再生醮詞惟彼仙山奠兹南土雄盤厚地秀拱穹旻控綿洛之川原總岷峨之形勝巖巒捧日洞府棲真連空之松檜扶踈千載之威靈肅穆果聞祥異顯此福庭垂至陽生化之功變枯柏凋摧之質柔條逈茂灑瑞露以飄香密葉重榮動晴風而裊翠神仙幽贊宗社福招叶此玄休永兹禎貺是用精嚴醮祝仰答真靈凝心宣室之中翹想雲峯之外所冀華夷昭泰海嶽晏安稼穡滋豐氛埃蕩定永期祗奉以副玄私稽首謹詞李忠順司徒拜保護章詞臣聞道用無方神功不測隨機應念惟感必通正一垂文傳寶章而拯物盟威立訓陳醮品以濟民粵自古先逮于兹日惠覃顯晦澤普天人臣某夙荷玄慈獲逢聖日天波浩蕩人爵優弘慙無經濟之能深盧寵勞之極況居司戎伍出鎮魚符或賞酬乖善惡之宜刑律有重輕之失俗懷咨怨民抱傷嗟有一於斯式彰譴咎又恐五行三命運值災蒙暗曜明星或當臨照或經過水陸侵觸龍神或土木興修犯于禁忌或前寃往債或故殺誤傷動結罪條兼逢厄會致成疾恙彌切兢憂竊惟大道好生至真設教著祈禳之典開懴謝之門是敢虔備壇場精修章醮拜天悔過瀝懇希恩伏惟三境髙尊諸天大聖降流慈施憫鑒塵微勑天府地司遍隂曹陽境解消災厄原赦罪尤削落凶衰和平寃債蠲除疾苦安鎮魂神六氯均調百關宣暢易短促之數賜延永之齡萬罪千災咸遂超度誓虔修勵仰奉真靈臣某不任謝罪祈恩披心請命之至謹詞東院司徒郡夫人某氏醮詞伏聞大道垂科玄真設教正一有祈恩之品河圖有謝過之文虔告尊靈必賜昭鑒某氏以夙叨靈貺擢質人寰祗荷恩庥常深戒懼近者忽嬰疾恙未獲痊乎竊恐履行立身措情屬念有違誤之過有抵觸之非或結舋流殃有所延注或明星暗曜有所照臨搆此災纒未蒙消解旦夕憂懼罔敢遑寧又以身宫之中當土曜行度命當危迫誠切告祈是敢遵按明科虔修大醮伏惟三寶上聖九曜尊神垂罔極之慈降護持之力賜某氏解消災厄和釋𡨚仇延續年齡增加祚祿使百疾痊愈六氣均調蕩滌凶衰蠲除罪咎永期修奉上答玄恩不任謝罪祈真虔誠請命激切之至謹詞東院司徒冀公醮天羅詞臣聞賦祿稟形資於道化延生保命繄彼神功至有三命興衰五行代謝星𨇠經歷卦象吉凶苟逢厄會之期必示修禳之旨是則玄真愍俗大道好生垂法濟人有感斯應三天正一寶章宣致福之儀太玄河圖醮品啓移災之旨古今遵奉拯護尤多臣叨荷靈休躬逢昭代恩榮隆異名分超逾拊巳循懷每切器盈之戒誓心勠力常思福過之虞今則大運猶住戌鄉小運仍當亥位今年之內併值天羅竊慮舉念屬心率成舋咎積生往世宿有愆瑕雖切秉修寧無違誤又暗曜行於辰分火星在於身宫況寵極才微功輕位重恐貽災滯深積兢憂是敢故按玄經肅恭丹懇精修醮禮拜奏章文謝過九天祈恩衆聖伏冀真靈鑒省渥澤滂流詔天境地司勑陽官隂府赦罪尤於既往蕩衰沴於將來消宿曜之災解天羅之厄豐延祚祿增益年齡得虔忠孝之誠永贊聖明之化誓勤砥礪上副玄慈不任歸命之至田崇謙盧昭又受六甲籙詞伏以至化將行玄丈肇著五千垂教六甲開圖首於虞舜之朝傳自姬周之代修於內則凝真反一駕日月而躡煙霄行於外則保國寧民康品彚而豐萬宇為法之本歷代所尊臣等獲賴玄符況逢皇運真風廣被妙旨遐宣願遂參修永期遵守允當嘉節虔露明誠伏惟元聖融慈衆真流鑒成其懇願降以威光使存注感通功行圓就九玄開度積過蠲消福善攸臻壽年增益濟人佐國弘道宣經永揚清靜之風克果希夷之道不任歸命之至謹詞范延煦等受正一籙詞伏以正一南宫紫陽玉殿祕陽華之真籙緘飛化之靈圖下可以制禦凶妖宣和氣序上可以輯寧區宇朝會神仙保國安人古今攸毀五四稟臣獲逢聖日咸沐道風早振氛囂俱棲羽褐願期參受克勵焚修伏惟衆聖弘慈俾諧宗尚衣星履斗契九天飛步之蹤佐世立功成大道化時之效炷香拜手歸命祈真翹望玄恩不任激切之至謹詞王讜修醮拜章詞伏聞河圖寶典垂醮品以濟人正一明科顯章文而助化俱宣道要廣福生靈臣獲奉玄門叨參祕籙而焚修每闕過咎旋彰主務在公動多悔吝或詳評獄訟賞刑有爽於重輕訓撫師徒沮勸有虧於申令捫心省巳夙夜增憂非伏玄功無門懴謝又五月之末土火將入於身宫以此憂惶志希禳救今則精嚴信幣求乞章文伏惟太上衆尊三天化主垂大慈之澤降罔極之恩命天官吏兵依職祐護賜臣罪瑕除蕩寃債和平九曜回臨照之災三命息刑衝之厄克獲貞吉常遂亨通誓虔焚炷之誠上答尊靈之祐不任刁子宗勉太尉謁靈池朱真人洞詞伏聞生成妙道弘大教以度人不宰玄功布慈風而及物隨迎靡滯極護無遺由是青簡丹篇繼著登真之品幽關夜府亦該錬化之仁薪火傳明古今攸普某身逢景運名造真乘每虔焚祝之心潛希道力冀啓延洪之福上答君恩期靈常勵於丹襟屬念早參於玄籙翹勤徒切景仰何階伏惟仙君道逸𡨋鴻壽逾遼鶴指三山而髙舉莫認雲程越纍歲而暫歸想悲塵世某慙盧敖之未迹瞻若士之遐蹤瀝懇齋心燃香拜手佇回真鑒俯沃玄波俾於修學之中少達希微之趣推誠律已永酬君父之慈見素全真願奉神仙之躅不任大傅相公修黑符醮詞伏聞至道垂科正一啓醮祈之品河圖著訓太玄開懴謝之門蓋所以拯護人倫恢弘法力恩庥廣被今古攸宗臣運偶昌期叨膺重寄雖竭誠而報國未效涓埃懼福過以災隨因罹疾疹今則黑符飛化五入中宫本祿納音為災尤重是敢𡨋心玄極稽首清壇恭備香燈虔申醮祝伏惟玄元降鑒五帝宣慈勑九宫貴神命三官曹屬解消厄運和釋𡨚仇蕩滌罪瑕增延祿算使百關調豫久疾痊平誓傾忠孝之心冀啓聖明之澤永遵妙道仰副玄慈不任洋州令公宗夔宅陳國夫人某氏拜章設九曜詞伏聞天地萬靈隂陽庶品資元和而覆育稟道氣以生成三命五行是定吉凶之數南宫北府爰司罪福之文善惡無遺錙銖不爽況復三元遷易九曜𨇠移示謫逄祥影隨響答得不兢懷悚惕祗敬真靈某氏以土火二星行於午地既當命位仍在身宫小運丑中況為六害大運戌上又值墓鄉大運則午命稍衰小運則王祿初薄以兹憂懼恐履災期是敢精勵丹誠歸依玄象遵拜章之典式稽首三天備祈醮之物儀馳心九曜伏惟至真憫祐衆聖垂恩赦往歲之罪瑕解積生之𡨚債消平災厄拯度凶衰延益壽年增加祿祚克蒙覆護常賜安貞永奉靈真誓勤修敬不任歸命虔祈之至洋州令公宗夔生曰南斗醮詞伏聞列曜凝光麗天垂象南昌上府生籙是司致福流祥潛資邦國河圖祕戒式明瞻敬之文正一靈科亦備存修之旨敢披玄訓虔罄素誠臣夙荷洪休躬逢景運便蕃寵澤踐歷恩榮無濟時匡國之功叨相印兵符之重循懷震惕難酬造化之私誓志恪恭冀答君親之德但勤砥礪敢怠初終是以輒就生辰精修醮禮仰丹臺而稽首望玄極而𡨋心靈炷騰煙期逹九清之上良宵效懇願通六聖之前賜臣災滯蠲消𡨚仇和釋增加祚祿延益年齡赦巳往之過尤介將來之禎福元玄升度舉族康寧誓嚴尊奉之誠永副真靈之祐不任歸命虔祈之至青城山文人殿功曅安土地醮詞伏聞混元既判融結分形惟彼岷山廣吞西徼壓二江而作鎮冠五嶽以居尊窟宅神仙含藏洞府層峯疊巘捧日月於雲間積翠堆嵐隔塵埃於人世闢天國而真靈雜集廓成都而芝术駢羅是曰福庭統兹形勝希夷真君道成上古名重髙真軒帝南巡賞展師資之禮明皇西幸仍加崇飾之功敞豐祠於炎漢之年旌懿號於中和之日每彰休應丕祐寰區頃者躬拂煙蘿仰瞻羽衛睟容在目寤寐寧忘近以闕闥層楹風凋雨漬歲華暗貿頽朽可虞爰命慧進大師行真度木鳩工成兹大壯飛甍耀景碧霤排空四垣之圖像如新重檻之階陛不攺爰復正寢永播玄休俾天地山川神明職秩常加禎貺大庇蒸黎鷙暴不侵沴瘥無作稼穡蕃稔風雨以時旻穹觀壁合殊連夷夏覩文修武偃邊烽靜息妖孽殱平車書佇混於萬方正朔期同於九有生靈蒙福宗社永昌式勤蘋藻之儀常奉馨香之薦遣廣成先生杜光庭虔修大醮昭謝真靈遐望雲軒仰希玄鑒謹詞宣再往青城安復真靈醮詞蓋聞天設神墟地開仙府真靈是宅幽顯攸尊握羣嶽之紀綱司萬方之休否雲峯霞觀歷代所崇垂貺庇人古今受賜頃者以遠披蘿薜躬造軒庭仰堂宇之威容覩四垣之儀衛光靈如在翹屬常深遂命圖繪神姿鋪舒內殿朝燃玉穗夕備銀釭禱祈蓋切於生民注念非關於祕祝欽惟不昧必鑒斯誠今則山觀之中巳加興葺鼎新殿宇别命焚修既無葷雜之虞益有清嚴之致是用特申醮禮精具告陳謁請真靈復還仙觀霓幢鶴轡優遊松月之鄉蕙郁蘭芬瀟灑虛無之路永安真域丕祐邦家自兹寰海之民常徯厖洪之福不任祝望之至謹詞廣成集卷之十七
