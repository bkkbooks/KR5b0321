body:
  text: 上都太清宫內供奉應制文章大德賜紫杜光庭撰上元玉局化衆修黃籙齊詞伏聞道出虛無之表職在生成德超仁義之先功包慈育化綿億劫教普群方由是三呈以道御乾坤五帝以德承天地人臻福壽俗致雍熙雖金木運遷步驟時革理家康國惟道為先行之則四海晏清代還淳朴違之則中原版蕩物變澆漓我國家師太古之風紹玄元之訓懷道抱德祖舜述堯故能縱神武以滌埃氛中興鳯曆光聖文而安社稷克固鴻圖臣等夙荷道慈獲逢昭運微功未著寵澤已深思䖍齊潔之誠仰報君親之德今屬天官統序木帝司方當上元校戎之期是下土精修之節共賫法信同詣靈壇備玉籩金豆之儀陳十極四華之禮蓮釭散熖續陽景以燭幽關蘭炷飄煙御星𨇠而逹卑懇必冀衆真迂駕萬聖回軒俯鑒群心洪流巨福上扶宸極安帝業以天長仰奉廟謀鎮坤維而地久邊烽不警氣序式和榖稼滋豐生靈舒泰寰瀛輯睦車軌混同妖沴不興禎祥荐委臣等存亡介福七祖生天族屬沾榮三災弭息或前生今世罪網未祛或往債宿𡨚過尤未解或刑章有失或宰割不明或故殺誤傷因成報對或運心履行有犯神明或土木奢華服用繁侈三官紀過五帝司非憑此懴祈皆希洗蕩賜臣等壽齡延永祿祚遐長災厄蠲消𡨚讎和釋其有同心事主戮力勤王風露先驚古今俄隔緬惟夜府願享福緣爰伸濟拔之因俱遂超升之路其次蒸嘗曠絶冥漠無依亦俾往生勿為淪滯龍神正祑五廟靈司乘黃籙之殊恩沐玄都之景貺肅清風景安鎮方隅疫毒無侵干戈不作蛸翹異品動植殊形六趣四生三途五苦九龍符命三寶威光普沐神功並登真道白可球明真齊讃老君詞伏聞道本至無化分妙有功包覆燾恩普幽明家國禀之以安寧存亡得之以開濟神威靈澤妙用無窮臣以玉局洞天神仙奧府將申瞻敬式表宸儀遂為玄祖幽扃塑造真像睟容端穆侍衛駢羅疑珠宫下降之初若玉座浮空之際巨功既就妙相益嚴日角月玄煥矣群生之主緑眉皓髮巍乎萬聖之尊永福一方以鎮靈化是用䖍修表讃載展誠祈披玉匱之科備明真之典轉經行道然燈炷香瀝懇上玄冥心下土伏冀傾光三境廽駕九清憫鑒塵微降流禎貺潜扶寶祚密祐聖朝契自然清淨之風臻太古無為之理次願坤維肅穆川境晏安符瑞有聞炎凶不作臣九玄幽爽七祖魂神出長夜之庭升洞陽之館毀絶地籙超翥天衢洎乎有識含生三徒六趣俱霑景福各遂生成臣積罪銷平宿瑕除蕩災纒霧廓道化風行得罔象之玄珠入希夷之祕籙誓精修奉以答玄恩溫江縣招賢觀衆齊詞伏聞妙道融真髙出混元之表天尊立教光敷浩劫之先歷代化人隨機濟物大惟邦國普及幽明俱賴神功咸承景貺臣等叨逢聖運夙禀真詮欽玄元道德之宗覩烈祖神仙之躅尚拘世網未脫樊籠分地用天恭守玄儒之訓節財約巳敢忘覆載之私今屬至聖垂衣元勳撫俗五兵罷警百穀荐登野洽謳歌人歸富壽當九井降生之月是三台誕瑞之期將報洪恩莫先黃籙是敢博求衆力同備信儀嚴飾仙蹤遵依祕格披心十極歸命諸天然燈炷香馳誠達懇伏冀三尊駐景下察丹襟萬聖廽軒傍流玄澤上扶社稷配天地以安禎仰贊聖躬同日月而輝煥台星福曜常鎮坤維將略廟謀永宣井邑一方昭泰四境乂安疫毒無侵戈鋋不作臣等九玄七祖超度泉扃五族六親允蒙禎祐銷平罪咎和釋災凶農蠶克保於豐穰幽苦咸期於扶濟龍神鎮守風雨均調道化周行靈威廣被茫茫九土擾擾四生承黃壇普懴之緣因太上九龍之命俱升道果普陟仙階飄浮花祭之魂霜露霑零之魄勿為疵癘各遂往生道力所覃永叶元吉犀浦劉殷費順黃籙齊詞伏以清淨之宗䚽重玄而設教生成之本資妙用以宣功家國禀之而允昌古今運之而不竭粵惟道化首出帝先今屬睿聖御天元台分閫敷弘道德字育蒸𥠖法伊堯媯舜之仁邁后稷臯陶之德萬方有泰四境無虞共感殊恩何階上答是用率勉寮屬考按經科嚴飾壇場備申齊潔精香燈而達懇奉信幣以表誠注念九清馳心三境伏冀玄光下燭至聖冥通俯鑒群情滂流巨澤上扶帝業光讃聖朝比三辰以並明嫓兩儀而等固鯤池鳯穴之野聲教遐傳桑津蒙谷之鄉車書混一保寧藩部匡佑元戎天祿永增壽涯彌廣臣九𡨋玄祖超苦趂於幽關五族周親享善緣於道域封隅之內三農有積於倉箱政化之中群瑞日編於簡冊干戈靜息疵癘無侵其有滯骨飄魂久悲風露傷墳敗廟常苦凋荒乘此勝因咸臻妙樂龍神安鎮士庶昭蘇蠢動有生同升福界飛龍使唐裔為皇太子降誕修齊詞臣聞惟道為大運玄功而生育乾坤惟帝為尊握洪樞而主張造化廣司萬國遐統群生承景命於三清定宏基於九土由是瑶圖積瑞銀漢騰華載誕元良恢弘大業今屬祥虹泛綵寶電飛光當重離啓耀之期是率土䖍誠之節敢披雲笈恭詣仙壇備靈寶之道場儼長生之勝㑹鯨鍾鳯磬飄逸響於九天鶴熖龍煙達精誠於三境伏冀皇圖隆永均雨露以無窮聖壽髙崇與八溟而比大六宫內職協讃宸居萬彚群方昭宣睿德皇太子龍文鳯質嶽固松貞超漢盈周賢扶一統大同均化旁及黔𥠖共宗有道之期並洽無為之運臣某不任禱祝䖍祈歸命之至興州王承休特進為母修黃籙齊詞臣聞上聖垂科天真設教神功救物無遺動㨁之中惠力宣恩普及升沉之內粵自玄古逮于兹辰荷澤蒙慈莫知紀極由是酆山北部潜祛邪沴之塵斗極南昌廣布生成之煦必資䖍潔方獲感通臣猥以凡微叨榮道廕遭逢睿奬踐歷官裳入侍天階髙陟九霄之上出持符竹寵臨千里之中或齊肅師徒須行刑憲輯寧封部須舉威章慮乖折𠂻之宜自掇過尤之目以兹兢灼常置肺懷今則臣母竇氏本命甲子某月日生災運所纒遂嬰疾苦雖勤服餌未獲痊平恐是往債宿𡨚尚為注訟前生今世旋結罪名或星曜所臨或年辰所歷凶災凌撓命祿衰微曉夕憂惶罔知救護況臣主持王事迢遞道途不得躬奉庭闈親調藥膳心馳萬壑目斷千山惟憑大道之慈冀集感通之效是用歸依靈觀稽首華壇修黃籙道場告玄真上聖願回聖鑒俯介福祥賜臣母氏易短促之齡益遐長之祚蠲消厄㑹蕩滌災衰使六氣均調百關康愈咎瑕除解𡨚債和平克瞻日月之華别降生成之福三途幽夜六趣殊倫同享勝因共臻善貺九玄開度五族安寧微臣常奉二親得勵旨甘之願榮朝聖主永勤忠赤之誠惟誓丹襟上副玄祐不任瀝懇望恩䖍祈之至謹詞胡常侍修黃籙齊詞臣聞妙本希微至真虛寂運神功而化育陶品物以生成應感無私周流靡倦所以九玄三古咸宣燾載之慈天上人間共沐涵濡之澤金科玉律雲篆瑶章先萬法以垂文具九流而拯世大哉至教無得而稱臣夙荷道恩欣逢景運優游玄造沐浴皇風逸豫順於天和俯仰榮於大化早參祕籙常勵明誠燧燭焚香每肅䖍於曉夕瓊儀寶韞敢有怠於敬恭族屬周親常臻廕護是用精修黃籙上奉玄休案十華三境之儀備羽磬霜鍾之禮歸心萬聖稽首諸天伏惟俯鑒丹襟曲垂玄造憫兹誠欵錫以休祥賜臣九祖七玄生天證道六親五族受福霑榮存亡均康濟之仁動靜獲安貞之賜災凶殄息𡨚債和平罪咎蠲銷祿算延益普天含識率土懷生俱承道德之緣永樂雍熙之化不任歸命䖍祈之至謹詞李玄警為亡女修齊詞臣粵自塵微早依真教叨深玄渥夙荷靈休迫以俗機縈纒世網久拘職宦罔遂初心思羽褐以未期欲奮飛而徒切依棲修敬敢怠私誠而過咎所鍾女子殞逝光隂遄往傷痛難勝但女子初笄之年歸于儀氏夫殁之後誓志道門巳造製法衣繕寫經籙永期頂冠佩服䖍奉修持值臣以王事征行未果前願俄嬰疾恙奄此淪亡抱幽懇而莫申念冥關而增恨伏惟三尊慈憫衆聖哀憐曲回鑒祐之恩特降遷升之澤俾其魂魄得契歸依積生之𡨚債銷平在世之罪瑕蠲釋拔度幽泉之苦獲居善爽之中道力玄功常加祐護其亡女所修寫法籙道衣等謹於道場前焚燒上奏伏惟至聖鑒照愚𠂻勑其魂神開度領受臣不任瀝懇䖍祈哀痛迫切之至謹詞天冊巡官何文濟為東院生日齊詞臣聞天地分靈君臣定位必資輔贊用𦤺升平猶風虎以相須若雲龍而感契由是吹塵入夢諭鼎膺求審像生賢熊氏卜臯䕫之旦堯曆元凱虞朝齊軒后之風莫不輝灼帝圖光昭史筆以康億兆以福寰區今屬嵗紀壬辰日乘庚午朔居天候月合水衡凝南斗之禎休集東陵之瑞彩景風入律星火開祥誕昴降嵩允當令序叨備青襟之列輒祈玄聖之恩䖍詣華壇願崇鴻福蘭釭夜燭擅穗朝飛仰陳三奏之儀必達九天之鑒伏冀青函紫筆延生題東極之書絳簡朱編得道署南昌之籍壽同山峻祿並海深樂境增澄萊衣顯德鷹序繼三台之美鯉庭超七葉之雄陶冶九圍匡扶元聖政歸一統俗洽大同普覃夷夏之方永鎮雍熙之化臣某受恩隆異省巳虛孱惟叩靈真曽明感激不任瀝懇䖍心歸命之至謹詞宣勝軍使王讜為亡男昭胤明真齊詞伏聞大化無方神功廣被洞幽明而赴感普生死以垂恩拯度無遺古今蒙澤臣頃者專征北陸統領師徒橫黑弰以臨戎誓傾臣節奮雕戈而效命志洗國儲山川有登涉之遙糧饋有挽輸之重惟期辦集正切憂兢又一軍之人苦於疫死傷枕藉相望道途兼小男昭胤疾恙所嬰性命懸迫發丹誠而啓願冀玄聖之鑒臨尋遂回戈免貽曠闕再朝丹陛祗奉皇慈恭荷道恩敢申昭謝是用按洞玄品格披靈寶典儀考九幽長夜之科遵玉匱明真之式精修齊直上答靈慈伏冀三界照臨諸天憫護賜九玄七祖超苦趣於幽關眷屬親緣享福祥於昭代臣積生釁咎往世𡨚讎及主務巳來公私負犯或賞刑不當或裁斷失宜俗有怨嗟過書隂隲致使動貽障塞莫值亨通晝夜循懷常增憂愓因今齊謝並乞懴除亡男昭胤未及壯年飄魂異境憫其淪謝悲痛尤深或有邪沴侵傷或是幽靈拘制䖍祈道力俾遂生神度南丹流火之庭升上境洞陽之府參玄證品悟道登真罪咎蠲除𡨚債和釋臣等災纒超解厄運清消祿秩壽涯更期延益惟勤誠節永酬聖主之恩克勵焚修仰副真靈之祐王承郾為亡考修明真齊詞伏聞至道開圖三尊垂教惠覃幽顯澤浹死生遊觀入門播弘慈而濟苦憫傷幽夜回法炬以流光南宫闢錬化之庭丹簡啓超升之籍上智童子願開罪福之由飛天神人請示懴陳之品敷明真奧典拔度幽關披玉匱靈科解銷考對玄清昏翳灑潤焦勞拯拔窮魂咸為善爽終天載劫俱沐玄慈臣先考運偶道風常參寶籙身逢聖日纍踐官榮處世網之中寧無過悮履塵寰之內必有愆違況職主庖羞須行宰戮旋司戎伍每舉刑章出領郡符入居近密或抑強撫弱或三令五申既爽重輕即為釁咎又自鄉關隔越兵火亂離故里墳塋或有侵毀塜訟延注逮及子孫兼割貨所居移易門巷土木修造有觸明神以此憂惶皆祈懴謝是敢遵靈寶科格修明真道場精潔香燈豐嚴信幣披心露懇悔過希恩伏惟太上三尊十方衆聖神光下燭惠渥滂流赦先考纍世已來深殃積罪削名地簡濯質天衢故傷誤殺之愆往債前𡨚之目後嗣考延之咎先人怨責之瑕並賜原除內外清淨即乞錬神丹霍列籍青華不經於岱嶽鄷山克證於福堂天路上願九玄開度七祖超升墳墓安寧幽冥潜靜三途六趣共洽勝功內族外親俱臻景祐刳心扙血拜手祈天不任號殞激切涕咽之至謹詞皇太子宴諸將祈晴感應靈寶齊詞蓋聞至道應機有同響答明神赴感無異影隨緬惟幽贊之私每荷垂休之力六月二十二日皇太子之㑹諸將已上卜吉辰方當暑雨之時遂有晴明之禱果蒙靈貺叶此誠祈不移頃刻之間驟止滂沱之勢群山曉碧天髙而屏翳收雲六合風清日迫而羲和弄轡宴筵克備中外同歡今則旋整車徒爰申弔伐千軍雷動山川絶泥潦之虞萬馬星馳戈甲曜晶熒之色佇平凶梗大拯𥠖元思答真官式陳齊薦蓮燈夜簇蘭穗朝飛儀禮精嚴香花紛郁必達清都之聖更崇紫府之勳仰叩玄功以昌鴻業不任䖍祝之至謹詞皇帝為老君修黃籙齊詞蓋聞混漠之先希夷之表厥惟至聖光宅九清敷淡然冲寂之宗行不宰無為之教上自三古旁逮萬區欽若真風贊孚成化粵自經綸之始洎膺推戴以來常慊明誠每申瞻奉而光靈纍洽禎貺繼臻仙居賜受命之符顯隆基業宣室發祝祈之念必至感通由是風雨常均氛邪不起四封無警百榖常登祇荷恩休實思昭謝爰因令序特啓齊壇三日精嚴六時蠲潔冀憑關奏上答玄功今則方命師徒將平凶醜猶資道力俾殄梟巢借豐隆列缺之威掃鑿齒貪狼之族更垂熹祐永泰寰瀛不任祝望之至謹詞蜀州孟駙馬就衙設銷災遷拔黃籙道場詞臣聞至道深微玄功廣大包萬天而布化周品彚以流恩故能下拯冥關廣寧邦國鎮安土地和喻神明皆遵宰制之歡盡恱慈悲之力古今共禀幽顯無遺臣夙奉玄休早承皇澤未展㳙埃之效驟叨符竹之榮況纍掌重難兼司刑憲詳評獄訟慮乖仁恕之規主領兵師實寡訓齊之要動貽過咎常切兢憂自臨蒞郡城每懷兢愼遽鍾殃罰敢望生全禮制所拘殞絶無所偷延視息又降渥恩泣血籲天煢煢何訴竊聞玄元設教紫陽有遷拔之儀正一垂科黃籙有懴祈之路是敢肅嚴公署崇設齊壇拜表九清騰詞三界伏冀三尊衆聖弘憫濟之慈夜府泉扄遂超升之路賜鄖國夫人某氏魂神安泰福善資薰積過深瑕皆從蕩滌不拘地府徑上天堂七祖九玄前亡往逝俱升道力齊㑹福庭又宅宇之中纍經修攺恐因觸動未獲安寧願憑齊謝之緣旁解犯違之過龍神復位土地安和居止利宜凶災銷殄城隍社廟里域真官密享神功永居福地上願帝圖隆固聖壽延洪太子諸王擁宏休而奉國后妃嬪主承景貺以匡朝中外寮臣六軍萬姓同歡昌運克遂安貞歲有豐登俗無疵癘率土之內一統萬方並臻仁壽之鄉咸奉升平之化不任歸命披心䖍誠懇願之至卭州剌史張太博敬周為鶴鳴化枯柏再生修金籙齊伏聞至道玄通神功廣運裁成天地敷讃帝王羲軒融燧之君堯舜禹湯之主莫不師資冲漠啓迪雍熙致祚曆之厖洪俾聲明之振赫或乘飊滄海或證品紫庭光燭九遐壽均三景伏惟大蜀皇帝乘樞御運握斗故元執大象而撫華夷駕六龍而綏億兆德逾堯禹聖越羲融穹廬窮髮之君奉賝向化靡漢渥涯之虜重譯來賔澤浸山川仁覃草木靈禽棲於內苑嘉獸宅於上林三秀呈祥十朋表異而猶勞謙恭已讓德於天符將溢簡編益深於撝挹今則神仙幽贊靈化垂休渥澤潤洽於朽根枝幹再榮於枯柏風來翠壁重飄逺近之香月過華壇復覩扶踈之影其為嘉瑞實冠古先有以見天枝帝葉之繁昌聖壽寶圖之永逺雖禾生清廟蓂吐彤庭徒美前聞難偕聖感臣榮逢昌運叨領郡符屬邑之中覩兹上瑞藻繪朝陳於龍闕絲綸夕降於鳯箋旋錫御詞嚴申醮祝褒稱顯煥榮耀優隆量恩而溟海未深荷聖而乾坤難報敢因皇帝本命之日修金籙道場翹罄丹襟仰祈玄貺伏冀諸天降鑒萬聖昭臨流巨福於社稷尊靈增景祐於宗祧先聖二儀並固萬國同文皇帝壽等岷峨明齊日月普頒正朔一統寰瀛皇后受福紫宸增齡丹籙皇太子永扶皇極養德青宫公主嬪妃榮匡聖日諸王百辟欽贊皇基九土又康五兵韜戢煙塵殄息稼穡豐登動植飛沉三途六趣俱承惠渥咸詣福庭臣誓傾忠孝之規上答聖明之澤廣成集卷之五
