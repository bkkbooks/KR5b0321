front:
  text: 廣成集卷之三敢三
  hash: sha256:7eecd188859f7830a83712c4c35602b6e2c3ce2dce429aef0be558c99be935a9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0321_HFL_003-001a, image: hfl/0337/0337-068.png}
body:
  text: 上都太清宫内供巻應制文章六徳賜紫杜光庭撰宣進天竺僧二十韻詩表臣某伏覩西天三滿多到闕朝對者伏以北通玉塞西渡金河路出重關程逾萬里班定逺之經歷才及烏孫張慱望之訪尋祇過青海或蛇州魅磧人跡莫窮或飛雪流沙馬蹄難至由是聲教或異職貢少修崑嶠白環首標瑞典鍾山火玉顯謂祥珍況身毒居葱嶺之隂于闐隔雪峯之外天竺遼夐跋渉辛勤慕中華億兆之尊嚮大蜀聖明之主專申朝覲實羙簡編伏惟陛下縱聖體乾膺圖啓運德逾羲頊仁冠堯湯修文德而御要荒耀武功而安寰海故得西夷率服萬㝢知歸南通交趾之郷北聚穹廬之俗獻賝奉䞇無曠𡻕時竊惟聽政之餘毎降自天之澤興弘玄釋勸奬崇修梵刹精嚴道宫煥麗一心齊致二教俱榮紫霞洞之仙客効祥天竺國之胡僧入貢咸歸睿感共福皇圖率土臣寮同深抃蹈臣某芝田末學蓬岫孤蹤獲奉天慈俯宣明命謹課頌聖德七言詩二十韻一首陳進冐黷宸嚴無任兢懼戰越之至賀封資王忠王表臣某伏覩降制封資王忠王者絲綸顯降典禮昭行宗社貽休寰區増抃中賀伏惟皇帝陛下仁推立愛道慕篤新増玉曆於延洪固瑶枝於逺大鳯書錫命麟趾増華浮喜氣於絳霄集榮光於朱邸臣歡逢聖運仰覩威儀不任賀新起天錫殿表臣某伏覩恩勑大内新殿成賜名天錫殿者鼎新正寢光錫嘉名中外榮瞻華夷増抃臣中賀伏惟皇帝陛下承樞啓運握斗垂衣包九土以君臨闢四門而敦睦法天構宇隆帝宅於上京括地開基壯皇居於億世由是前羅象門遐敞龍庭緫日月之貞華髙嚴秀闥集星辰之瑞彩廣啓文軒巍峩壓參井之墟岌嶪應氐房之狀莫不嶽靈飛磶川后貢材人以子來功資神助雖鎬宫魯殿彼鏁細以難儔漢闕周堂固尋常而莫並功云告畢寳額爰新顯神授於上玄以符天錫耀宏圖於八極永播聖功臨海嶽而閱賝珍㑹諸侯而朝萬國將陳大禮以福群方叶神明賛助之期廣天地遐長之壽臣某榮逢聖日仰覩神功不任賀聖體漸痊愈表臣某言伏審昨日巳來聖體頓就安愈臣某誠歡誠躍頓首頓首伏惟皇帝陛下深仁御宇至道垂裳惠匝萬區恩周品物書乾夕惕焦勞而腠理愆和旰食宵衣憂軫而寒暄爽候令則神明幽賛川嶽効靈清廟貽祥玄穹降福克安聖寢彌増雨耀之輝廣納洪休益永萬年之壽華夷抃恱億兆歡呼臣某日旬以來眼疾未減不獲趨馳玉闕蹈舞天階瞻望煙霄不任賀疾愈表臣某言伏審聖體巳就痊平中外臣寮咸增踊躍臣某誠歡誠抃頓首頓首臣聞五緯經𨇠尚有差其行度四時運動猶或爽於𢡖舒雖寒暑之乖宜蓋隂陽之常數伏惟皇帝陛下順時設教以德臨人萬機每繫於宸襟六氣稍違於聖體今則神靈叶賛宗廟垂祥廣集天休頓安聖寢足嗣唐堯之一統永延周帝之遐齡頒賞錫於醫功恩流海内帑鼓呼於品物聲震層霄臣昨自三月巳來偶縈疾苦不獲隨倒舞蹈堯階無任歡呼屏營之至謝手詔表臣某言今日伏奉恩旨以臣今月十一日上表稱賀聖體痊復事賜手詔奬飭者絳闕流恩紫泥頒寵仰承天造俯慰几庸臣某誠榮誠恐頓首頓首𥨸以臣叨將踈野幸列班行雖焚修毎祝於龍圖而旦夕合趨於鳳闕泊嬰疾苦稍曠朝天昨日以皇帝陛下庶政懷勞萬機闕念偶致違𥙿㝷就痊和是以臣稽首歡呼飛章稱賀實簮裳之素分乃周列之常儀豈謂皇慈曲頒紫詔臣謹巳焚香跪受訖無任瞻天荷聖激切屏營之至謝宣賜道場錢表臣某言今日伏奉聖旨以臣自前月二十一日就當院集在觀道衆老宿等於三清壇上爲皇帝陛下開置靈寳消灾轉經禮念道場伏蒙宣賜錢二十貫文省除者伏以中朝錫寵内庫頒財仰奉天慈倍銘凡懇臣中謝㐲以叨爲教主深受國恩凡日焚修皆歸職分豈期聖造仍降寵私仰天上之龍顔巳増感聖捧禁中之鵝眼更切祝堯其所賜錢臣巳依數跪受俵給道衆訖臣與道衆等無任感恩激切屏營之至賀嗣位表臣某言伏審今日皇嗣寳位光御洪圖率土歡呼普天欣載臣中賀臣聞成王嗣位舉千載之徽猷舜帝繼明爲百王之茂典上膺天命下契人情伏惟皇帝陛下道比成湯仁同大禹德宜符於五緯運潜契於二儀是以克紹宗桃光昇寳位鼎祚彰惟新之命洪基顯隆永之期即使車書混同夷夏清泰九土有歸山之馬四溟無横海之鯨克振皇綱永安大業臣叨榮昌運獲列簮裳仰馳捧日之心雖同龜抃俯抱卧漳之恨莫遂鳬趨臣無任曕天望聖踊躍屏營之至賀德音表臣某言今日皇帝御殿宣降德音者臣聞聖德法天應候每行於亭育神功體道順時克布於生成莫不澤被九𥠖惠敷萬國凡居覆載咸動歡呼臣某中賀伏惟皇帝陛下宅據寰中日臨天下克儉而茅茨不剪栖神而金鏡髙懸是以鴈塞窮荒雲奔玉帛雞林絶域霧集梯航運在無爲俗欣有道今則普宣德教克順正陽安地表之遺𥠖髙開壽域御天錫之新殿更扇薫風慰征役於藩方免逋懸於郡縣魅郷遷客俱從釋宥之恩囹圄縲囚盡舉寛明之典式因三赦將俟一同臣伏恨疾瘵所縈不獲隨例蹈舞玉階無任歡呼踊躍屏營之至又賀德音表臣某言今日皇帝御殿宣降德音者雷雨作解渥澤滂流而九土以無遺致群生之咸泰華夷億兆孰不歡呼臣某中賀伏惟皇帝陛下嗣聖繼明握圖御宇蒸蒸大孝同漢惠以承祧翼翼小心比周王之纂極文懷逺俗武戢遐荒膺乾而化洽無垠出震而仁周有截今則凝旒御宇正殿宣恩安地表之𥠖元髙躋壽域灑天中之德澤更扇薰風憫征戍之勤勞釋賦租之逋滯投荒遷旅囹圄縲囚倶從赦宥之私盡舉寛明之典騰歡聲於域外浮喜氣於雲間車軌書文佇歸一統瑶圖玉曆克保千春臣獲以衰遲躬逢睿聖方嬰疾疹不獲蹈舞堯階瞻戀天慈無任歡呼踊躍屏營之至謝批答表臣某言伏奉恩勑以臣今月二日上賀登極表一道賜批答奬飾者寵降丹霄榮臨玄教綸垂五色出仙禁以昭彰日煥九芒向芝田而照燭驚榮失次抃蹈無階臣中謝伏惟皇帝陛下珠衡誕瑞玉斗縱神出震域以重光爲乾樞而纂聖德超啓誦弘孝德以垂衣明繼勛華宣太明而御宇湛恩遐布惠渥旁敷歡呼振野以成雷喜氣凝空而作蓋華夷億兆就日瞻雲臣某限以衰遲兼嬰疾恙仰龍墀而潔懇陪獸舞以無因遂貢封章遥陳誠悃豈謂特隆睿奬俯降天章成行之瑞露葳蕤聮愊之卿雲芬郁捧對而嵩衡未重感恩而溟渤非深鷦鷃至微乾坤難報所賜批答臣謹巳焚香跪受訖無任荷聖戴恩之至慰中祥大祥禫制表臣某頓首頓首言日月不居大行皇帝奄及某祥伏惟皇帝陛下攀號痛慕聖情難居上爲宗祧下徇億兆俯全大禮永福華夷臣衰疾所縈下獲隨例起居奉慰無任殞越屏營之至謹奉表陳慰以聞慰釋服表臣某頓首頓首言日月不居大行皇帝崩背如昨奄經禮制伏惟皇帝陛下攀慕永逺聖情難居四海臣妾服制終禮瞻天靡及履地無容臣伏限衰疾所縈不獲趨詣闕庭哀慟臣無任感咽摧慕之至謹奉表陳慰以聞慰冊廟號表臣某言今月某日追冊大行皇帝尊謚及廟號者伏惟大行皇帝應天誕睿乗運開圖豐沛振衣功超於漢祖邠岐枝箠仁邁於周文考唐堯翊善之名遵虞舜盛明之號今則式崇尊謚爰羙聖功億兆咸哀寰區共感伏惟陛下悲纒罔極孝理萬方仰弓劒以難追奉冊書而増感漙天率土哀殞同深慰啓攅表臣某言伏承大行皇帝今月某日啓攅宫者哀纒百辟號慟六宫伏惟陛下攀慕哀號聖情難處對弓劒而增感歎光景以㝠懹臣伏限衰疾所縈不獲隨例哀慟無任殞越屏營之至慰祔廟禮畢表臣某頓首頓首言伏承某皇帝祔廟禮畢者禮重宗禋序申昭穆克遵嚴祀永耀神功云云伏惟陛下順考禮經欽明孝德正春禘秋嘗之典宗配天奉聖之儀允集鴻休永崇清廟普天率土哀慕同深慰封陵表臣某頓首頓首言伏覩大行皇帝陵寢封爲某陵者臣竊惟大行皇帝吞日叶祥履星應夢握乾元而啓曆拓坤野以開基鄙呉魏之三分廣行恩化欲華夷之一統將混車書陵寢正名允符聖德伏惟陛下纂承事重追羙爲先光顯遺功輝華盛禮仰瞻懿躅稍慰聖情凡在臣寮同深哀慕慰發引表臣某言伏惟大行皇帝靈駕以今月某日發引者二儀交感兩曜無光億兆銜哀雲霞共𢡖臣某誠摧誠咽頓首頓首伏惟陛下孝思罔極聖情難居望仙駕以漸遥聽薤歌而増咽追攀不怠號慕難勝賀登極後聽政表臣某言伏審今月九日皇帝御明德殿聽政者文物羽儀初陳於玉砌行鵷振鷺乍列於瑶墀中外同歡寰瀛共賀臣某誠歡誠躍頓首頓首伏惟皇帝陛下九天誕聖七政縱神執玉斗而御乾龍將寜四海握璿衡而司大象爰牧萬方敷啓后之文明懋成王之道德今則雲開碧落齊瞻北極之尊霞散滄溟共奉大明之照恩覃有截惠洽無退臣跡滯芝田榮逢寳運悲越吟而自感趨漢殿以無由瞻望堯天不任抃蹈歡呼激切屏營之至慰山陵畢表臣某言伏承大行皇帝山陵禮畢者神官長閉仙寢永安率土生靈不任號慕云云伏惟皇帝陛下追慕不怠聖情難居對馬鬣以増悲攀龍髯而永而遊衣尚在仙駕巳遥追想英威摧慕何及臣某伏限衰疾不獲奉慰闕庭不任號殞摧咽之至謹奉表以聞請不赴山陵表臣某言竊承山陵俯逼皇帝陛下哀慕無窮欲躬赴陵寢者恭聞中旨實駭人情凡彼照臨莫不惶惑臣某誠惶誠恐頓首頓首伏以帝王之孝也法天順人縁理制禮俾生靈咸若而宗廟永安未聞以弓劒之哀誠履曽閔之獨行遽勞警蹕親奉告修伏惟皇帝陛下考百王之舊儀徇歷世之成典特廻聖鑒俯契禮文遵前古之通䂓示後王之令範彌彰孝理以慰萬方臣不任瀝懇䖍望迫切之至謹奉表陳乞以聞廣成集卷之三
