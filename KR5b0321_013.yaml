front:
  text: 廣成集卷之十三毀一
  hash: sha256:70f36246c8fcdb8f29f104c5ad160d5ca7b428cdb571be1bb4de7d1f1c44c7ff
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0321_HFL_013-001a, image: hfl/0339/0339-004.png}
body:
  text: 上都太清宫內供奉應制文章大德賜紫杜光庭進莫庭乂為安撫張副使生日周天醮詞伏聞道分一氣人配三靈善惡發於丹誠吉凶應於玄極苟興嘉願必叶殊祥況在名山俯臨仙洞炷香祈願瀝懇陳詞必能響達神明顯垂福祉伏以當川安撫副使張琳稟澄逺之識秉清正之心頴鑒無私忠貞不撓推公奉主虛懷同止水之明御下恤人從善有轉規之易況連營貔虎四時之犒賞皆豐積歲干戈千里之挽輸無闕言惟憂國志絶營家每切勤恭動忘寢食人皆受賜孰不知恩臣孤子官名低擢翅羽恃其拯護方果奮飛思禱真靈用申答效今屬陽和動煦林谷舒春爰記生辰虔修大醮仰星文而貢懇遍川嶽以歸心香雜溪雲燈和嶺月千巖景寂午夜風清展肅恭莊敬之儀備藴藻蘋繫之禮伏願光回三景飈降十仙鑒兹醮酌之誠錫以昭彰之福延二首六身之壽除五行三命之災善功克懋於仙階隂德光隆於世緒然後封隅寧謐邊徼晏清瘥癘無侵戈鋌罷用聖主洽垂衣之理藩垣著柔服之恩幽顯咸安飛沈各遂敢忘砥礪以奉休明不任莫庭乂九宫天符醮詞伏以博厚成形中黃定位統水火而稱長冠金木以居尊孕育萬靈苞含五緯上惟邦國下及人倫凶吉攸司安危是繫臣本宫震卦五鬼所臨運氣飛旗仍當此月恐為災厄尤切憂惶虔考吉辰精修醮禮伏惟鑒其丹懇錫以鴻休回危就安變凶成吉解災除厄增祿延年眷屬康寧公私和泰不任衆修南斗醮詞伏以大道凝真玄功化育清濁之源既異隂陽之位亦殊南斗上宮實司生籍上惟邦國遍洎人倫壽紀短長祿祚豐薄咸歸主宰無間纎微臣等獲遇聖朝躬逢道運覆載稟質動用愆違處世立身寧無過咎未申懴謝因搆災危又恐宿曜行年九宫三命或逢災厄或遇刑衝神道難知凡情罔測須資香火用罄禱祈敢以吉辰虔申大醮伏願流光下燭玄鑒俯臨察丹切之心降厖洪之福祛災度厄增祿延年削罪目於隂曹上生名於陽籍公私和暢眷屬康宜存殁沾恩幽明蒙祐不任胡賢常侍安宅醮詞伏聞易象垂文取諸大壯聖人著法代彼層巢棟宇聿興古今是則由隂陽而定位配刑德以裁規命衆神各司其職逆之則凶而獲戾順之則吉而降祥臣頃以所居不庇風雨因時改作隨便營修越月逾時巨功告畢但慮起土運石增下損髙畚鍤所侵不知禁忌穿鑿所及有犯神明未申醮謝之儀常切兢憂之懇兼以所居之地五姓相因歲月既深主宰非一慮其神識尚有淹延憑此醮俱令遷拔是敢肅嚴庭宇恭啓法壇請靈寶符文按太玄科典降延真聖披露懇誠伏惟五帝鑒臨衆神昭祐勑下符吏宣告地司安鎮龍神銷平犯觸使凶𦍙殄息真氣滂流禳未兆之災衰納惟新之福祚蕩伏尸故氣遷滯魄遊魂自明及幽咸得其所六甲五行之象九宫八卦之方各靜封隅永垂貞吉闔門清泰舉室康宜勉勤修勵之心以副真靈之貺不任胡璠尚書地網醮詞伏聞五緯稟生三才列位荷陶鈞於至道感孕育於上玄而曆運推移隂陽升降吉凶倚伏寒暑循環否往泰來災生福過考諸物理斯為格言況在庸虛敢忘戒懼臣行年之內併屬災期大運居甲辰之中小運當丁已之上又兹兩月咸直四宫是地網之鄉兼本卦之位恐成厄會無所告禳更慮宿曜加臨飛旗應變五行刑尅三命衰微雖驛馬臨年恐災能制福退思履行內省身心須在懴祈用明哀懇爰憑吉日虔備醮壇延降尊靈以希照鑒伏惟三官五帝下燭丹誠斗極星君俯流鴻澤注延生之籙錫以福祥焚積罪之書赦其瑕咎解災凶於地網銷厄運於巽宫使壽紀增新休貞允萃公私和泰眷屬安寧永承濟護之恩敢負真靈之祐不任尹居紘辛酉本命醮詞伏以大道宣功三靈資始稟形賦命表識定生體化育於坤偶乾竒配吉凶於天曹地府三官考校罪福無遺五帝主張死生咸繫臣顧惟塵陋獲奉休明籍係中樞名參內署鴛鸞闕下叨步武以多慙日月光中揣分涯而增懼微功未著積過必深每慮前世宿瑕此生罪咎未申懴滌難遂原除又恐三命五行天文年運或逢厄會或值災期犯神明主宰之司違仁義玄儒之訓或侵人利巳或故殺誤傷罪目易盈善功難就或壽齡促少或稟祿單微常於元命之辰式備醮祈之禮兼將課念上奉明靈旋以天步艱危神州紛擾或脫身林嶺或奔命道途五任子兹不遑奏醮香燈既曠寢食難安今屬銜命西南稅鑣岷劒道路無阻關梁大開帝澤天波遐通於四裔歡聲喜色震曜於一方況此少城實惟仙府可以𡨋心貢懇可以禱福祈真爰卜命辰仍當本命賫持信禮撰備香花併以此時追填往醮精誠有達靈鑒必通伏惟採納丹襟降流洪福獲酬昔願更洽新恩賜臣災厄蠲銷祿算延逺存亡俱泰眷屬咸安上願社稷興昌乾坤肅靜三光順軌六氣均調武偃文修時和俗阜克回鑾輅永固龍圖俱諧虔祝之心盡覩太平之運不任皇后本命醮詞伏聞大道垂文玄元演教佐時助國宣化度人功格象先惠周物表寶章上御人間之懇願必通天澤下臨真境之休貞允降羣生蒙祐巨細無遺某今年大運所值三殺之位小運支木當衰弱之中干祿納音俱逢土塞飛旗四殺仍在寅鄉羅㬋𨇠尅姓之宫土星臨乖背之宿火曜行度將入身宫行年所經況當地網又醫方所診臟氣未調榮衛未和正氣衰薄六脈未復九府猶虛恐搆災凶更深厄運又恐積生往世寃債未除運意行心罪瑕旋結須憑章奏冀達懴祈是敢依按明科選求良日列詞備信拜奏章文請天官吏兵降鑒營護某內安腑臟外却災凶上解星辰臨照之期下銷年命刑妨之咎寃仇和釋債訟蠲平六氣舒通百關調理衰危超度命祿增延北宫回短促之年南極注遐長之壽伏惟至真大道太上三尊常弘憫濟之慈允錫安真之福誓虔忠孝克勵身心譛明君化育之仁報至道生成之澤不任道門為皇帝醮太一并點金籙燈詞伏聞一氣肇胎萬形資始髙垂象緯明判剛柔統御之權歸于至聖天命帝以司牧帝承天而撫臨攝提握耀之初君臣定位揖讓干戈之世道德兼行時危則玄德彌彰運否則洪休自廣大蜀英武睿聖光孝皇帝德符穹昊功被生靈受命儀乾永康三極神明符讃人間之玉燭調時律曆均和天上之珠囊叶度俗臻豐衍歲有蕃登美瑞嘉祥日書月至猶復書乾夕惕恭已奉天夤敬幽明憂勤億兆專極關救焚之念無蕩心恱目之娛軫慮萬方期于仁壽昨者以四神行運在咸池之宫直符所臨次明堂之野旋興戈甲尋致尅平彼背盟搆逆之徒思漂杵燔枯之敗斯則神歆睿德天助皇威睹變災成福之祥示國泰祚延之兆今則歲聿云暮氣序將交荷即日之玄恩禱新春之景貺願酬聖力輒罄齋誠燃金籙神燈備河圖大醮伏惟髙尊鑒省大帝感通十神常介其休光三載允承於福祐寶圖隆永宗廟安寧皇帝等壽五山齊明二景八紘順化萬國宅心皆臻有道之風盡掃不庭之孽皇太子重明耀彩文教聿昌輔贊睿謀延洪大業六宫百揆咸均翼戴之心兆庶六軍俱享乂康之福龍神密衛川嶽恆安幽顯飛沈永承洪澤不任太子為皇帝醮太一及點金籙燈詞伏聞玄化肇分二儀搆象融結定隂陽之位神明司匡御之權太一天尊髙皇大帝坐勾陳而臨察命神使以周行於是五行八風天一地二揚鏕雲露駕景星𨇠順九野以遐觀潛施𤏐誡歷諸方而俯燭顯示吉凶惟古及今敢忘砥礪臣以直符所屆在明堂之官四神所行居咸池之位所宜蠲潔用罄禱祈皇帝受命上玄握符承統弘慈儉之化敦清淨之基思洽太和以康萬國昨者以鄰封背義越境于盟殘剽蒸黎侵凌郡邑旋平凶孽盡廓氛埃指麾元自於睿謀讃助實資於神力今則封疆寧晏褒漢肅清星紀回天歲律云暮當此月壬申之日乃新歲首直之辰輒備壇場虔申告謝修太一大醮燃金籙神燈下照幽關上通玄極蕩祛災滯延降福祥伏願宗廟安昌往稷隆固寶圖攸永聖壽遐長繼雲官火紀之崇邁炎漢姫周之業速臻一統克致大同六宮式表於匡扶百揆共傾於忠讜三光昭朗四序均調歲有豐登俗無疵癘龍神恱豫成五風十雨之祥川嶽乂康流澤馬器車之瑞昭明丹懇上達真靈仰祈鑒祐之恩廣錫延洪之福不任靜逺軍司空承肇本命醮詞伏以至道生成玄功陶鑄隂陽主宰品彚區分稟質誕形仰資神化臣獲逢道廕叨荷朝恩被服寵光主張戎仵省功庸而未著顧塵忝而巳深夙夜揣循敢忘惕勵尚慮秉修或闕履行多違旋積愆瑕未申懴滌或五行三命有刑尅之期九曜列星有照臨之數或宿仇未釋或往債未祛神道難明常情靡測因成災滯悔謝無由輒於本命之辰虔申醮酌依天真科格拜伏大章伏惟髙聖感通真靈鑒護察其丹懇降以玄恩災厄銷平壽涯延益潛增祿祚廣赦罪愆解巳往之𡨚讎錫將來之福祐誓傾忠孝永奉君親不任皇帝於龍興觀醮玉局化詞伏以天分列宿地布名區燦垂象於圎羅儼福庭於方澤明施主掌以祐邦家竊惟玉局洞臺玄元降迹鎮兹都會密邇城闉年祀徒深光靈不泯虛寂靡殊於林谷貽祥每及於蒸黎常切敬恭敢忘瞻奉伏自祗膺曆數啓創朝庭象闕端門須就正陽之位霜壇羽殿遂從遷革之宜而石室洞門老君真像陳暮燭朝香之禮惟務恪虔接龍墀鳯闕之嚴彌加崇潔固可以與天共永終古長存尚慮主宰龍神隂陽官屬興功擾動衆役喧驚既踐暴以為憂憑醮祈而懴謝爰自吉日式備香壇翹注匪遐真靈必鑒伏惟玄無降祐大道開恩赦巳往之尤違錫將來之禎祚使寶圖延永社稷安寧風雨均調龍神輯睦災期蕩滌罪咎銷平其有直符太一之運行將移地分火矅土星之臨照欲及身宫願回力以護持致微躬之昭泰烽爟不飛於四境沴瘥無撓於兆人永誓丹襟上奉玄貺不任勑醮諸名山大川詞伏以道列三界地載羣生或仙人修錬之鄉或真官總治之所靈基有覩神化無方朕寅奉上玄光膺大寶俯循區域在潔禋祠邇者軍國事繁干戈歲用未遑周普常抱惕兢思述虔恭庶消災咎今命三洞道士并遣使臣嚴備醮儀潛通玄鑒所願四時有𥙿六氣不侵壽命延長邦家興盛皇枝帝祚百辟千官內自朝廷外及區宇億兆之衆福祐咸均敬託青詞粗陳丹懇不任皇帝醮仙居山章仙人詞大蜀皇帝謹稽首北邙化得道章真人夫以紫府髙真玄洲上士乘飈駕歘坐有立無升汗漫以遊神入鴻濛而隱景或明符邦社旁濟生民或幽贊帝王共清否塞李順興保持靜帝陶真白佐佑蕭王子年潛諌於府君意期密悟於昭烈稟之則受禧介福忽之則違吉貽憂煥彼縑緗皎同日月今者百姓郭回芝採藥於仙居觀得真人天寶年所留銅牌六十字之周旋名姓與年辰備在二百年之藏祕錢文與篆迹皆全嗣續具明日時無爽苔侵土蝕固當靈將護持應驗合符實荷真人示見顧惟蕩德顯契休徴事超於赤伏黃圖理冠於鳯銜龍負既覩延長之數敢忘兢業之懷爰啓醮壇冀酬玄德仍剃藂刈𣗥揆日僝工俾翠檻朱簷鼎新舊址郴樓遼柱重認歸途虔祝真靈鑒兹昭報三十六天宫之逺必降威光萬四千甲子之期永言佩服不任皇太子醮仙居山詞伏以日闕霞房為天中之都會瑶壇桂殿乃人世之福庭或真聖之所宴遊或神仙之所窟宅莫不藏竒韞秀演貺流祥濟祐人天幽贊邦國惟兹古觀果顯殊禎得天寶真符出老君祕記金文鳥印篆字虬蟠分明而瑞迹如新拂拭而苔痕尚在幾千年之前定聖主開圖二百歲之昌期吾皇享國御名國姓生日年辰一一指陳重重符驗繼書薄德備列姓名載詳圖籙之文益切兢營之懇遐瞻煙岫仰感靈恩輒因醮酌之筵遙置焚修之念上願洪基克固比溟渤以無涯聖壽增延並岷峨而更峻九圍順化萬宇歸仁誓虔忠孝之誠以副真靈之祐不任廣成集卷之十三
