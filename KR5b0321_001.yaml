  text: 廣成集卷之一敢一
  hash: sha256:54c726a35553d743b8a57c5cdab35c259a4ab69e70df9404655a75d71acc2483
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0321_HFL_001-001a, image: hfl/0337/0337-004.png}
body:
  text: 上都太清宫內供奉應制文章大德賜紫杜光庭撰代陶福太保修濜口化請額表臣某言伏以濜口化者即二十四化之第十八也節應配於小滿列宿應於畢星陳安世白日升天臺蹤尚在褒女仙乘車得道轍迹猶存每歲春秋準敕祈醮頃自用軍之後併已摧殘古殿空壇僅餘基地仙儀像貌盡翳榛蕪往來絶瞻敬之門仕庶無歸依之所豈期福地一旦蕭條臣輒備興修願資聖夀伏惟陛下軒帝靈源緱山仙緒繼天御極用道臨民萬方榮廣覆之慈三教被惟新之澤芝田奈苑咸荷精嚴古廟儒宫亦蒙繕飾况是長生之教敢申崇葺之儀旋以剪剃蒿萊興營宇室像設免嗟於暴露簮冠克遂於焚修邈彼靈蹤還為勝概香燈有託齋醮無虧兼召道士楊玄敬獨孤知元何某等三人就觀居住訖但以荒涼既久門額全無敢祈兩露之恩特飾神仙之境其化伏乞聖慈依濜口舊名仍賜給聖夀額許臣自製造懸挂庶使琅書銀榜長懸日月之輝漢水仙山永祝聖明之夀臣某無任之至謝新殿修金籙道場表臣某言伏奉聖旨與右街威儀何沖徽等二十一人於新殿內修金籙道場七晝夜今月十四日開至二十日散供奉官楊紹業依時設拜言功表贊訖者伏以天贊聖功鼎新大內瑤軒玉砌超三島之鼇宫青瑣丹扉逾九清之鳳闕叶皇居之壯麗覩帝宅之深嚴萬國仰瞻千靈森衛𦆵畢瓊宫之製先開金籙之壇鋪舒而一一精新祗敬而重重蠲潔龍香上逹依稀而萬聖俱臨蟾月低光倣佛而千真入會延洪睿算遐永皇圖近臣拜手以投詞宰輔齋心而瞻祝殊禎允集巨貺無涯隆大寶於千春總八絃於一統臣等叨膺科教獲備焚修豐玉膳於天厨躡雲庭於仙境兢榮巳極頒錫荐臨伏蒙宣賜襯錢銀器匹段等澤深溟海恩重嵩衡顧慙鷦燕之微何報聖明之奬臣無任之至謝恩除戶部侍郎兼加階爵表臣某言伏蒙恩勑除授光祿大夫尚書戶部侍郎上柱國蔡國公廣成先生者睿慈春煦宸翰雲敷叨榮而但覺逾涯荷渥而罔知所措臣某中謝臣聞聖明居上是必授任才能俊乂在官乃貴陳力就列皆以道包經濟言逹變通上有致君之能下盡為臣之節處既得地用務適時荀虧利物之期必致取容之誚如臣幽懦榮奉休明循顧庸襟敢臻殊寵伏惟陛下披圖創曆握紀繼天明逾兩曜之懸德合二儀之普蕩滌氛垢蘇泰寰區功宣而萬有同心化被而八紘繞指夢通巖壑股肱符命説之求景仰煙波輔弼契非熊之兆元勳貞佐捧日扶天人傑時英誔星降嶽青宮翼贊日月重光朱邸忠貞盤維增永臣某江湖賤質簮褐微才為儒既昧於成麟學道甘期於畫虎矧復辭吳歲久奉聖年深杳無山水之恩每感風雲之會歸棲照育三十餘秋施重嵩衡遇深溟渤變枯荄為茂草起敗骨為豐肌徒曰竒功難偕聖奬是以臣俯盈丹懇積感皇慈曉動神魂夜驚形影效報未申於絲髮憂惶空溢於肺肝況復啓運之初垂裳之始錫洞山之美號如北省之華資無以身諭國之談上禆天聽乏造膝沃心之議仰副宸衷揣身世而榮顯居多於爵位而貪叨巳極豈可重塵清級更履殊榮紹碧落之嘉稱集玄關而璅質且如漢推曼倩晉有雉川未聞聮居清重之司再踐非常之秩揣量戰越進退兢榮仰對宸嚴無階陳讓唯虔呧礪永答鴻恩臣不任謝恩奉宣每遇朝賀不隨二教獨引對表臣某言伏蒙聖慈以臣每有起居稱賀皆與道衆僧人齊班特降宣旨令臣自今巳後獨入引對不隨衆例者禮加異等事越常倫褒稱發自於聖心榮盛獨光於道域隆恩顯示負戴難勝臣某誠榮誠懼頓首頓首伏惟陛下誕睿承天執符御曆包乾坤而覆載日月以照臨炫金鏡之光華無幽不察調玉燭而亭育有物皆春由是露灑天根澤流地表肅武功而定氛祲桀黠悛心修文德而服要荒姦凶革面毳幕穹廬之俗冰居穴處之鄉重趼來庭占風入貢理定而樂作功成而禮行舉三代之頽綱興百王之墜典有沿有革無黨無偏至若群后朝元垂衣當宇儼三傑十臣之佐冠非審像之賢文物羽儀輝今映古其或雲衫羽服仰丹階而效嵩呼白足方袍列彤庭而申華祝此時微臣常依旅進得靣雲階每驚巖壑之微獲在煙霄之上今則逈隆睿奬頓革前儀念臣雖迹預簮冠而身叨爵秩清級𦆵移於北省華資又接於南曹特令敷奏之時不雜緇黃之侣俾其獨引顯示優恩昔者魏重謙之梁尊貞白漢稱曼債秦有子平禮容靡覩於新規朝挹皆循於常度今者降九天之明命垂萬世之宏規退省幽孱但切凌兢之感顧慙纖弱何勝雨露之恩惟勵丹誠永酬鴻澤臣某無任之至謝獨引令宣付編入國史表臣某言伏蒙聖慈特降宣旨賜臣不隨一教獨引對揚以臣謝恩表宣付史館者逈自宸表光申異禮仍編信史永載優恩祗荷難任寵榮增極臣某中謝伏惟陛下大明御曆至聖宣功廓覆載以軍恩並曦舒而流照賢良入輔庭多命世之臣夷夏歸仁府積殊方之貢有俗皆臻於富壽無為欲蹈於華胥由是蓬島芝宫咸加炳煥祗林奈苑畢集精嚴四靈挺質以呈休六氣調時而表貺玄儒鼎盛緇褐同歡臣猥以常倫榮逢景運道籍雨塵於美號官榮再履於崇班别顯殊恩賜其獨對緇黃班裏受宣而徑上雲天鵷鷺庭中顧影而疑生羽翼今則竉編國史昭示寰區逈隆非次之恩永載不刋之典荒愚有素難勝雨露之深蕭芥至微何報乾坤之德唯虔修勵上答聖明臣不任賀黃雲表臣某伏覩鴻臚卿趙溫圭奏今月二十三日皇帝駕幸得賢樓看閲將士皇太子自城南閲馬帳頭回入城至酉時城上有黃雲兩片狀如華蓋逡巡變為紫色者臣謹按堯之誕生常有黃雲垂覆舜之御宇常有黃雲凝空又漢宣帝幸甘泉宫紫雲入殿宋世祖踐祚紫雲見於端門黃帝有瑞雲以雲紀官今者德動天休瑞呈雲物華夷共仰海嶽同勸臣某中賀伏惟陛下體道握符惟天縱聖仁周動植惠普寰灜柔逺俗以文明懾凶奴以武略蓋以中原未泰品物未寧將申戡靜之機用拯生靈之弊授侓則南摧醜蜒鑿門則北掃煙埃鐵軸牙檣水耀龍驤之旅霜戈雪戟陸陳隼擊之師振動山川奔驅雷電佇間恢拓以廓乾坤爰命皇太子訓整六軍申明三令蒙輪挾輈之士壯氣淩空拔山扛鼎之夫雄心貫日皆堅金石咸勵忠貞允合天心果昭靈貺輪囷對起蕭索齊凝成金柯玉葉之竒髙浮帝座變紫蓋如葩之狀低接皇城𥘉呈蔭鼎之姿漸結臨關之色有以見圓穹贊祐皇德升聞越唐堯虞舜之徴超宋祖漢宣之感自此率賔八極文軌萬方增聖夀於億千固宏基於隆永臣躬深睿奬疊覩殊祥敢謡詠以抒情誠效謳歌而頌聖德詩一首陳進賀雅川進白鵲表伏覩嚴道縣多功圑崇善里百姓李彥韜於楠樹上獲白鵲進獻者五行表瑞見金運之隆昌百辟同贍賀玉京之貺臣某中賀臣間王者正名立訓體乎天意勝殘去殺慰此人心則有異木珍禽來儀朝闕霜毛動色紺趾摽竒斂羽呈姿應見徒誇於漢魏傳聲送喜翺翔顯奉於皇明伏惟陛下瑞冠百王功超三古協序而風調禹侓燭昏而鏡滿軒臺亭毒萬方再樹乾坤之本照臨下土重懸日月之光鄙炎漢之息肩邁唐堯之鼓腹人歌歲稔物賴時康況乃萬旅貔貅千營鎧甲擒凶剪弊撫弱字孤雷掀鉦鼓之行雲黯旌旗之舉發令而雄豪踊躍申恩而疲瘵昭蘇五星運度以垂休八海承風而寢浪遂至山河效祉禽羽呈祥逺離海上之巢來對雲中之闕觀其玉籠乍啓雪姿不驚望聖苑以佪翔對天慈而鼓舞往來瑶陛棲泊珠簾認素羽以難分聽新聲而己熟不是成橋之侣殊非繞樹之群既彰團雪之容實煥來金之盛佇見千戈載止姦邪屏除蕩疆場之煙𤇺永歸北極靜寰區之搸梗自我西方信超魏德之雄更掩漢成之代臣獲逢昌運纍覩殊祥輒陳歌頌之詞上浼聖明之鑒臣謹課頌聖德紀瑞詩一首陳進千瀆冕旒無任之至賀天貞軍進嘉禾表臣某伏覩天貞軍留後崔善進射洪縣百姓王友田上嘉禾合穗圖者聖德遐通祥符疊至文武瞻覩中外歡呼臣某謹按瑞圖云嘉禾者美瑞也稔歲精王者德至於土則二苖同秀昔者唐叔得禾異畝同頴成王問周公曰二禾一穗意天下和同乎王命唐叔作嘉禾篇由是九土會同八紘歸化旅獒西貢越雉南來三十世之宏基七百年之大業輝前映古逾夏掩商今在聖明復彰斯瑞伏惟陛下紹軒皇之聖緒承周帝之洪源應曆數以配天總華夷而類帝惟恭惟儉絶嗜音酣酒之娛乃聖乃神有明目逹聰之美弘武德而先懲不軌電掃姦妖播文風而旋撫戎羌雲奔賝賮憂勤黎獻軫憫耕農歲致豐穰田無炎潦德通于地見共秀於二苖應逹乎天果異畝而同頴契聖祖興周之瑞表吾君拓土之徴昔則和天地為一同今則包萬方為一統況屬王師薄伐誓衆弔民雄稜已懾於彼方禎異先呈於近境佇觀收剋永蕩氛霾開九天日月之光顯符周卜合四海生靈之望同比唐禾臣竊仰瑞圖賡歌聖感願預採詩之録思陪唐叔之篇謹課頌聖德嘉禾合穗詩一首進請駕不巡幸軍前表臣某伏覩宣旨駕幸北路軍前者臣聞展義巡功禮經垂典誅凶伐叛有國通儀蓋欲迥廣照於一方輯五瑞於群后剪其暴亂慰佊蒸黎況蠢爾邠岐久迷大順朝伊夕即覩殄平不足以親駕戎車逺臨狡穴顒顒衆懇僉用驚疑伏惟陛下逾舜文明超周神武稟秋霜之令敷春育之恩委以至公推其大信覆載之內風偃化行而隴渭之鄉岍岐之俗甘寒谷之氣自棄陽和息惡水之隂顯孤臨照恃蟻封而稱固巢燕幕以偷安今則上將專征雄師薄伐逺憑宸算必剗根荄𥨸惟漢曲褒川方當寒沍霜雪嶮棧豈易躋登況射鮒穿蠅詎用千鈞之弩孤城荒堞寧銷萬乘之威伏乞聖慈俯徇群心特寢成命佇觀剋捷永統華夷干冒宸嚴無任戰越兢懼迫切屏營之至謹詣閣門奉表陳謝以聞第二上表臣某伏覩宣旨駕幸圵路軍前皇大子宰臣百官等上表陳請未賜俞允者省方風俗雖經典之舊儀慰撫師徒乃君父之慈照但以道途險阻水陸嚴凝遐邇群心實實憂灼伏惟皇帝陛下體堯慈惠逾舜欽明欲令寰海之人盡沐雍熙之化憬茲汧隴密邇封隅久負歡盟深辜恩信識變通者巳束身效順迷向背者猶掩耳偷安致一境之生靈銜積年之怨抑徇吠堯而有日思慕舜以無由所以授薑鉞以整師築韓壇而誓衆風馳號令雨驟雄豪上將等威震雷霆心堅鐵石指期剋日必就削平豈勞親駕翠輿躬魔白羽六龍八馬驅馳嶮棧之中萬騎千官迢遞層峯之外方零霜雪漸逼沍寒伏乞聖慈俯聆億兆之情特駐省方之命上為宗社下慰華夷佇對捷書更開土宇臣叨深睿奬倍慊明誠塵浼宸嚴不任待責望恩迫切禱祈之至謝恩賜興聖觀弘一大師張潛修造表臣某伏奉恩勑宣賜左街興聖觀弘一大師張潛令修葺住持者寵自宸衷榮臻道域簮裳增抃芝术騰輝臣某中謝伏惟陛下道均軒后聖並放勛凝懷於姑射之峯寄夢於華胥之境眷言大教理契生津拪神泯合於無為屬念潛期於有德化合清靜善利邦家觀宇蕭條像設塵翳爰敷綸渥載俾葺崇伏以前件觀地接玉清昔為道學尋攺真元之宇復標紫極之宫至德年中易名興聖前臨廣陌東距錦江宛是靈墟實惟勝所況門庭具設像貌儼存誠歷代之仙蹤乃皇都之福地今則重加繕飾盡撤葷腥拂塵埃於湫陋之中還瞻玉相蕩瓴甓於蒿榛之內别築瑶壇灑雨露而騫樹增榮薦沈麝而睟容伊穆張潛等精專剖劂恪勵住持夕磬晨鍾祝遐長於聖壽朝香暮燭期隆永於皇圖臣某獲列教門躬榮睿澤不任之至謝恩宣賜衙殿點鐘表臣某伏蒙聖旨宣賜衙殿前點鐘一口於日院內充齋醮扣擊者恩垂霄漢榮及簮裳抃蹈無階輝華增極伏惟陛下二儀覆燾三景照臨澤浸無涯惠敷有載故得八溟息浪長鯨將殄於昌時五緯循常巨彗欲銷於永夕削平夷夏倒戢千戈而復俯軫皇情留慈玄教致感應於洞府符應見於靈仙固當齊聖夀於日月星辰隆寶祚於乾坤海嶽今者念臣院宇之內簨簴未全每於齋醮之辰尚闕舂容之響既乏通真之器莫諧集聖之儀輟瑶階泛日之音來從天上頒豐嶺含霜之韻降在人間事超錫樂之榮恩重點鐘之賜永當炷焚芝术禱祝真靈冀啓禎休仰酬聖奬所宣賜鐘臣謹以焚香祗受記不任謝恩賜玉局化老君表臣某言伏奉恩勑宣賜舊玉局洞門石像老君歸龍興觀御容院閭下西間奉安供養其蓋石舍一區移拆就觀起立并賜錢設齋道衆將幡花引歸觀表讃等者皇澤雱臨玄門增耀康莊改觀道俗同歡臣某中謝伏惟陛下法道披元垂衣運化暢清靜無為之理敷希夷不宰之功己洽大寧將臻一統以玄元像貌容邇宸居雖香燈無曠於常儀而供養合歸於法宇爰申明命豐備齋羞焚蘭术以飄香森幢幡而成列鐃金鳴玉𦆵離象闕之庭雲邁風行遽入龍興之閣群心瞻仰萬衆歡隨雷喧讃悅之音霧集聖明之福臣與道衆等獲栖大教疊荷隆恩永勵修持上酬睿奬不任之至賀收隴州表臣某伏覩北靣軍前隴州節度使桑簡以手下兵士及城池歸降收復隴州者睿算遐宣元勳效節𦆵申薄伐已復雄城臣某中賀伏惟陛下聖邁黃軒威超周武運神機於掌內動有成功料勍敵於彀中舉無遺䇿自岐郊負義關外隳盟深辜敦好之儀遽絶睦鄰之分擁豺狼之一旅恃疆土於三洲巢折羣以偷安坐積薪而稱固小不事大春秋所誅所以義士盱衡謀臣扼晼皆期殄掃遂舉戈矛六軍奮躍以爭先八校喑嗚而致勇蹴土佇摧於吳嶽飲馬將竭於渭流桑簡以智合變通心明向背倒戈銜璧效命投誠獻千里之山河不施寸創復一方之户口無損秋毫便回亳社之鋒自收商受之衆想回中之路絶退且無歸顧灞上之讎深竄將鼻適料其元醜即見梟擒看通於八水三山永統於九州四海俱頒舜曆盡入禹封臣獲奉昌期纍觀大捷無任之至夀春節進章真人像表天漢元年二月八日臣某伏以皇圖昭永上帝開祥北極瑶樞煥虹光而誕睿中天玉斗飛紫電以凝華萬國歡瞻羣心增抃伏惟陛下二儀炳靈九清集瑞至化塞乎天地清明肅於鬼神肇三十世之宏基方隆周業興四百年之景運佇越漢圖浸德澤於玄儒鼓薰風於夷夏今屬壽春大節祝聖昌辰呼貫雲馳梯航波委咸修芹禮以繼山呼臣與當院道士等虔拂華壇精依祕格諷琅書寶軸披霧韞霜羅克嚴蠲潔之誠永廣乾坤之福鑒聖真人昔師道祖躬受靈篇傳真記於先天緘瓊文於福地豫明皇業洞逹玄樞嵩公之識神堯貞白之知梁武以之校美詎可同年是敢藻繢縑繒式資瞻仰庶因焚炷克嗣禎休千冒宸嚴臣無任祝聖虔切屏營之至其畫像功德數等謹詣閣門奉進以聞伏聽勑旨黃萬祐鄧百經賜紫衣師號謝恩表臣某伏覩恩勑夔州道士黃萬祐賜紫衣仍師號羅江縣道士鄧百經賜紫者大聖御天神功及物廷有賢良之佐野無遺逸之人率土朝宗允當聖日臣某中謝伏以黃萬祐等林永得志麋鹿為羣深處巖蘿罔窺名利或丹華救物有回生駐景之能朱篆誅邪有蕩魅除凶之效皆張道用潛贊明時遽搸鶴書來朝鳯闕萬祐既趨於錦水百經至自於羅江共仰堯天俱榮舜澤歷觀前史莫得比倫伏惟陛下道邁唐堯功髙軒后想汾水凝神之日尚逺九重比洞山請益之辰猶勞載駕今則蒲車允至桂樴云來徑捨煙蘿躬朝旒扆顯封嘉號俱錫服章美輝簡編光揚簮褐不任之至廣成集卷之一
