front:
  text: 内供奉應制文章大德賜紫杜光庭撰
  hash: sha256:2aa77f31fe8027b25c75a553f81c796c084b35c8975b7090be08aadebf587633
body:
  text: 李仇中丞本命醮詞伏以二象陶融三元生化裁成品物亭育群方受命禀形上繫天府至於壽算遐促禄祚短長立身有罪福之因行運有吉凶之數天司地簡主宰無私臣伏恐三命五行或逢災咎九星七曜或值照臨隂陽有刑剋之期禄算有凶衰之㑹又恐積生所犯債未除積世所行過尤旋結常情罔測神道難知非託醮祈無由解謝輙因本命之日䖍備香燈仰玄象以披心對星壇而瀝懇敢希至聖俯鑒丹誠三官落罪簡之文五帝削災妨之籍臣宿瑕蕩滌積釁銷平輟死北宫上生南極天曹增禄司命延年眷屬和寧公私清泰即荷衆聖之恩不任張道衡帝侍還願醮詞伏聞垂象九天流光萬有帝車周運聖力遐通裁四海以無私福群生而不宰惟祈必應有願克從臣頃以大順二年遭逢危厄憂逾蹈火危甚履冰既難保於朝昏敢望全於形命元元丹懇啓愬無門惟注念蒼穹冥祈玄斗潜興大願冀贖深災果蒙大道鑒臨至眞通感垂好生之澤開罔極之恩獲洗罪尤盡消戾仰天而積感報玄造以無階旋屬公役所拘道途無暇華累改誠願未申況復水陸經過江山徃復幾逢俶擾頻值艱危幸脫鋒鉦免罹凶横皆承護倍切兢榮今以本命之辰於玉局靈化詣北斗七元之殿當玄卿大帝之前䖍備醮壇恭酬徃願昔所許奏錢若干貫請至今年八月五度奏納取畢伏惟斗中衆聖玄府上司鑒領丹誠曲迴鴻造使宿願周備賜靈澤遐霑赦過除災延祥介福年禄増益危厄銷平眷屬乂安公私貞吉即永荷斗極衆尊覆祐之恩不任周庠貟外郎爲母轉經設醮詞伏聞三洞寳經九天眞訣虚無凝混合成文龍篆鳯章發跡杳冥之始瓊編玉檢敷宣天地之先大則制御乾坤保鎭劫運安寜祚曆昭祐帝王次則和揖五行調平六氣蠲邪度厄濟物利人遵修則災咎可銷諷誦則禎祥可降臣等以母行年衰厄疾苦所嬰憂懼但深告祈無所敢憑玄聖披瀝丹心伏願勑三寳威神命侍經寮屬解五行刑剋却三命凶衰増禄南天延生司契六府調理百疾痊平永垂覆祐之恩克享遐長之福謹於玉局化轉經設醮冥扣至眞不任莫庭又爲張副使本命甲子醮詞臣聞天道無親輔兹有徳功或及物福必無涯當川安撫副使張琳奉主無私酬知盡節初終一致雖風雨而不渝籌畫萬端越寒而彌勁頃以四郊多壘兩鎭稱兵物力將虛經費逾廣厚歛則生靈必困薄賦則供億不充出自良謀豐其軍食糗糧山積戈甲雲屯人不告勞物無失所益振貅之勢佇成弔伐之功但以張某三命之中猶逢災厄二運之内甲禄氣微天符臨受命之宮土星逆愁煩之位慮爲災咎罄誠祈爰託皇壇旁希玄祐伏願十華降福三聖迴光錫善貺於諸天災殃自息蕩過尤於九府禄算増延永俾安寧共康藩屏臣情誠迫切冐瀆髙明不任駱將軍醮詞伏以二氣清凝表天地亨貞之道五材伏荷乾坤成育之恩至於命籍短長禄祚豐薄立身罪福行運吉凶莫不上自天司旁資元命主張考校巨細無遺臣竊慮列宿五行次有照臨之咎九宫三命隂陽有厄㑹之期以此憂兢恐成災厄今以立冬令節祈福良辰䖍罄丹誠精陳醮禮仰天闕而瀝懇瞻地府以冥心佇降恩慈曲流洪福使災凶殄息過咎蠲銷錫以嘉祥増其壽禄落罪書於北府紀生籍於南昌眷屬安寧幽明康乂徊翔天路長親日月之光棲息人寰永沐眞靈之祐不任馬尚書醮詞伏聞曆象推移運三元而成隂陽變化資天道以宣功澤霈幽明事均今古其有弘仁秉義體順和光則天錫禎符神彰吉貺或動乖守愼志恊回邪乃蹈彼艱虞兆兹否塞影響之報理實昭然臣逈以庸虚早塵職禄雖肅恭自立畏愼推誠常懷聚鷸之譏毎懼維鵜之誚況復訓齊戎伍祗奉藩垣鏑猶施鉦鞞未息摧堅挫銳徒申擒討之謀故殺誤傷慮構幽之咎以兹屬念深用寘懷今則秋帝考功地官校籍罪福咸舉毫末無遺或臣有塵忝之非有殺傷之過有六情之罪有三業之辜有注訟未除有仇未釋事題黑簿名挂隂曹乞垂悔謝之縁並降蠲消之澤俾其克勵得以自新至於宿曜垂災行年值厄亦希超度獲保乂安上祈九祖生天三塗離苦飛沈遂性生植無傷四方之戈甲早寧萬戸之農畢就俗聞謡詠野息氛埃咸歸清浄之風大洽希夷之道䖍修醮酌懇薦章詞遥祝仙壇仰望眞祐不任馬尚書本命醮詞臣以庸微叻承宿運謬叅職秩繼忝官榮統御戎車襲行條令或剋收境邑除蕩奸兇外禦寇仇内綏疲瘵而宴賔犒士須有宰傷去弊誅邪必資刑律誠非徇巳務切安人竊慮斬決之間重輕有失傷殺之際故誤難明以此憂惶恐貽譴責又慮臣行年三命或值凶衰宿曜五星或逢臨照因其厄㑹遂履凶危又恐九祖幽儀未蒙遷㧞六親滯識猶有拘留緬長夜以魂驚念隂而心懼思罄歸依之懇仰申薦奉之誠輙憑本命之辰式備資薰之力冥心靈化遐想寳壇陳醮禮以肅恭貢章詞而精禱伏冀玄元錫祐大道流慈光開泉曲之庭詔下酆都之府使九玄超度衆苦蠲銷生神碧落之天蛻影朱陵之洞福延後嗣惠被宗親其有徃世愆瑕無窮對咸承懴滌並使和平乞臣罪簡落書生宮注籍災凶弭息禄算遐長兼祈福介川源澤覃逺近戈鋋早戢疵癘不生野復耕桑人歸富壽洎乎沈潜異質漠殊庭同沐玄風咸昇道域誓䖍丹懇永奉鴻慈不任司徒青城山醮詞伏以灝氣漸凝羣山挺秀髙扶宸極厚鎭坤輿惟彼西南上通參井結靈積瑞含藏日月之華疊翠堆嵐包括神仙之宅位崇衆嶽祑亞三山爲天下之福庭冠域中之勝槩崇臺比立黄軒之祕跡猶存巨浸旁分大禹之神功可覩毎彰符應以祐生靈頃屬澤踰旬泉源坌涌丹崖翠巘雖傳隕圯之聲紺殿彤軒靡有震驚之變緬兹羣異益驗光靈臣叨荷殊恩膺兹重綏撫之能未著兢憂之懇常深恐臣過咎所招仙嶽降異常之兆災蒙所襲神峯垂警告之祥夙夜省循若據冰炭莫展披陳之路惟䖍禱謝之誠按明科恭申大醮庶蒙鑒祐以贖愆違不任馬尚書本命醮詞伏聞元化運行三才資始體乾坤而成象感陶煦以凝神由是懸命籍於天繫生死於斗極其有行藏巨細舉措纎微八靈伺察以無遺十直考讎而畢至善功潜著則名列仙曹過目所彰則書編録用兹懲勸以導于人其惟本命尊神主張校録緬思玄旨實切禀修臣猥以凡微曽無機畧唯奉公克已效命爲時未展勞能累驚塵忝揣循増懼委任益深況封畿戈甲之餘壠畆榛蕪之後疲羸未復瘡痏未平撫之則濡沬纔通撓之則溝湟甫及而驟司六邑務彼三農暑耨寒耕雖勤劬於人力有秋望殊即俟於天時但罄丹心顒祈玄祐敢因本命之日䖍申醮謝之儀所期眞聖鑒臨福祥臻萃赦臣叨據之過奬臣肅奉之誠使鋒鏑早寧京坻有積人無疵癘之苦年祛水旱之虞俾臣九祖超昇三塗清晏其或宿曜運行之厄年刑剋之災淫刑濫賞之非故誤殺傷之咎並希昭祐普錫蠲消永誓歸依以酬眞貺不任莫庭乂青城本命醮詞伏以禀氣分形上資化主算定禄仰繫眞曹臣伏恐履行之間或貽愆咎年運之内或遇災凶非仗神功難申懴滌干眞鑒䖍備醮儀頃以此山嶽瀆上司神仙福地洞裏之玉樓金闕塵俗難窺人間之古殿荒臺蹤基易變梁摧螮蝀瓦落鴛鴦若無營葺之興巳雜蒿萊之徑某叨居宰字竊備繕修既俾功庸仍申藻繢圖五嶽九江之像貌河侯溪女之眞肅穆冕旒駢羅珠翠如登貝闕似挹驪宫既輝煥於素垣益深嚴於德所冀少城天府永頼休禎秋報春祈克承嘉祐敢因元命之日䖍修讃祝之筵伏惟應念迴軒分靈降澤錫臣以増延禄算助臣以消解災凶兩地之骨肉安寧一境之生靈蘇泰誓傾丹悃上副鴻慈不任莫庭乂青城甲申本命周天醮詞伏聞妙本應期元精啓運三光分照萬有陶形圎清方濁之間逓爲主日域星之内各備職寮大則司劫曆施張小則察人倫善惡有逾衡鏡無隱鋒毫竊惟九室洞天羣眞㑹府丹崖蕩日翠谷呀雲鸞旂之所徃還霓節之所遊集叨膺宰字獲詣仙山雖食蘖苦心飲冰潔巳功應無過必彰聞況於咫尺之中敢罔眞仙之鑒更慮九辰行運三命推移福善不常災凶靡測拳拳素懇若履顚危因本命之辰載申祈醮之禮天衢地壤水府星宫咸罄血誠仰祈明祐伏乞解災釋過延貺垂祥壽禄惟増凶危自息已往則九玄開度見存則兩地安寧一境生靈同承福兵車休駕封部無虞長欣静謐之期永荷靈眞之澤不任莫庭乂九曜醮詞伏以二象分華三元列曜司悔吝吉凶之契操死生罪福之權主宰無遺幽明咸繫臣自惟凡昧夙奉正眞叨荷寵章獲叅位禄循涯省分常懼於曠官恤物安人敢忘於勵巳尚慮動違恭愼日積愆瑕上瀆眞靈潜貽厄㑹又恐五星進退四曜運行或居身命之宫或臨惡弱之位況臣今年天符臨於命卦木星未出身宫第二十宿中蝕神所歷小運行直又值天羅竊憂福過災生命衰禄薄按河圖内品太玄祕文瀝懇貢詞披心備禮仰華盖儀璘之闕若對九芒瞻星辰日月之宫盡傾丹欵伏冀宸光下燭開昏晦而洗沈㝠靈景延暉碎禍車而焚罪網使年齡克保品秩攸昇一境之士庶康寧兩地之親縁安泰仙山表貺人無瘥疫之傷靈府垂禎有京坻之望唯䖍素悃上答玄功不任川主相公北帝醮詞伏以七政上尊五靈玄老位司北極部制中天至於地分吉凶天文災福五行六氣三命九宫萬彚舒咸歸考校臣以兵戈既乆殘瘁逾年念彼生靈痛深肌骨敢因醮謁載罄祝祈瀝懇紫微扣心玄象實希憫鑒俯降禎祥消沴氣於郊原退災星於井絡一川康泰萬有昭穌永戢戈矛惟新禄算九天霧卷重披日月之光三蜀煙清再播雲雷之澤即仰荷帝君憫護之恩不任川主相公周天后土諸神醮詞伏以天府名區少城奥壤龍神福地天帝雄藩豈以凡微叨兹臨鎭而謬分朝緫此封疆十載于兹日深兢懼但以粤莅任便屬艱難黄巾犯秦翠輿幸蜀行朝萬衆駐蹕五年力盡扶天誠深報國功宣匡復以及迴鑾其間有師立稱兵旰能竊發秀昇擁師於下瀬郭琪奮臂於中軍咫尺乗輿震驚輦轂上資睿武旁假神威相繼克平以安大駕感兹靈祐常貯血誠今則時未厎寧人方肆亂帝車順動又幸陳倉中原有焚燎之災六合靡晏寧之所雖誠深憂國志切匡君難申嵇紹之忠山川杳隔空抆安之淚扈衛無由緬想神功必垂濟祚爰申醮禮仰冀靈通希迴助順之恩共安天歩少借害盈之力逺掃兇渠復黄屋於上京延寳圖於萬葉椒漿之奠永答明慈臣不任歷懇披心䖍請之至仙山化醮詞惟彼仙山鎭兹坤壞八十一洞分日月於地中二十四峯繚煙霞於天際潜司罪福以統生靈臣夙慕玄微早崇清静躬逢聖日既叨輔賛之榮夢想靈山常貯逍遥之志尚縈多事徒鬰素懷今節及仲秋禮當望秩遐瞻翠巘杳隔紅塵䖍備醮壇用申誠祝伏冀虎旗龍斾逺辭八極之宫鶴馭鴻降三仙之駕歆兹薄禮錫以殊休俾稼穡有年凶災不起幽明共福家國咸安比帝祚於崇岡續唐年於劫曆必期修潔以奉靈光不任川主九星醮詞臣聞九元御極綜列宿於紫微七政垂光統衆星於黄道指攝提而臨萬象運招揺而主百靈生死吉凶咸繫司牧臣以受年之時此月火星及暗曜罡星皆臨本命以兹戰悚恐蹈災危敢以丹誠上祈玄祐䖍修大醮備微伏惟九聖延慈乗帝車而降福七眞垂貺迴杓建以祛災二十八宿行藏皆資祥慶一十二宫分度永息屯蒙誓勤忠赤之心以答靈眞之念不任中和周天醮詞臣以庸虚猥當大任極台衡之抶居藩屏之崇雖傾捧日之心莫著匡君之績頃以四郊多壘中國不寜戎馬載馳兵車尚駕或近臣肆逆或逺鎭辜恩纔滅梟巢初迴鑾輅又聞薄伐再致省廵凡在人臣豈勝憤惋惟炷香冥想望聖祖之貽休拜表祈眞待隂兵之助役果見僞王孽相連頸殱夷兇帥朱致繼蹤斬馘緬惟幽讃更切明誠近又太一運行巳照蜀分五星移度或在身宫慮薄德所招即凶災荐至常加惕勵罔敢遑寧遂有鄭君雄韓球兩地結連遽興兵甲隔絶恩信凌犯聞防殘掠生靈焚燒郡邑數州塗炭千里傷夷憫此幽痛深骨髓臣所以上祈至道明禱眞靈志先憂國憂人誠匪爲家爲巳由是上天悔禍大道降靈包藏者㝷就誅鋤黨附者皆從剪撲封疆繼静凋瘵旋穌韓球敗亡君雄梟戮漸通道路將雪沈尚以芟刈之時殺傷非一仰則好生之旨震悼何安俯嗟遊岱之魂淒凉莫巳是用凝神扣寂拜手歸心陳謝恩謝過之儀祝地祝天之懇庶祈玄聖曲鑒丹誠輝映清壇降流洪澤蠲除愆咎弭息災凶使生者乂寧幽途開泰臣又聞衆星拱極百谷朝宗蠢彼不庭敢違天道更隣近境綿亘數州山寨相望乆爲兇逆欲恃其蜂合蟻聚之勢仗鋤耰白挺之徒垂二十年不賔睿化擬因掲瓴之便將申破竹之功爲國誅奸與人除害重希神力克震軍聲鄷都以三十萬兵常祛沴氣洞泉有二十五將制妖徒正道殛邪神明助順敢縁斯旨再罄赤心伏惟俯鑒奏陳克迴明祐使昌瀘梓遂永無蛇豕之災草木藂林盡化鋋之狀咸知帝力主復王謡然後疇賞龜城拜章鳯闕弢弓解甲歸馬休牛長諧魚水之歡克暢君臣之道明明血懇大道鑒之不任歸命祈恩屏營憤切之至謹詞廣成集卷之十廣成集卷之十一敢十一上都太清宮内供奉應制文章大德賜紫杜
