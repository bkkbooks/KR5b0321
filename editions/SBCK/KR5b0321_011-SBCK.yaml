front:
  text: 光庭撰
  hash: sha256:fc803c7d7f2ddf80e0a14b718c1b768645f1bd65e3bbf4a8f94f7d5558146182
body:
  text: 程德柔醮水府修堰詞伏聞大道垂功裁成品物眞靈設位主宰群生至於水府明神山林正職各司罪福以庇烝當縣地控上游素名劇邑賦輿重大耕稼兹繁堤堰所防安危是繫某所修堰分當彼濬流自汎溢以來累有摧壞雖俾夜作晝竭力焦心旋有葺完㝷聞傾䧟豈水脉所注不可備防豈龍神所爲未容障塞憂惶迫切無所告祈且食乃民天人爲本或虧秋稔必致年凶況天府膏連下瀬少城戸口旁按通波若爲侵軼之災必有泥沙之變救兹墊溺須仗玄威伏惟大道開恩明神流鑒愍其農畆念彼生靈迴不測之神功借無私之聖力特垂濟護俾獲安全使稷永豐京坻有望息襄陵懷山之禍叶年豐俗富之期蘋藻効誠敢靈貺不任川主醮五符石文詞三寳開光五文孕化凝水火木金之氣成雲霞龍鳯之書保制乾坤鎭寧天地洎乎降傳下土濟護群生夏禹得之以成功仲尼奉之而興詠有家有國罔不遵修所以伏御神祇鎭安川嶽禳除氛沴清肅宫城至於居宅之興亦在鎭禳之例臣頃於所部特創新居既畢巨功爰申大醮按河圖品格依靈寳文儀刻眞符清修香火所冀解銷犯觸安集正神召彼靈官永垂擁衞伏惟玄元鑒祐衆聖流慈勑勒職司錫其禎貺居止寧泰眷屬康安分近天皇大火之郷況屬身宮或鄰對照捫心震惕循巳驚虞是用瞻本命福山仰列仙靈化歷三元而禱祝遍九曜以䖍祈伏冀洞府神眞披香奉御玄天尊聖垂澤降臨賜臣以景貺禎符解臣以災期厄㑹克承祐護允洽康寧上願皇業天齊聖圖嶽鎭伊川洛汭運叶中興八水三山俗諧昭泰戢鋒鋋於九野共文於萬方臣得勵忠貞永扶英睿不任蜀王爲月虧身宮於玉局化醮詞伏聞大道縱靈元和肇化燭三光而上列運六氣於中天播裁成字育之功物無不遂持寒暑暄凉之柄政無不均所以五星秉大帝之符司明罪福十神行太一之令統御吉凶律曆難欺古今所禀臣遭逢聖運塵忝殊榮山河控井絡之雄封壤握坤維之重常虞福過實懼災纒今則凉德靡修太穹垂戒月朔則太陽薄蝕當對照之方既朢則太隂變虧在身宫之位飛天火曜臨於命辰干禄納音仍逢衰氣恐成災咎彌切憂惶是用遵按玄科勵精丹懇奉香羞於玉局陳醮禮於瑶壇仰三景以希恩普周天而禱福伏冀照彰俯鑒肹蠁垂休錫禎貺於三命五行解災期於身宫分野至有故傷誤殺徃債宿咸賜蠲除永俾貞吉上願皇圖攸乆聖壽延長還秦符大漢之隆宅洛契宗周之盛干戈偃戢夷夏昭蘇得傾報國之心克叶自天之祐不任激切䖍祈之至謹詞安宅醮詞伏聞道氣流布三才乃分隂陽陳變化之機水木肇相生之象巢穴之風既替宅宇之作遂興順二氣以營修體五行而制度實資神化大庇生靈臣以庸愚不明玄理因時改作隨力興修土木之功曽無避忌穿鑿之處深有驚喧或抵犯王方或背違天道致使龍神未守居止非宜恐迫凶衰更延災厄謹歸心大道稽首三尊按靈寳明科修五帝大醮䖍恭懴謝拜請符文懴巳徃犯觸之非祈將來安寧之福伏冀二儀介瑞五帝垂祥凶惡蠲除龍神鎭守人口清泰動静康寧營運興生常蒙利祐公私和暢眷屬乂安即永荷太上衆尊五帝祐護之恩不任八節醮詞伏以大道垂化元氣流形鼓鑄群生有清濁剛柔之異舒張八節定春秋冬夏之方所以考校吉凶司明罪福惠既周於家國恩亦普於存亡臣等獲值昌期早欽道化資神功而生育荷聖力以裁成竊慮處俗立身寧無過咎前生今世必有瑕或五行三命之中遭逢厄㑹或暗曜明星之下因值照臨以此兢憂思祈醮爰逢令節同竭丹誠是天元啓候之期當大聖延慈之日翹心靈化稽首瑶壇精潔香花䖍恭醮祝伏冀髙尊鑒祐衆聖哀憐垂罔極之慈賜無疆之澤使積生罪惱累世仇巳徃非將來戹運乗八節自新之力降三宫肆赦之恩並賜蕩除永錫貞吉使臣等九玄七祖受福祉於南宫眷屬親縁落死名於北府公私和洽壽禄遐長即永荷衆聖祐護之恩不任都將軍周天醮詞伏聞大道混融群材昭著隂陽昇降吉凶之理肇分善惡循環罪福之文是啓玉虚大帝金闕元皇申命眞靈俾其主宰三官五帝爰居勸沮之司南斗北元以統死生之録洪纎備舉億劫無差所以丹簡玄經有修禳之祕訣祈天悔過有懴滌之明科竊仰弘慈敢陳微願臣膺宿㑹運偶昌期猥以凡庸遭逢異寵伏念戴清履濁寓世立身事主奉親自家刑國雖忠貞勵節勤瘁在公而休祉難臻愆違易集況臣頃因扈䘙時屬艱憂豺豕欺天雰霾蔽日層巖瑞氣但布護於帝車九陌妖塵正昏蒙於輦道乃忠義奮身之際是人臣効命之期得以手捧天樞身排鯨浪克寧皇極以罄丹心遂叨非次之恩遽荷重難之連營武千里隄封慙無監撫之能但切兢憂之懇竊恐臣前生今代歷劫以來未達正眞動成罪目或上虧天理下犯地宜中忤人情旁違物性十外積三業内興或助順除奸誅邪佐命或故傷誤殺乗法持綱或星曜運行時逢臨照或三命經歷因值衰危八卦九宮有刑妨之數仇債訟有考對之文幽晦常情眇然難測唯資修奉上叩玄虚冀獲感通克承覆祐是用按河圖眞格披正一靈科溥海嶽以貢誠遍乾坤而瀝懇恭陳醮禮以展肅䖍伏惟三寳迴光衆聖流鑒赦其宿過錫以殊休罪簡蠲消生名列品和平債清蕩災凶九玄七祖同霑洪澤六姻九族咸沐玄慈俾川境安寧生靈輯睦俗無疵癘野有謳謌幽府㝠司神輝朗徹飛行蠢類惠渥滋濡上願國歩夷平聖躬和暢五兵弢偃萬㝢乂康鑾旂早復於秦京象法重懸於魏闕瞻天望日言發心馳不任衆修本命醮詞伏聞大道垂光三靈資始人天設位萬化互分禀氣有清濁之殊賦運有吉凶之異昏明既判罪福亦彰於是太上弘慈元尊愍護南上闢延生之府北都陳銓善之科兩曜列星布無私而照燭三官五帝開大宥以君臨蓋欲使共洽無爲俱臻清静品登道果名列眞階臣等叨沐神功逢昌運聞玄儒之妙旨履仁義之康衢坐挹堯樽行謌睿德揣躬省已榮抃伏深但慮徃劫此生立身舉措動成違戾率忤幽明六情之愛染難祛三業之愆非易積文昌簡上未紀善名酆部宫中巳摽罪目又恐行年災咎宿曜加臨或土木興功犯干禁忌或故傷誤殺結聚尤遂使暗奪年齡潜消福禄非憑勝㑹難冩深誠今屬白露凝晨清秋屇節是懴罪祈眞之日乃延恩致福之期率慕同誠歸依至道齎持法信稽首靈壇遍天府以披心望星宫而注想伏冀三元上聖十界衆尊南極威神北臺寮輔念其䖍懇降以光靈流福祚於存亡息災凶於永逺使臣等九玄七祖咸得生天五族六親並蒙安泰罪瑕除蕩禄壽延長門宇清寧運求諧遂五行三命永無刑剋之災私室公庭長荷利貞之福不任張道衡還北斗願詞伏以玄象垂光物無不照帝車周運感無不通臣以幽微仰蒙鑒祐頃以大順二年身陷危厄性命是虞瀝丹心上祈玄造遂發誠願奉錢十萬貫文旋獲安寧克蒙清雪螻蟻之生巳保眞靈之澤未酬㝷以奔迫道途辛勤南北難逢良㑹莫報宿恩冰炭在懷食増懼今則歸心靈化稽首瑶壇䖍備香燈精修醮酌自今年四月至今月五度奏錢滿十萬貫兼於玉局化北帝殿塑造北斗眞君八身功德用申素懇上答玄恩伏惟聖慈曲賜昭納使誓圓昔日願滿兹辰宿罪蠲消餘災蕩滌仇和解年禄增延公私叶貞吉之期眷屬享乂寧之福存亡咸泰品彚沾恩不任行軍僕射醮宅詞伏聞大道融眞天尊演教赤明御運靈寳開圖八㑹成文凝結太空之表五符流跡昭宣大有之中五帝受之以度人九天得之以定位降於下土護國濟人摧伏兇祅誅滅邪惡凡所興造皆許遵行臣頃以營繕所居土木將畢恐有干犯難備考詳竊按玄科請行符命修崇黄籙奏清都刻五方太帝之文依三洞鎭禳之格下告五土上奏九微伏願衆聖垂慈萬靈孚祐勑命符吏頒示職司降以威靈布其眞氣蕩除魔恠安静龍神八卦九宫五行六甲隂陽刑殺太將軍各鎭方隅永祛災咎其有伏尸故氣金土邪精滯爽遊魂幽靈暗魄各乗善力俱遂逍遥克保安寧永臻福祐不任衆修三㑹醮詞伏聞人之禀生資於二氣隂陽定體魂魄守身稍或愆和即成災否三㑹之日是三魂攅奏之辰罪福吉凶纎毫無失増壽奪算賞罰甚明所宜積善除非立功過用祈吉應以保遐齡玄聖格言眞經明訓敢不遵守以戒身心臣等數年以來於下㑹之日共申祈醮以罄焚修昨者迫以塵縁偶過佳節中心憂惕不敢遑安今則别選良辰旁招善友同營香火特展醮祈静夜寒更心注念眞靈必降誠願冀通伏惟萬聖迴光千眞鑒映錫其禱祝除彼災凶制魄拘魂各遂修生之望迴凶變吉咸開遐永之程臣等或三命衰微九宫厄滯或星文臨照災運縈或宿債未平餘殃未息或故傷誤殺積過深瑕俱乞蕩除克賜昭祐合家蒙福九祖生天公私有通泰之祥眷屬荷乂安之澤不任皇帝設南斗醮詞伏以三光麗天照臨萬有衆星垂象統御群形南斗文昌實掌主籙爲正陽煦物之本乃帝王壽命之司按天元上清等經若五月五日值丙午之辰則啓福延恩濟生利物和寧品類安鎭家陽德所資普亨其福今年以火水金土四星聚於實沈之墟又逢日度所經皆爲順伏五月合朔太陽當蝕而不蝕洎乎既望太隂當虧而不虧斯乃五日得丙午之辰純陽所應顧惟寡昧欽荷玄功慙化理之未周念聲教之未普敢期流貺以及微躬所願大道延慈上天錫祐俾九州四海俗泰民康年豐而六氣均調候正而四時和暢弓偃革歸馬休牛咸臻保命之祥克廣好生之德冥心丹禁稽首玄壇曕八景以低臨冀九光之遐燭鑒兹醮酌介以禎休辰輝炳靈幽讃之功巳著人天交感恊符之契可期佇混車書大同寰宇式䖍祗荷上副玄慈不任皇帝周天醮詞臣聞風雨霜雪之不時則星辰示象蘋蘩藴藻之可薦乃天地垂休緬是前修實爲通論臣恭臨大寳䖍奉丕圖不敢遑寧若臨冰谷而頻移圭律七變槐檀慮兆庶未康恐一物失所或刑政乖謬或恩信未孚干戈猶駐於疆正朔未同於夷夏水旱不節富庶莫臻昏墊札瘥繼聞於郡縣盗賊欺誑尚恣於郷閭雖則務嗇勸分貶食省用不邇聲色永絶畋遊瓦器蚌盤敢忘於刻巳雉頭虎魄豈事於娯情猶慮上曹重書厥罪顓蒙有愧首謝無由近則金火二星水土兩曜併聚蜀分皆次實沈日月爲薄蝕之期朔望却史臣之筆太陽順伏分野垂休豈此禎祥併歸冲渺益勵退修之志彌彰戒懼之心敢因午日之嘉辰聊答上玄之厚貺靈官邈紫府深嚴雖昭告之備申慮誠明之莫逹齋潔選日懇悃陳詞寂寂玄壇儼威儀泠乙夜飄飄仙賢降福祐於人寰伏冀八表乂安民清泰家鞏固社稷永寧六府孔修九功攸叙簮奉職書軌同文不任醮瀘州安樂山詞伏以楚蜀連封西南重地江馳萬嵐積千峯天帝以之㑹昌龍神以之固護惟兹奥壤獨擅雄名三層燭煙月之光八洞閟靈仙之宅常弘勝利以祐蒸人年無旱潦之傷俗保安貞之吉致泝㳂之攸濟俾絲枲之蕃豐銜三觀威靈荷二眞慈貺傳諸逺近載彼經圖翹首注心共訝玄澤臣名拘輦轂望切林泉毎憐素豹玄猿常戲芝巖桂岫延頸企踵跡滯神遊輙䞇微香遥陳懇臣以所居北帝院齋醮所給鍾未周雖申降福之儀㡬闕飛霜之韻始聞仙山之内法器且多既無考擊之期虛蔽鏘洋之羙道隨誠感鍾固可移願減有餘資其不足輟於翠嶽遷就皇都清聲漸逺於彤雲洪響佇聞於紫禁願俞誠祝永鎭京華不任廣成集卷之十一廣成集卷之十二
