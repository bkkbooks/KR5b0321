body:
  text: 鎭江侍中宗黯解䌫醮水府詞伏以道化所覃神休普上惟國下及人倫咸資拯護之功潜假保持之力古今無爽水陸攸寧臣猥以常材叨逢聖運經綸締搆慙無竹帛之勞渥澤超昇累荷乾坤之造遽蒙睿奬顯授兵符登韓信之齋壇授吕侯之金錫茅分閫推轂專征省循徒切於兢榮注靡容於陳讓選辰㨂日遄命啓行況楚硤上游錦江下瀬舳艫則千艘拯駕泝㳂則萬争奔寔用眞靈緫斯隂隲皇帝宸所屬毎切敬恭思布化以睦鄰亦申謀而懷逮雄師銳旅首在此行將解纜以乗流爰潔誠而致醮伏惟玄元大聖五老髙尊命靈將玄司助洪休巨福迅浪皆期於利渉驚湍盡變於安流萬里通津百神加祐克昌大業更廣鴻基外屏中朝共臻禎福不任周庠貟外塡本命醮詞伏聞天鑒孔明有感斯應神道正直無祈不通毎垂拯護之仁以副禱祈之願祛災流貺猶響應聲竊佩斯言常䖍片志毎因元命得備焚修式勵深誠實荷明祐但慮塵機未息過咎易盈宦路所拘悔尤難逭因星辰臨照值年運衰危但懼災敢思福㑹自從軍鄰部寓跡外封一駐戎軒兩周天序旣闕奏陳之禮必招逋慢之愆本俟凱還併申醮謝今則方當劘壘未議橐弓久曠香燈不遑寧處是用馳心靈觀叩至眞備三醮之物儀同一壇之告伏惟玄聖俯鑒丹誠解厄消災延生保命宿瑕蕩滌徃咎蠲平克覩成功永臻多福不任大王夲命醮仙化詞伏以二氣資靈五行禀象法圎穹而定命體厚地以流形罪福吉凶皆由隂隲運心履行咸繫主張況荷殊榮乆叨重循涯省分常切兢慙毎因章醮之壇敢忘敬恭之禮冀憑修奉上答君親今屬元君之辰詣本命靈化精誠香火祈扣眞仙願鑒丹俯頒鴻福俾臣罪瑕除滌壽禄増延彊㝢乂安生靈康泰災毒無侵於四境農桑克羙於有年得傾葵藿之心永奉昇平之運不任歸命䖍誠之至大王初修仙化告眞詞伏以九隴名區三仙化跡上通心宿下鎭錦川雲霞疊綺繡之光松桂竦煙嵐之色五宫髙闕狀西靈南極之儀四輔交輝列東華北眞之像最摽形勝獨占幽竒斜界玉輪旁臨石磵而屬師徒俶擾鉦鼓震驚火彗横空霜戈照野熊經鳥申之士抗歩不還漱流枕石之人拂衣長徃眷兹勝異一變榛蕪崇樓之金碧塵銷廣座之儀容蘚剥緬惟殘毁深可歎嗟況某本命之辰配於兹化宜申締蓇用答眞靈乃命三洞道士唐洞卿伐木鳩工揆星選日得風箕直事當甲子良辰䖍告至丨恭修大醮伏冀鑒其誠懇錫以休祥災沴無侵功庸速就續昔賢之遺搆成曠劫之良䂓播羙洞天勒銘雲谷然願眞靈誕祐川境謐寜稼穡滋豐災氛殄息受靈丹於九輔聞至理於重玄常傾拱極之心仰副上眞之貺不任懇願之至親隨司空爲大王醮仙化詞伏以上清仙山葛眞靈化爲川中之勝境乃天下之福庭呀玉洞以箴雲聳瓊巒而蔽日彩霞朝散神燭夜飛乳滴幽巖泉鳴深竇九井之光靈自顯三眞之肹蠁常存拱鶴觀於中方應龍星於上境紅軒紺宇舊制相望蕭殿韋碑古跡鱗次毎彰休瑞以及寰瀛臣以本使蜀王元命之辰配屬兹化頃申締蓇遽獲周圎飛閣層樓奪晨輝於峭壁風窓雲棟増異境於崇林再敞洞天用安錦府四十州之封域稔京坻五千里之山河俗臻富庶人皆受賜孰不知恩臣曲荷陶鉻實深造化唯䖍禱祝少答恩慈備醮筵上祈道力伏惟九天孚祐衆聖鑒臨下燭丹誠廣垂洪澤三川鏡廓八國塵清稼穡蕃登災氛蕩滌神傳靈藥克享於遐年功讃聖朝永隆於大寳再安社稷常福寰區臣不任禱福希恩䖍誠歸命之至謹詞冉處儔還北斗願詞伏以垂象上玄照臨下土帝車運載杓的指揮罪福吉凶咸歸主宰臣等頃因銜命逺渉道途踐歷艱危登臨險阻毎持丹懇潜祝玄眞果蒙鑒祐之恩克獲安寧之貺仰承靈澤志切上酬敢因某日之辰䖍備焚修之禮炷香答願拜荷玄恩仰冀髙眞採納微欵祛災蕩厄増禄延齡來徃坦夷公私貞吉路岐無滯眷屬咸安常親日月之光克奉休明之主不任紫霞洞修造畢告謝醮詞伏以大道希夷神仙變化示無方之妙用垂不測之玄功幽讃帝王潜抶國惟今及古史冊煥然所以唐堯姑射之遊軒后具茨之謁周穆之登瑶水漢皇之崐山皆披眄煙霞瞻窺冰雪是用享年遐永致理和平克振宏休允彰道祐顧惟涼德啓創丕圖金闕玉京敢怠敬恭之禮九清三境毎懷寅奉之誠粤以永平二年壬申七月二十一日丁卯漢州什邡縣獲太上老君錫命䜟文留玉篆於仙居刻銅符於厚地生辰命屬時日姓名叙奕世之蟬聮明卜祚之延乆四年八月二十四日戊子利州團練使王承賞奏此山靈洞顯見神仙遂命威儀任可言髙品楊知淑專申告謝仰答光靈十月一日甲子啓醮筵再聞應見雲旌羽斾參差崖壁之中鶴態神儀羅列洞門之内事邁於回山瑶水羙超於姑射具茨祗荷禎祥彌増震惕是用考諸典禮特舉封崇以是月甲申改道長山爲玄都山陽謨洞爲紫霞洞景谷縣爲金仙縣封玄都山神爲玉清公創厥壇塲鼎新觀宇自揆搆逮于畢功累見眞儀益彰靈貺謹遣金紫光禄大夫左諌議大夫廣成先生蔡國公杜光庭等一十二人賷信幣香花按玄科具典於紫霞仙觀修金籙道況屬下元允當大節式陳昭謝再顯旌封伏惟洞府衆聖髙眞仙官寮宰鑒兹丹懇錫以玄休使九土乂寧萬方平一天宫地府常垂愷悌之恩卜世享齡克叶延洪之福稽首謹詞洋州宗䕫令公本命醮詞伏聞誕質流形咸資大道禀生賦命必繫上玄荷乾坤覆載之慈均氣運陶甄之力惟精修勵寅奉眞靈伏念臣獲以微塵累叨皇澤入參輔衞出領藩維曽無㳙露之功常切㵁盈之懼今則暦象之内身宫之中暗曜正臨火星對照慮成厄㑹無所告祈竊惟太上垂文元皇設教正一著修禳之品河圖有陳醮之科苟罄精勤必蒙昭祐敢因本命之日爰伸九曜醮祈蠲潔丹心歸依玄極伏惟衆眞大聖俯鑒明誠蕩滌罪瑕解除債消平災厄延續年齡増禄祚於南昌落凶衰於北府洗心克已上酬眞聖之恩奉國推忠永答君親之德臣不任又本命日醮詞臣聞天地之德以生爲先生成之恩以福爲夲臣叨承福㑹獲奉昌期蒙三光照燭之慈荷聖主儀隆之澤便藩寵遇履歷顯榮毎虞於福過災生惟切於持盈約巳彌増惕懼豈敢遑安今則次之中身宫之位火星對照暗曜正臨仰垂象以㝠心何階告謝顧微生而勵志但切憂兢是敢於本命之辰備河圖醮禮䖍披丹悃冀降玄慈伏乞賜臣災咎消平凶衰殄息壽年増益禄祚豐延得傾嚴奉之誠永答至眞之祐越國夫人爲都統宗侃令公還願謝恩醮詞伏聞至道玄通隨機赴感冥丹心於下土動玄鑒於上清響答無私影從靡隔妾夫王宗侃男承肇等去年以統戎伐叛勤國勤王俯迫城遽淹旬月烽煙警急音問寂寥瞻褒以魂馳望山川而目斷憂危徒切祈叩無門遂䖍詣道宫乞申章奏嚴陳法席降請天兵肹蠁感通眞靈保祐俄開堅壁大破兇狂成掃蕩之功副聖明之奬骨肉團聚師旅凱還剋平實自於睿謀護助亦兼於道力輙因良日昭答玄休重申章醮之儀式馨謝陳之禮精心備信拜手然香仰眞駕於三十六宫祈大儀於八十一好庶祥輝炟爚低臨壇墠之前巨貺滂洋永錫家之吉聖圖遐永舉族蕃昌誓勤嚴奉之誠克副靈眞之煦不任荷聖謝恩䖍切之至司封毛絢貟外解災醮詞伏聞道氣宣行玄功鼓鑄三靈資禀乾坤司覆載之權五緯操張寒暑柄推遷之運由是挺生賦命咸繫天楅善楇畢由神化是宜恪勵以奉靈休粤自㓜冲即逢聖日便藩異奬寵沐殊恩北省南宫亟榮於踐歷紆朱曵紫巳極於輝華常推報國之誠毎切律身之戒尚慮隂陽揆課或值凶衰厄曜運行或爲臨照興功動土有忤於龍神履行立身或虧於畏愼未申析懴倍用兢憂今則立運臨於命辰天符飛於艮地大運在戍仍值魁罡土星方伏於身宮所照對衝於丑位懼成災咎彌用驚危伏聞南府文昌主生銓善北宫斗極舉過懲非吉凶無爽於錙銖報應有同於鏡象眞教開懴陳之格惟感必通玄經垂醮謝之儀有祈皆應輙因吉日䖍備醮筵披丹誠冀迴眞鑒伏乞賜臣解消災滯蠲釋凶衰厄㑹平夷過尤除蕩更増禄算允介福祥誓勤忠孝之䂓上答君親之念永銘素懇祇荷玄慈不任謝過祈恩懴災之至謹詞張崇㣧修廬山九天眞君還願醮詞伏以軫翼雄區匡廬眞躅位尊五嶽地控九江玉闕金城包括神仙之奥府鑪峯雲蓋含藏眞聖之髙都宛然凝碧之中逈秀洪波之上毎申瞻禱必介福祥臣頃以謫宦九重漂蓬一葉途經閟境心禱上眞冀迴濟祐之慈必備掓漿之獻精誠既啓肹蠁垂徴㝷以路阻戈矛波驚艫艦帆有隔假道言歸常貯素誠未酬玄祐今則頒宣聖澤棲憩蜀都㝷禮道宫追思宿願申醮酌恭達明誠竊聞惟感必通道無不在期迴羽仗豈云萬里之遥少降科車不以三川爲逺納兹丹懇顯錫鴻休前願克圎殊恩遐被乞爲臣更蠲罪録永削災纒成匡堯讃禹之功享二首六身之壽得傾忠孝以奉君親誓當修勵䖍恭依歸道力不任張崇胤本命南斗北斗詞伏聞三靈肇位萬象禀形體隂陽之至和韞天地之眞系於是挺才賦命各有職司主死領生互分揵纎微具舉考校無遺臣伏慮前世今生至于累劫愆違易結罪咎旋彰秉持未契於神明履行或虧於恭恪因星文臨照值年命凶衰遂搆災危罔知禳謝今則躬依玉化䖍對瑶壇選卜良辰肅陳醮禮伏冀南宫六聖别賜生名北斗七眞明祛死籍三宮削罪五帝除灾酬徃願於名山降休祥於聖澤又臣既頒詔命將赴闕庭江山有登泛之憂水陸有舟車之險實資明祐俯契深誠獲達帝郷克賜元吉敢忘修奉上答眞靈臣不任漢州王宗䕫尚書安宅醮詞伏聞太朴肇分三靈設位巢穴之風既替棟宇之制聿興太古聖人隨時立教蓋所以庇寒暑燥濕備風雨晦明其後象類滋繁擬議殊廣錯之以乾坤震兊體之以徴羽宫商推彼隂陽運其刑德乙辛庚癸互列職司子午丑寅旁羅主宰六神四殺之界龍虎交馳五黄九紫之郷禎祥藂萃法覆載而成用揆星日以程功乃考吉凶實聞顯據所以鵲隨太鷰避將軍況在最靈敢忘戒懼臣頃以所居室宇淋陋非宜遂卜良辰再申締搆取諸大壯棄彼僣奢慕剪茅築土之風佩山節藻梲之戒汚墁云畢土木告周竊慮畚所興或違禁忌功用之際或犯神靈乖五姓之宜虧二宅之要或侵傷地脉或穿鑿岡原或汚瀆吉神或鎭壓凶位因成灾咎曽未懴陳是用詳按玄經勵精丹懇䖍修大醮恭請眞文啓靈寳赤書依洞玄符命辟斥凶惡安復龍神謝過延恩祛災請福伏冀三尊降鑒五帝垂光勑八㑹威靈命三元將吏保寜宅宇清肅方隅赦巳徃之罪尤賜將來之貞吉允膺祐護永遂乂安其有住宅之中土地之主古今遷易五姓雜居因此醮壇兼申奠祝歆兹誠禮各保逍遥徃陟福庭勿爲疵癘俾臣舉家蒙澤九族同榮常傾忠孝之心以奉君親之德不任馬師穆尚書土星醮詞伏以一氣分華三光摛耀照臨群品司牧萬方遵黄道而有常麗玄穹而不紊大則繫乾坤劫曆國興亡否泰所宗安危攸屬次則人倫善惡年運吉凶祚暦短長咸歸主宰臣以身宫之内土耀所經本宿之中暗虛所歷大小行運皆值衝妨命位之郷天符所駐災危重疊疾厄嬰纏徒訪三醫未祛久疾恐是積生罪目搆此凶衰徃世愆違成兹滯厄或理務之所刑賞不明立身以來過尤結集神明咎責年命屯蒙夙夜憂競願申祈謝是用考詳纏緯披按科文恭詣靈壇虔修醮禮仰中方而懇瞻列象以馳心拜手炷香披誠悔過伏冀玄司衆聖垂大有之慈至道髙尊降載生之澤蠲除罪犯解削災期和釋冤仇銷平殃對使百宣暢六氣均調疾苦痊瘳福祥臻㑹延生南斗落死北宫克承覆祐之仁敢眞靈之貺廣成集卷之十二廣成集卷之十三毀一上都太清宮内供奉應制文章大徳
