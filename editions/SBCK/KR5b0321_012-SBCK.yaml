front:
  text: 醮名山靈化詞伏以大道融精是分二象元尊布化以播萬靈咸禀運於裁成共輯寧於國欽哉群望寔緫休禎伏自應天順人開基創業雖未致昇平之理而成富庶之郷四國爰來百辟咸在人心允若天意昭然而或教失義方情牽慈愛付粢盛之大任委監撫之重權庶人元膺益恣胷襟都忘孝敬用奸邪之扇惑興背叛之兇狂矢石欲及於乗輿金鼓近喧於侍從猶頼上天垂祐靈化降祥不容梟獍之心坐殄犲狼之薫未更昏旭悉巳蕩除中外再寧寰海稱抃爰擇良日仰報威靈逺中昭告之誠罄潢汚之薦敢期鍳祐永叶安貞不任
