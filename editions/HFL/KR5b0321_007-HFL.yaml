front:
  text: 廣成集卷之七敢七
  hash: sha256:210df01725384f9343b9bb97acb41259b69b5c7ebf045beccd83edc48e5bc4df
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0321_HFL_007-001a, image: hfl/0338/0338-004.png}
body:
  text: 上都大清宫門供奉應制文章大德陽紫杜光庭撰莫庭乂本命醮詞伏以三官領籍五帝定生南天司禄算之文北斗統糺繩之目至于嶽瀆真府本命宫曹主張而罪福無差考校而死生攸繫臣竊慮謬膺撫字有曠輯和刑章或爽於重輕教化未臻於德義因成罪咎録在靈司未申祈謝之儀恐致災凶之兆又慮天文宿曜或值照臨本命行年或逢否塞兼天符五鬼在坤艮之位居本命之辰況正月對衝尤懼衰厄敢因元命之日䖍詣靈山修設醮筵披露誠款㐲惟天曹釋過地簡祛災凶咎潜銷福善昭集克延算禄永錫利貞然乞邑境安寜生靈康泰穀稼豐植水旱無侵人無疾癘之傷俗洽和平之羙不任莫庭乂本命醮詞伏聞大道生成元和鼓鑄流形品物布化群靈申上玄宰制之功垂下土吉凶之戒是則懲惡勸善信爲格言害盈福謙固惟常訓臣夙聞玄㫖敢不冥心揣分兢懷省躬思道而叨居禄秩未脫囂氛秉朝憲則筆定典刑督邦賦則庭施檟檚功或興於土木膳未罷於炮燔故誤之罪莫知重輕之文或爽以兹憂懼恐結尤違況臣今年天符臨本命之長太白居愁滯之位竊恐志隨災易留連於聲欲之間情逐禍移沉湎於杯觴之内因思警慎仍切懴陳敢於命命之辰䖍罄焚修之禮濯心靈洞歸款名山仰斗極星𨇠冀銷徃咎瞻鳳軒龍蓋願降新恩使罪戾蠲平𡨚尤和釋災凶寜息禄算遐長骨肉則兩地樂康生靈則一邑豐泰兵鋒永偃疾癘無侵水旱勿興農桑滋阜龍神安鎮逺近昭穌誓䇿丹心上副玄造不任晉公南斗醮詞伏以朱陵閟境南昌上宫御正陽長育之方行大道生成之化凡所祈啓必賜降臨臣以愚蒙叨逢聖日叅榮禁宻荷寵雲天常慮庸虚難勝恩遇恐行年厄運宿曜災凶有加臨則剋之期有滯塞邅迪之數惟増愓懼罔敢自安輙罄丹誠䖍修醮禮特希憫護俯降威光銷巳徃之過尤解未萌之災咎續南極丹書之簡更益年齡除北都黒録之文重新禄祚克垂濟度永荷靈恩無任晉公后土醮詞伏以惟地惟天厚載廣覆生成庶品孕育群靈坤徳母儀光被萬有粤自君臣父子洎于動植飛潛厥有誠祈盍申昭告臣封境之内戈甲屢興害及丘墳戮兼嬰耄逺近涂击灰人鬼不寜痛彼一方毒深骨髓念兹萬姓誠切禱祈瀝血披心仰希鑒祐伏冀曲哀䖍祝俯借威靈命山川嶽瀆之神助平災沴勑雷電風雲之吏共静郊原大開倚劔之門不隔朝天之路昭穌疲俗洗滌深𡨚豈伊項籍之祠能祛蜀難無使蔣山之廟獨助晉師奉斝陳詞言興涕霣不任晉公北帝醮詞伏以五緯在天三元運氣上宗斗極下統人倫隂陽有休否之期𨇠次有照臨之數伏慮元命之内宫宿之中因遇衝妨遂成厄滯敢慿吉日䖍備醮筵上叩尊靈特希鑒祐使三命九宫之厄盡獲銷禳明星暗曜之災並蒙寧息一川康泰萬姓輯和解甲偃兵年豐俗阜永䖍素懇以答玄慈不任晉公太白狼星醮詞伏聞垂象上玄各有主宰或統兵軍之㑹或司氛祲之源仰矚光華繫其休戚臣封疆之内戈甲逾年野廢農蠶人罹塗炭念兹𡨚抑痛迫肺肝是敢稽首炷香馳心禱福冀因感激俾獲照臨伏希運金方粛殺之威垂大義裁非之力助兹武旅清彼郊畿拯一川墊溺之憂活萬姓倒懸之命弓弢戢偃雨順風調百穀有年五兵永息不任晉公北斗太帝醮詞伏以斗御中天旁周八極招摇所指邪正聿分今以節及正元時當考校群物被惟新之澤萬方承煦嫗之功念此封隅尚纒兵甲生靈塗炭壠畆榛蕪當發生播植之功曠𥠖庶耕桑之業以兹憂痛倍切扣祈伏惟北極宫中七元籍内輟衆庶凋傷之目攺一方淪䘮之災克覩和平永銷鋒鏑臣或身逢厄塞罪繫星辰甘寘明科以謝群品不任馬玄通火醮詞伏聞乾坤覆載隂陽有消息之殊日月照臨寒暑有推遷之候吉凶在運否泰相沿雖曆數使然有堯水湯災之變而修禳有道見返風退舎之文惟此郊原方當厄㑹蒸𥠖未泰戈甲繼興徴彼星圖寔逢火曜是用歸心大道䖍扣上玄開太一之壇行三五之法躡紅飊而請福歩玄斗以祈天所希列火騰威應星芒於上境陽光散焰蕩隂穢於下方仰福聖躬大庇川蜀人登福壽野息戈鋋同沐神功永銷憂患不任晉公北帝醮詞臣聞斗極居尊統臨八表指揮萬象緫御衆靈杓建所加災凶自息今以封疆之内兵革尚興人未息肩時方震懼既勞備禦必廢耕桑念彼榛蕪益深憂歎敢憑醮酌重罄祈誠伏惟太宰揚威七元振令使雷車電騎掃蕩四方畢雨箕風穌舒品物克清境域大庇生靈如臣𨇠次有災隂陽構厄乞當天譴用息人殃元元丹誠仰俟昭鑒不任川主太師北帝醮詞伏聞垂象表靈位尊北極統臨萬有照燭羣生八十一變之威容三十六兵之神武肅清造化臨察幽明殄惡誅邪安人護國今以朱陽屇候赤帝司方南風資長育之恩四叙叶清和之節蠶功將就農務方繁而疫癘兼行鉦鞞未止民多殍仆野困逋逃既投足無塲豈息肩有所叨居鑒護實切憂傷更因衙醮之辰再布誠祈之懇伏冀神兵助役蕩氛翳於郊畿雲騎騰威掃疾癘於閭里生靈有泰逺近無虞昏霧永銷見三蜀山川之色浮雲自滅開九天日月之光厄運蠲平災危静息常傾丹素以副玄休不任晉公北帝醮詞伏以六氣周流夭道爲生成之本七星杓凖斗君爲統制之元罪福吉凶咸歸校録臣以近畿未泰戈甲猶興四野靡安疾疫斯構念兹疲瘵痛逼肺肝敢因衙醮之辰更逹扣祈之志伏冀曲廻聖力俯借神威垂景貺於四人息災危於三蜀休兵偃革時泰民安厄運銷平福祥臻㑹不任謝恩北斗醮詞臣以凡愚叨依簮褐修持多闕過咎易盈譴責所臨疾瘵斯構羸形幾䘮㣲喘偶全三洞法師杜弘廣情切本枝念深危疾式披丹懇㝠扣玄眞果蒙降以殊休續其餘算仰荷眞靈之祐再窺日月之光螻螘力微乾坤恩重用伸醮酌仰報生成伏惟聖慈俯賜歆鑒不任五星醮詞伏以三光垂耀五緯流輝盈縮有常古今無紊循環列次主宰羣生影響靡虧吉凶攸繫臣叨膺命秩獲履土疆惠未洽於飛沉境方纒於災沴兵鋒凌暴士庶流移千里瘡痍一方殘毒念兹憂痛實切肺肝竊惟上聖好生至眞育物敢憑慈煦再罄醮祈伏希太白揚威助武功於原陸歳星舒彩播仁澤於郊圻五辰順軌以呈祥萬類承風而納祐野無悲怨俗洽和平誓竭丹襟仰酬玄貺不任本命醮北斗詞伏聞斗正中天杓臨八極魁綱所指福祚必臻臣行運之中土居身位遊年之内災向離方今屬斗在南天日𨇠命宿仰申告醮冀獲感通願垂宰制之威以静晦蒙之數克垂玄祐敢負明恩不任本命醮南斗詞㐲聞南上六宫文昌衆聖壽涯所繫生籙是司動植幽微咸資主統祈生請福蓋露明誠臣叨荷寵恩謬司藩部功無塵芥過積丘山而行運之中方當否塞宿曜之内併有照臨敢因章奏之壇重有禱祈之望伏冀朱宫上聖丹闕髙尊垂廻凶度厄之慈開輟死上生之路使一境之兵銷革偃四時之雨順風調拯癘魄於窮泉拔遊魂於長夜降元和之澤濟㝠漠之郷浮雲不蔽於青天忠懇獲申於白日元元之志仰佇鴻休不任本命醮三尊詞伏聞大道昭明獨著好生之化天眞慈惠偏弘濟物之仁亭育必均撫臨無失臣自惟凡陋叨荷寵榮未著勲勞存深渥澤而維鵜起誚聚鷸爲災蓋薄德而招亦迍蒙所萃三命之内或有刑衝九曜之中仍聞臨照敢因元命䖍扣上玄伏希迴此凶衰錫其禎貺赦過尤於既徃解厄㑹於將來得傾忠赤之心上答乾坤之澤誓當砥礪以奉玄慈不任周天醮二十八宿詞伏聞玄象在天萬有咸照動植荷無私之德幽明承不宰之功臣早被寵光謬司藩翰誠慙簿德繼履深災羣邑凋夷生靈淪斃於兹傷痛須勵誠祈伏惟允降玄休克寧疲瘵使兵旗永卷無聞𡨚訴之音稼穡惟豐自洽和平之化至於山川之内地分災期𨇠次之中天文厄運並希銷解俾獲乂康誓竭丹誠仰副鴻澤不任禮記博士蘇紹元九曜醮詞臣以凡微叨逢聖日荷三境照臨之賜承二儀亭毒之恩常慮跡處昏衢身拘俗網修持有闕罪咎易増雖佩奉祕文遵叅寳籙香燈怠惰葷濁侵凌道氣不降於百關靈官暗遷於六府由是虚邪内集疾恙旁縈夙夜兢憂懼不全濟又慮五行三命運遇凶衰兼以土曜木星仍臨官宿顧惟凡𦕈素寡善功當此災期倍深惶愓是敢按河圖舊典披啓醮壇依靈寳尊文請求天象伏冀玄慈俯矚靈貺遐霑洗滌過尤解銷災咎明星隱曜共介禎祥八卦九宫並祛刑厄疾患痊復邪癘蠲除増禄秩於惟新續年齡於延永行年神將法籙吏兵輟罪舉功成賜昭祐永當修勵以答玄恩不任川主天羅地網醮詞伏聞一氣肇胎三靈資始乾竒坤偶定彼隂陽金革土浮明其次舍九興於坎戌亥謂之天羅六起於离辰巳謂之地網乃二體昇淪之所是兩儀代謝之郷陽伏而不能剛隂絶而不能繼行年所歷寔日災期况天地中和圎方化育流形挺質命世降竒皆歸鼓鑄之權難逭興衰之數顧臣凡昧敢避晦蒙丙辰當厄㑹首臨丁巳乃災期將解惟兹二歳實抱百憂上祝玄穹敢希銷解伏惟聖鑒俯念誠祈顯降威靈大祛災釁使乾綱坤紀息氛沴於一方地網天羅解凶期於小運行歌擊壞歸聖朝朴素之風束甲弢弓副玄祖希微之教永勤香火以答玄慈不任川主醮九曜詞臣叨荷國恩謬分戎閫西南粤壞髳蜀雄都三舍當參井之𨇠八國控羌蠻之域區封既廣統制所難常慮非才有負殊寄夙夜憂懼不敢遑安近歳以來凶災未息疾癘時起干戈日㝷今按考黄圖驗求玄曆分野之内太白將臨況運兵籌方迍武旅仰裁非之義仗肅殺之威佇静四郊以康萬姓伏冀天光俯鑒聖力潜資濡渥澤於九重救懸危於千里槖弓解甲鑿井耕田里閭無瘥疫之家逺近有歡呼之俗長庚所指幽滯俱通即永荷昭祐之恩不任楊鼎校書本命醮詞伏以斗御中天杓移列次乹帝車而獨運浮華蓋以髙臨吉凶得以司明罪福由其考校雖塵凡杳隔仰星晷以無階而天聼甚卑有心誠而必鑒丹襟所叩玄應攸彰臣頃以災蒙偶逢艱梗道途阻塞骨肉支離因與㓜男兩地睽隔蒼惶相失音信莫通唯晝祝長天夜瞻斗極冀其通感再獲團圓炷香而血淚共垂拜手而心魂俱徃果蒙昭祐遽遂歸還常懷再造之恩未答自天之澤兢憂度日芒剌在躬今值玉局仙居錦都靈化下藏洞府上屬星𨇠肹蠁可期眞靈朔㑹輙投勝境願展醮祈將酬福祐之慈少達敬㳟之禮佇迴眞鑒俯納塵心小男以壬子主生微臣以庚申定命常希聖力永賜保持祛五行三命之災解宿度天文之厄得勤修勵克奉休明黍稷非馨眞仙是鑒不任廣成集卷之七
