  text: 廣成集卷之一敢一
  hash: sha256:54c726a35553d743b8a57c5cdab35c259a4ab69e70df9404655a75d71acc2483
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0321_HFL_001-001a, image: hfl/0337/0337-004.png}
body:
  text: 上都太清宫内供奉應制文章大徳賜紫杜光庭撰代陶福太保修濜口化請額表臣某言伏以濜口化者即二十四化之第十八也節應配於小滿列宿應於畢星陳安世白日昇天臺蹤尚在褒女仙乗車得道轍跡猶存每𡻕春秋准𠡠祈醮頃自用軍之後併已摧殘古殿空壇僅餘基地仙儀像貌盡翳榛蕪徃来絶瞻敬之門仕庶無歸依之所豈期福地一旦蕭條臣輙備興修願資聖夀伏惟陛下軒帝靈源緱山仙緒繼天御極用道臨民萬方榮廣覆之慈三教被惟新之澤芝田柰苑咸荷精嚴古廟儒宫亦蒙繕飾况是長生之教敢申崇葺之儀旋以剪薙蒿莱興營宇室像設免嗟於暴露簮冠克遂於焚修邈彼靈蹤還爲勝㮣香燈有託齋醮無虧兼召道士楊玄敬獨孤知元何某等三人就觀居住訖但以荒凉既乆門額全無敢祈兩露之㤙特飾神仙之境其化伏乞聖慈依濜口舊名仍賜給聖夀額許臣自製造懸挂庻使琅書銀牓長懸日月之輝漢水仙山永祝聖明之夀臣某無任之至謝新殿修金籙道場表臣某言伏奉聖㫖與右街威儀何冲徽等二十一人於新殿内修金籙道場七晝夜今月十四日開至二十日散供奉官楊紹業依時設拜言功表賛訖者伏以天賛聖功鼎新大内瑤軒玉砌超三島之鼇宫青𤨏丹扉逾九清之鳳闕叶皇居之壯麗覩帝宅之深嚴萬國仰瞻千靈森衛𦆵畢瓊宫之製先開金籙之壇鋪舒而一一精新祗敬而重重蠲潔龍香上逹依稀而萬聖俱臨蟾月低光彷彿而千眞入㑹延洪睿筭遐永皇圖近臣拜手以投詞宰輔齋心而瞻祝殊禎允集巨貺無涯隆大寳於千春總八絃於一統臣等叨膺科教獲備焚修豐玉膳於天厨躡雲庭於仙境兢榮巳極頒錫荐臨伏蒙宣賜襯錢銀器疋段等澤深溟海恩重嵩衡顧慙鷦鷰之微何報聖明之奬臣無任之至謝恩除戸部侍郎兼加階爵表臣某言伏蒙恩勑除授光禄大夫尚書戸部侍郎上柱國蔡國公廣成先生者睿慈春煦宸翰雲敷叨榮而但覺逾涯荷渥而罔知所措臣某中謝臣聞聖明居上是必授任才䏻俊乂在官乃貴陳力就列皆以道包經濟言逹變通上有致君之䏻下盡爲臣之節處既得地用務適時荀虧利物之期必致取容之誚如臣幽懦榮奉休明循顧庸襟敢臻殊寵伏惟陛下披圖創曆握紀繼天明逾兩曜之懸德合二儀之普蕩滌氛垢蘇泰寰區功宣而萬有同心化被而八紘繞指夢通巖壑股肱符命說之求景仰煙波輔弼契非熊之兆元勲貞佐捧日扶天人傑時英誔星降嶽青宮翼賛日月重光朱邸忠貞盤維増永臣某江湖賤質簮褐微才爲儒既昧於成麟學道甘期於畫虎矧復辭呉𡻕乆奉聖年深杳無山水之恩每感風雲之㑹歸棲照育三十餘秋施重嵩衡遇深溟渤變枯荄爲茂草起敗骨爲豐肌徒曰竒功難偕聖奬是以臣俯盈丹懇積感皇慈曉動神魂夜驚形影効報未申於絲髪憂惶空溢於肺肝況復啓運之初垂裳之始錫峒山之羙號如北省之華資無以身諭國之譚上禆天聽乏造膝沃心之議仰副宸衷揣身世而榮顯居多於爵位而貪饕巳極豈可重塵清級更履殊榮紹碧落之嘉稱集玄關而璅質且如漢推㬅倩晉有雉川未聞聮居清重之司再踐非常之秩揣量戰越進退兢榮仰對宸嚴無階陳讓唯䖍呧礪永答鴻恩臣不任謝恩奉宣每遇朝賀不隨二教獨引對表臣某言伏蒙聖慈以臣每有起居稱賀皆與道衆僧人齊班特降宣㫖令臣自今巳後獨入引對不隨衆例者禮加異等事越常倫褒稱發自於聖心榮盛獨光於道域隆㤙顯示負戴難勝臣某誠榮誠懼頓首頓首伏惟陛下誕睿承天執符御曆包乾坤而覆載日月以照臨炫金鏡之光華無幽不察調玉燭而亭育有物皆春由是露灑天根澤流地表肅武功而定氛祲桀黠悛心修文德而服要荒奸兇革面毳幕穹廬之俗冰居穴處之郷重趼來庭占風入貢理定而樂作功成而禮行舉三代之頽綱興百王之墜典有㳂有革無黨無偏至若群后朝元垂衣當宇儼三傑十臣之佐冠非審像之賢文物羽儀輝今映古其或雲衫羽服仰丹階而効嵩呼白足方袍列彤庭而申華祝此時微臣常依旅進得靣雲階每驚巖壑之微獲在煙霄之上今則逈隆睿奬頓革前儀念臣雖迹預簮冠而身叨爵秩清級𦆵移於北省華資又接於南曹特令敷奏之時不雜緇黄之侣俾其獨引顯示優恩昔者魏重謙之梁尊貞白漢稱曼債秦有子平禮容靡覩於新䂓朝挹皆循於常度今者降九天之明命垂萬世之宏䂓退省幽孱但切凌兢之感顧慙纖弱何勝雨露之㤙惟勵丹誠永酬鴻澤臣某無任之至謝獨引令宣付編入國史表臣某言伏蒙聖慈特降宣㫖賜臣不隨一教獨引對敭以臣謝恩表宣付史舘者逈自宸表光申異禮仍編信史永載優恩祗荷難任寵榮增極臣某中謝伏惟陛下大明御曆至聖宣功廓覆載以軍㤙並㬢舒而流照賢良入輔庭多命世之臣夷夏歸仁府積殊方之貢有俗皆臻於富壽無為欲蹈於華胥由是蓬島芝宫咸加炳煥祗林柰苑畢集精嚴四靈挺質以呈休六氣調時而表貺玄儒鼎盛緇褐同歡臣猥以常倫榮逢景運道籍雨塵於美號官榮再履於崇班别顯殊㤙賜其獨對緇黄班裏受宣而徑上雲天鵷鷺庭中顧影而疑生羽翼今則竉編國史昭示寰區逈隆非次之㤙永載不刋之典荒愚有素難勝雨露之深蕭芥至微何報乾坤之德唯䖍修勵上答聖明臣不任賀黄雲表臣某伏覩鴻臚卿趙温珪奏今月二十三日皇帝駕幸得賢樓看閲將士皇太子自城南閱馬帳頭廻入城至酉時城上有黄雲兩片狀如華盖逡廵變爲紫色者臣謹按堯之誕生常有黄雲垂覆舜之御宇常有黃雲凝空又漢宣帝幸甘泉宫紫雲入殿宋世祖踐祚紫雲見於端門黄帝有瑞雲以雲紀官今者德動天休瑞呈雲物華夷共仰海嶽同勸臣某中賀伏惟陛下體道握符惟天縱聖仁周動植惠普寰灜柔逺俗以文明懾兇奴以武畧蓋以中原未泰品物未寜將申戡靜之機用拯生靈之弊授侓則南摧醜蜒鑿門則北掃煙埃鐵軸牙檣水耀龍驤之旅霜戈雪㦸陸陳隼擊之師振動山川奔驅雷電佇間恢拓以廓乾坤爰命皇太子訓整六軍申明三令䝉輪挾輈之士壯氣淩空㧞山扛鼎之夫雄心貫日皆堅金石咸勵忠貞𠃔合天心果昭靈貺輪囷對起蕭索齊凝成金柯玉葉之竒髙浮帝座變紫蓋如葩之狀低接皇城𥘉呈䕃鼎之姿漸結臨關之色有以見圓穹賛祐皇德升聞越唐堯虞舜之徴超宋祖漢宣之感自此率賔八極文軌萬方增聖夀於億千固宏基於隆永臣躬深睿奬疊覩殊祥敢謡詠以抒情誠効謳謌而頌聖徳詩一首陳進賀雅川進白鵲表伏覩嚴道縣多功圑崇善里百姓李彦韜於楠樹上獲白鵲進獻者五行表瑞見金運之隆昌百辟同贍賀玉京之貺臣某中賀臣間王者正名立訓體乎天意勝殘去殺慰此人心則有異木珍禽來儀朝闕霜毛動色紺趾摽竒歛羽呈姿應見徒誇於漢魏傳聲送喜翺翔顯奉於皇明伏惟陛下瑞冠百王功超三古恊序而風調禹侓燭昏而鏡滿軒臺亭毒萬方再樹乾坤之本照臨下土重懸日月之光鄙炎漢之息肩邁唐堯之鼓腹人謌𡻕稔物頼時康況乃萬旅貔貅千營鎧甲擒兇剪弊撫弱字孤雷掀鉦鼓之行雲黯旌旗之舉發令而雄豪踊躍申恩而疲瘵昭蘇五星運度以垂休八海承風而寢浪遂至山河效祉禽羽呈祥逺離海上之巢來對雲中之闕觀其玉籠乍啓雪姿不驚望聖苑以佪翔對天慈而鼓舞往來瑶陛棲泊珠簾認素羽以難分聽新聲而己熟不是成橋之侣殊非繞樹之群既彰團雪之容實煥来金之盛佇見千戈載止奸邪屏除蕩疆場之煙𤇺永歸北極靜寰區之搸梗自我西方信超魏德之雄更掩漢成之代臣獲逢昌運累覩殊祥輙陳謌頌之詞上浼聖明之鑒臣謹課頌聖德紀瑞詩一首陳進千瀆冕旈無任之至賀天貞軍進嘉禾表臣某伏覩天貞軍留後崔善進射洪縣百姓王友田上嘉禾合穗圖者聖德遐通祥符疊至文武瞻覩中外歡呼臣某謹按瑞圖云嘉禾者美瑞也稔𡻕精王者徳至於土則二苖同秀昔者唐叔得禾異畆同頴成王問周公曰二禾一穂意天下和同乎王命唐叔作嘉禾篇由是九土㑹同八紘歸化旅獒西貢越雉南来三十世之宏基七百年之大業輝前映古逾夏掩商今在聖明復彰斯瑞伏惟陛下紹軒皇之聖緒承周帝之洪源應曆數以配天緫華夷而𩔖帝惟恭惟儉絶嗜音酣酒之娱乃聖乃神有明目逹聦之美弘武徳而先懲不軌電掃奸妖播文風而旋撫戎羌雲奔賝賮憂勤黎獻軫憫耕農𡻕致豊穣田無炎潦徳通于地見共秀於二苖應逹乎天果異畆而同頴契聖祖興周之瑞表吾君拓土之徴昔則和天地爲一同今則包萬方爲一統況屬王師薄伐誓衆弔民雄稜已懾於彼方禎異先呈於近境佇觀收剋永蕩氛霾開九天日月之光顯符周卜合四海生靈之望同比唐禾臣竊仰瑞圖賡謌聖感願預採詩之録思陪唐叔之篇謹課頌聖德嘉禾合穗詩一首進請駕不廵幸軍前表臣某伏覩宣旨駕幸北路軍前者臣聞展義廵功禮經垂典誅兇伐叛有國通儀蓋欲㢠廣照於一方輯五瑞於群后剪其暴亂慰佊蒸黎況蠢爾邠岐乆迷大順朝伊夕即覩殄平不足以親駕戎車逺臨狡穴顒顒衆懇僉用驚疑伏惟陛下逾舜文明超周神武禀秋霜之令敷春育之㤙委以至公推其大信覆載之内風偃化行而隴渭之鄉岍岐之俗甘寒谷之氣自棄陽和息惡水之隂顯孤臨照恃蟻封而稱固巢鷰幙以偷安今則上將專征雄師薄伐逺憑宸筭必剗根荄𥨸惟漢曲褒川方當寒沍霜雪嶮棧豈易躋登況射鮒穿蝇詎用千鈞之弩孤城荒堞寧銷萬乗之威伏乞聖慈俯徇群心特寢成命佇觀剋㨗永統華夷干冐宸嚴無任戰越兢懼迫切屏營之至謹詣閤門奉表陳謝以聞第二上表臣某伏覩宣㫖駕幸圵路軍前皇大子宰臣百官等上表陳請未賜俞允者省方風俗雖經典之舊儀慰撫師徒乃君父之慈照但以道途險阻水陸嚴凝遐邇群心實實憂灼伏惟皇帝陛下體堯慈惠逾舜欽明欲令寰海之人盡沐雍熈之化憬茲汧隴宻邇封隅乆負歡盟深辜恩信識變通者巳束身効順迷向背者猶掩耳偷安致一境之生靈銜積年之怨抑狥吠堯而有日思慕舜以無由所以授姜鉞以整師築韓壇而誓衆風馳號令雨驟雄豪上將等威震雷霆心堅鐵石指期剋日必就削平豈勞親駕翠輿躬魔白羽六龍八馬驅馳嶮棧之中萬騎千官迢逓層峯之外方零霜雪漸逼沍寒伏乞聖慈俯聆億兆之情特駐省方之命上爲宗社下慰華夷佇對㨗書更開土宇臣叨深睿奬倍慊明誠塵浼宸嚴不任待責望恩迫切禱祈之至謝恩賜興聖觀弘一大師張潜修造表臣某伏奉恩勑宣賜左街興聖觀弘一大師張潜令修葺住持者寵自宸衷榮臻道域簮裳增抃芝术騰輝臣某中謝伏惟陛下道均軒后聖並放勛凝懐於姑射之峯寄夢於華胥之境睠言大教理契生津拪神泯合於無爲屬念潜期於有德化合清靜善利邦家觀宇蕭條像設塵翳爰敷綸渥載俾葺崇伏以前件觀地接玉清昔爲道學㝷攺眞元之宇復標紫極之宫至德年中易名興聖前臨廣陌東距錦江宛是靈墟實惟勝所況門庭具設像貌儼存誠歷代之仙蹤乃皇都之福地今則重加繕飾盡撤葷腥拂塵埃於湫陋之中還瞻玉相蕩瓴甓於蒿榛之内别築瑶壇灑雨露而騫樹増榮薦沈麝而睟容伊穆張潜等精專剖劂恪勵住持夕磬晨鍾祝遐長於聖壽朝香暮燭期隆永於皇圖臣某獲列教門躬榮睿澤不任之至謝恩宣賜衙殿㸃鐘表臣某伏蒙聖㫖宣賜衙殿前㸃鐘一口於日院内充齋醮扣擊者恩垂霄漢榮及簮裳抃蹈無階輝華增極伏惟陛下二儀覆燾三景照臨澤浸無涯惠敷有載故得八溟息浪長鯨將殄於昌時五緯循常巨彗欲銷於永夕削平夷夏倒戢千戈而復俯軫皇情留慈玄教致感應於洞府符應見於靈仙固當齊聖夀於日月星辰隆寳祚於乾坤海嶽今者念臣院宇之内簨簴未全毎於齋醮之辰尚闕舂容之響既乏通眞之器莫諧集聖之儀輟瑶階泛日之音來從天上頒豊嶺含霜之韻降在人間事超錫樂之榮恩重㸃鐘之賜永當炷焚芝术禱祝眞靈冀啓禎休仰酬聖奬所宣賜鐘臣謹以焚香祗受記不任謝恩賜玉局化老君表臣某言伏奉恩勑宣賜舊玉局洞門石像老君歸龍興觀御容院閭下西閒奉安供養其蓋石舍一區移拆就觀起立并賜錢設齋道衆將幡花引歸觀表讃等者皇澤霶臨玄門増耀康莊改觀道俗同歡臣某中謝伏惟陛下法道披元垂衣運化暢清靜無爲之理敷希夷不宰之功己洽大寧將臻一統以玄元像貌容邇宸居雖香燈無曠於常儀而供養合歸於法宇爰申明命豐備齋羞焚蘭术以飄香森幢幡而成列鐃金鳴玉𦆵離象闕之庭雲邁風行遽入龍興之閤群心瞻仰萬衆歡隨雷諠讃悅之音霧集聖明之福臣與道衆等獲栖大教疊荷隆恩永勵修持上酬睿奬不任之至賀收隴州表臣某伏覩北靣軍前隴州節度使桑簡以手下兵士及城池歸降收復隴州者睿筭遐宣元勲効節𦆵申薄伐已復雄城臣某中賀伏惟陛下聖邁黄軒威超周武運神機於掌内動有成功料勍敵於彀中舉無遺䇿自岐郊負義關外隳盟深辜敦好之儀遽絶睦鄰之分擁犲狼之一旅恃疆土於三洲巢折羣以偷安坐積薪而稱固小不事大春秋所誅所以義士盱衡謀臣扼晼皆期殄掃遂舉戈矛六軍奮躍以爭先八校喑嗚而致勇蹴土佇摧於呉岳飲馬將竭於渭流桑簡以智合變通心明向背倒戈衘璧効命投誠獻千里之山河不施寸刅復一方之户口無損秋毫便廻亳社之𨦟自收商受之衆想回中之路絶退且無歸顧㶚上之讎深竄將鼻適料其元醜即見梟擒看通於八水三山永統於九州四海俱頒舜曆盡入禹封臣獲奉昌期累觀大捷無任之至夀春節進章眞人像表天漢元年二月八日臣某伏以皇圖昭永上帝開祥北極瑶樞煥虹光而誕睿中天玉斗飛紫電以凝華萬國歡瞻羣心増抃伏惟陛下二儀炳靈九清集瑞至化塞乎天地清明肅於鬼神肇三十世之宏基方隆周業興四百年之景運佇越漢圖浸德澤於玄儒鼓薫風於夷夏今屬壽春大節祝聖昌辰呼貫雲馳梯航波委咸修芹禮以繼山呼臣與當院道士等䖍拂華壇精依祕格諷琅書寳軸披霧韞霜羅克嚴蠲㓗之誠永廣乾坤之福鑒聖眞人昔師道祖躬受靈篇傳眞記於先天緘瓊文於福地豫明皇業洞逹玄樞嵩公之識神堯貞白之知梁武以之校美詎可同年是敢藻繢縑繒式資瞻仰庻因焚炷克嗣禎休千冒宸嚴臣無任祝聖䖍切屏營之至其畫像功徳數等謹詣閤門奉進以聞伏聽勑㫖黄萬祐鄧百經賜紫衣師號謝恩表臣某伏覩㤙勑夔州道士黄萬祐賜紫衣仍師號羅江縣道士鄧百經賜紫者大聖御天神功及物廷有賢良之佐野無遺逸之人率土朝宗允當聖日臣某中謝伏以黄萬祐等林永得志麋鹿為羣深處巖蘿罔窺名利或丹華救物有廻生駐景之䏻朱篆誅邪有蕩魅除兇之効皆張道用潜賛明時遽搸鶴書來朝鳯闕萬祐既趨於錦水百經至自於羅江共仰堯天俱榮舜澤歷觀前史莫得比倫伏惟陛下道邁唐堯功髙軒后想汾水凝神之日尚逺九重比峒山請益之辰猶勞載駕今則蒲車允至桂樴云來徑捨煙蘿躬朝旒扆顯封嘉號俱錫服章美輝簡編光揚簮褐不任之至廣成集卷之一
