front:
  text: 廣成集卷之九敢九
  hash: sha256:d7a983ea6b8ee6d64e17fd5921d40c0717d72096ec13d6fb2981702b55c06e36
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0321_SJB_009-110271a, image: sjb/11/110271a.png}
body:
  text: 上都太清官内供奉應制女章大德賜紫社光庭撰青城鄭瑱尚書本命醮詞伏以禀氣分靈全資大道挺生毓質仰繫上玄壽祈延永之期終始吉凶之分五行倚伏二氣推移實憑宰制之功敢怠敬恭之懇臣今年火曜居本命之方九宫金星在行年之上乆纒疾苦未獲痊平竊慮履行運心有虧隂騭字人育物有曠政經或積生釁咎未除或徃世𡨚讎未解構兹重厄無路懴祈況境控仙山地當洞府明誠可告眞鑒難誣敢因本命之辰䖍備醮祈之禮洗心謝過瀝懇希生伏惟少駐鸞驂下臨塵壤愍其歉迫假以恩休輟死籍於黑書再延命禄定生名於丹録盡赦深瑕𡨚債和平災凶銷解公私昭泰眷屬安寧敢忘䇿勵之心上副眞靈之祐不任果州宗壽司空因齋修醮詞伏聞三光麗天下司羣品死生是繫罪福攸同臣以塵微仰蒙鑒祐而三命之内水火力微值辰戍魁網爲天羅地網二運逢墓併屬災期又火星到元首之宫暗曜在命宫之位災數重疊憂懼殊深是敢遵按明科䖍申醮奏仰崇齋福精備醮祈三日恭嚴九時關奏伏冀玄慈俯燭洪澤濡臨賜臣災運銷平凶衰超度克延祚禄允介福祥永保又安常加護祐奉親事主報國寧家誓罄丹誠上酬玄澤不任楊神湍謝土醮詞伏以道氣分光玄功宰制下鎭靈化上配列星萬聖之所宴遊群仙之所棲息肇于歷劫以逮兹辰玉女上賔認香泉於江滸玄元駐駕留玉局於城隅耀天目之祥華以安井絡啓洞宫之徑隧以福坤維爲錦都靈勝之墟乃蜀國神仙之府而繕營乆曠蕪薈㡬侵清壇爲蹂踐之場閟殿染膻腥之雜我蜀王逈開神鑒曯此玄關遽命澄清俾其嚴𩛙拂煙煤於石壁章挹仙儀薙蒿篠於荒階再窺靈洞邇後累加締葺漸獲精新堂宇相望樓臺櫛比復遷門闥俯及康衢夕磬晨鍾得以備朝修之禮朝香暮火得以申蠲潔之儀報德何階感恩有自輒陳醮祝冀達眞靈伏惟廣灑神休大頒嘉貺増聖主遐長之算寧謐萬方延蜀王椿桂之年又安三蜀連營將校各崇竹帛之勲比屋生靈共樂和平之化龍神恱䂊稼穡豐穰疵癘無侵鋒鋋永戢其有薰腥穢瀆穿鑿侵傷承此懴祈咸蒙銷解臣等佐時濟俗行教立功奏御上通遵修咸契公私貞泰眷屬利安然願徃化法流先師舊德冥關無滯道果速圓内外職寮隂陽將吏遷功加品永賛福庭克弘至道之風常荷尊靈之澤下任忠州謁禹廟醮詞伏以三氣肇胎九元裁質清浮濁厚眞精鑠造化之鑪出震乗乾大易啓乾坤之韞堯天繼覆舜日傳明五教允敷未革懷襄之數四門是闢尚纒昏墊之憂惟我睿明拯兹下土驅馳四載勤瘁萬方浩浩無虞百谷識朝宗之路巖巖可仰羣山知維嶽之尊區别九州撫寜庶彚鑄鼎之功既集錫班之報攸彰懋此宏勲光于終古臣夙承洪澤獲奉仙祠巴雨巫雲捧臨瑶殿岷江楚望瑩蕩瓊階願迴䟽曠之慈俯鑒䖍祈之懇探經玉洞展醮靈岑副蜀王遐祝之誠遂微臣歸還之願不任蜀王仙都醮山詞伏以眞精表瑞元氣分形積秀累於人寰凝爲仙嶽集幽竒於物外嚴設洞天上屬星辰下福邦國由是瓊宮珠闕祕䆳難窺羽蓋霓幢飄颻特降二眞人三都跡顯九鼎功成白晝登眞丹霄控景威靈益振物象長新寳冊眞經琅函玉篆貯雲宫而作鎭與嘉躅而常存遐想玄風遥馳素懇今以三川觀化累遇干戈鳯札龍書靡存於魯壁虎符龜籙難訪於秦坑大教凌夷所宜弘拯是用翹懃翠巘稽首白雲申醮酌之儀冀神仙之鑒輟鶴洞緘藏之本爲人天宗奉之經佇畢殊功却還舊所竊惟道無不在法許流通仰望鴻休允諧丹欵亦願潜迴禎貺普及寰瀛玄元之祚胤繁昌聖主之宮城匡復九圍寧謐萬彚昭融臣境㝢乂安生靈康泰災𨇠自息算禄增延永持忠赤之心上副至眞之佑不任自到仙都山醮詞伏以元化既分兹山作鎭前臨楚望旁控巴城衆流迴環嚴設龍蛇之府群峯拱衞秀爲眞聖之都二眞騰翥於前朝千載昭彰於懿躅巖巒㮣日松檜叅雲禎祥時耀乎簡編福祉潜資乎邦國蜀王扶天茂績命世雄姿八國二江早列封圻之内黔城楚硤皆歸陶冶之中惟此仙山光于境㝢仰靈蹤而稽首遥展誠祈望閟境以馳心䖍修醮酌將以求書禹穴佇逢八㑹之篇探簡洞庭願值五符之訣敷弘奥𧷤演暢眞宗況屬大教凌遲中原多難俾其紹習須俟流通某躬泛長波式遵成命焚香昭告願鑒丹誠所期汜水橋邊不獨傳於漠相曲陽泉上豈止授於干君捧秩西歸中興聖教不任李延福爲蜀王修羅天醮詞伏以道冠虚無功先覆載陶甄有物亭育無私綿劫歷以長存後天地而攸乆裁成不竭生化彌彰臣夙荷玄休克承道運功輕塵露任重台衡數千里之山河周旋六鎭十七年之臨撫宰制一方每虞福過爲災力微成釁兢榮循省憂懼難勝況復大駕未還中原多壘訓兵勵士徒懷於報國勤王望闕馳心其奈於天髙日逺微勲靡効孤懇何申令復大遊四神方在雍泰之野小遊天一仍臨梁蜀之郷地一次於坤宫月孛行於井宿仰兹緯候緬彼災蒙深慮鳯輦鸞輈百二之關河未復陵園寢廟九重之城闕猶虚惟切禱祈佇迴鑒祐是用按依玄格遵錬明科修黄籙道場設羅天大醮九清三界咸陳懴謝之儀天眞地靈備展奏祈之禮普日月星辰之域遍山川嶽瀆之司畢罄齋莊用期通感伏冀天尊降命聖祖貽休俯借神功載康國歩鴻圖克固鼎祚中興齊北極以常寧比南山而共永臣允承天澤長奉唐年享椿松延廣之齡竭金石忠貞之節境無災沴嵗洽豐穰雨澤不愆干戈不作龍神安鎭士庶乂寧幽扄霑開度之慈絶域慕和平之化誓弘清浄以答眞靈不任羅天中級三皇醮詞伏以玄蓋上浮黄輿下鎮元精降瑞應運開圖握六紀以君臨恩周率土體三才而司牧恵洽群生塞寰區而聲教攸傳亘今古而光靈不泯臣謬膺天澤作鎭坤維荷覆燾以難勝誓忠貞而有守屬乾綱未舉天數中微瞻雲而河洛方遥捧日而山川尚阻徒傾丹赤莫展勤勞今又大遊四神在雍秦之分小遊天一次梁蜀之郷地一鎭於坤隅月孛行於井宿考遵緯候伏切憂虞是用披按明科修崇黄籙備羅天大醮祈三界眞靈願假神休共迴天數使忠貞義烈振風雷掃蕩之威文武尊神借戡定經綸之力重昌祚曆永息妖氛九圍覩清晏之期三蜀荷安寧之賜災祛未兆福降無窮動植存亡同臻恩祐不任羅天醮太一詞臣伏按曆䋖今年大遊四神在雍秦之分小遊天一次梁蜀之郷地一届於坤宫月孛臨於井宿仰披天度緬屬災期省巳拊心伏増憂惕是敢按遵玄格崇啓壇場修黄籙寳齋備羅天大醮輒披玄藴敷露眞文伏冀尊神迴景上玄貽休下土旁垂禎貺永息災𨇠賜臣封境又安龍神輯睦生靈康泰逺近昭蘇疵癘無侵干戈弭戢唯䖍修奉上副神功不任羅天醮嶽瀆詞伏以二象昇淪剛柔定位三靈恢廓川嶽裁形坤儀彰厚載之功品物荷資生之德雖混淪莫極猶虞九六之期廣博無疆以繫屯亨之數今以隂陽所運曆緯所甄天一小遊既移於梁蜀四神太一亦次於雍秦地一屇於坤宫月孛行於井宿仰惟天度伏用震惶竊以臣叨荷寵恩乆司藩屏封圻六鎭襟帶重江水惟四瀆之尊山居五嶽之長仙壇靈化皆驂虬馭鶴之蹤珠岸金堤乃禹導秦通之野眞靈攸處样應寔繁必介休符以副䖍祝是敢齋陳黄籙醮啓羅天冀衆聖之垂光㑹萬靈而降福共安天歩永奉帝圖蕩昏曀於神京重瞻聖曰混車書於海宇克保唐年臣境土安寧生靈舒泰邊無烽燧俗洽謳謌息未兆之災纒解巳徃之愆咎誓䖍砥礪以答神功不任羅天普告詞伏聞玄功宰制道化宣行禀象流形凝神運氣天覆地載爰起於渺茫曰照月臨肇分於萬有至於隂陽昇降劫曆推移乾坤有九六之期烏兔有盈虧之數將期拯護元杖眞靈臣以微躬遭逢昌運叨塵異渥踐歷殊榮龍節虎符裂封壤山河之重金科玉律掌生靈性命之權常慙撫育非才每以滿盈爲戒而屬中原多難天歩方艱社稷綴旒寰瀛塗炭訓齊武旅徒懸報國之誠迢逓神都莫得扶天之路今者稽求曆緯考察經圖大遊四神方在雍秦之野小遊天一傍臨梁蜀之郷地一屇於坤宫月孛纒於井宿緬惟天度彌切憂兢是敢披靈寳簡文按河圖品格設羅天大醮開黄籙寳壇仰金闕玉京䖍祈萬聖遍寰中象外普吿衆靈馳意馬以披心託香龍而薦懇冀蒙鑒祐允降威神伏惟三界諸天四司五帝乾元主宰地府尊靈降隂陽不測之神假變化無窮之力神兵宻助眞應潜彰大業中興萬方安泰皇基永固四海澄清掃彗孛於長空勦鯨鯢於巨浪常瞻聖曰井戴堯天賜臣境域安寜災凶弭息五兵韜戢四氣均調𥠖元無瘥疫之虞稼穡有豐登之望三川六鎭士庶龍神克洽歡康同臻貞吉其有幽魂滯識六趣三塗沐玄澤以生神詣朱陵而受福存亡開度動植蘇舒誓傾忠孝之誠仰副神明之鑒不任羅天醮衆神詞伏以人爲神主神依人以變通神福於人人資神而讃祐承天統地有國有家惟古及今率由斯道我大唐臯陶種德聖祖垂休光宅中原傳二十帝玄風扇於萬寓皇澤浸於九圍徧彼群倫咸蒙覆燾而運鍾難否時屬播遷天數未寧帝車未復忠臣義士皆懸報國之心望曰瞻天敢怠勤王之志今以小遊天一纒梁蜀之郷大遊四神在雍秦之野月孛行於井宿地一次於坤宫緯候所明兢憂是切是敢按遵玄格披考靈科修黄籙寳齋設羅天大醮下窮九壘上極三清嚴陳懴謂之儀願假感通之應伏惟尊神衆聖憫鑒丹誠雷發神威風回景貺掃搶於碧落殄氣翳於皇都永固鴻圖中興大業次願封疆分野銷解災蒙祛厄會之期致和平之氣龍神輯睦風雨均調疪疫無侵戈鋋允戢誓勤握政上副神功黍稷馨香必䖍於蠲潔蘋蘩藴藻克展於齋莊瀝懇陳情不任蜀王本命醮葛仙化詞伏以圓穹列耀上表於龍星方局裁形下分於仙化實司命籍以統人倫臣獲禀玄機夙臻景祐早塵寵渥牧此蒸𥠖綰六鎭之封疆德慙涼薄控諸化之靈勝誠切欣榮常虞政理之乖莫副眞仙之鑒今屬太一行運分野慮災或臨梁益之方或在雍秦之境月孛纒於井宿地一災於坤隅稽考緯書伏增憂懼況嵗當丁卯是臣元命之年月届仲春是臣禀生之節詣本命之化以本命之辰䖍備香燈精申檮祝伏冀元尊憫矚衆聖鍳臨騰素𣢾於上宫錫鴻休於下土帝圖興復息災期而輦蹕還秦境寓康寜銷否運而禎祥介蜀俾罄報君之節允符憂國之心百榖豐登群生和泰龍神貽貺疵疫無侵臣七祖生天年齡增永誓弘道化以答靈恩不任莫令南斗醮詞伏以玄道聿分化機肇啓清濁定昇淪之位隂陽運刑德之樞南斗主生垂吉昌而勸善北宫紀死編罪惡以繩非神明用之以化人帝主用之以致理纎微不失今古攸同臣宿禀眞謩仰宗玄訓敢忘朂勵以自秉修而叨備官榮屬兹多事雖加勤恪實有懼於曠違徒切兢憂固取譏於尸素誅奸癉惡或舉刑章或督懲𠎝或施鞭楚犒士或開其宰戮宴賔難廢於烹燔恐因故殺誤傷遂結深𡨚厚釁又臣行年所歷小運逢災宿曜所纏火星爲照月臨申未天符居本命之辰位對尹寅飛旗當衝破之地慮成厄㑹彌切震驚雖省巳循懷寛刑愼行減饌節酒逺色防非猶慮凶咎未蠲福祥莫應恭披典冊䖍詣靈山按南斗文儀法上玄分緯九微燈影星羅透擬於六星一德香煙雲色髙連於三素竹殿既招其虚實松軒可降於眞靈向此披心敢期符祐伏願六宫上聖輟死籙以延生五緯尊神碎禍車而流福𡨚尤銷解災厄和平骨肉安寜境邑康泰風雨調順穀稼豐登㓂盜不興沴瘥無作所請靈寳玉篆赤帝天書伏願解臨照於南丹錫恩慈於下土永承貞吉以遂禱祈不任鄭頊别駕本命醮詞伏聞玄天垂象斗極居尊統萬彚以無私御四時而成嵗下司命藉緫制吉凶有感必通有析皆應臣粤自童丱竊仰威靈以七星爲天地之樞五氣爲裁成之本主張禍福制録鬼神傾心毎奉於上玄有難必存於北斗疊蒙昭祐累降禎祥動若影隨事猶響答至或願捐所職謝病㝷醫或懼履禍機違凶就吉或雪志於侵誣之際或滌瑕於猜忿之中潜瀝懇於長天暗馳誠於永夜至眞在鑒有願咸從而多事所縈靈恩未報常期精潔冀啓醮筵今者天徇深𠂻神諧夙望幸叨攝任獲在仙郷玉闕瓊都咫尺封隅之内凝嵐積翠髙低城邑之旁況屬命辰仍當秋景遂得躬披松檜深躡雲霞展三獻之禮容猶申公務酬積年之祈禱兼遂私心省分循懷既榮且抃是敢捧持詞欸營備香燈雖澗蘋行潦之微難廻聖鑒在隨感赴機之德願納愚誠所期答巳徃之恩佇將來之澤賜其禎吉介以康寧俾縣境無虞農功有嵗人和俗阜逺睦邇安臣或本命五行災衝所及天文九曜臨照所經或政理有所未明賞罰有所未當新𡨚徃債故殺誤傷並乞蕩除永承恩祐不任孫途司馬本命醮詞伏以二氣肇分玉行運化鼓隂陽之槖籥執生死之樞機亭毒無私陶融靡倦司短長於五帝校善惡於三官維斗居尊緫御群品臣自惟幽陋仰荷裁成獲備冠裳每憂叨竊遵素儒之明訓守玄聖之格言尚慮動息成非行藏乖道難階福善易結過尤仍恐三途推移或逢災數九曜𨇠次或在厄官況命年天符臨勾絞之方小運當伏吟之位十三宿内月孛所經大運行年猶居衝破以兹疑懼恐履災凶敢因本命之辰䖍申醮謝伏惟眞聖俯鑒誠祈赦巳徃罪尤和𡨚釋結錫將來福祉增禄延年眷屬安寜公私和泰即永荷衆尊慈祐之恩不任廣成集卷之九
