body:
  text: 上都太清宫内供奉應制文章大德賜紫杜光庭撰户部張相公修遷拔明眞齋詞臣聞太上開圖元皇演教三籙定金明之典功被人天九幽懸玉匱之科惠周存殁竊㝷經旨遵按玄文仰祈遷抜之恩輙備懴陳之懇今月二十五日是臣先妣唐楚國夫人蜀追封宋國太夫人劉氏忌辰今月三十日是臣先考唐丞相太子太師致仕蜀追贈太尉忌辰謹賫油燭香花供養之具於成都府玉局化北帝院奉修靈寳明眞道場一晝一夜道士一十四人三時行道三時轉經對乾象以披心馳香龍而上奏伏惟髙尊憫鑒衆聖垂光普告四司關明三界降九龍符命開長夜寒庭錬沐形魂遷拔神爽出玄隂之府入洞陽之宫罪咎蠲消𡨚讎解釋落名地簡列籍道階輪轉福郷克登仙品九玄幽識咸遂超昇誓勤修奉之心上答眞靈之澤張氏國太夫人就宅修黄籙齋詞伏以妙道玄功濟時佐國眞經秘旨拯物救人肇宏䂓於億劫之前弘大化於萬天之内宗之者儲祥納祐修之者駕景登晨披究古今昭彰典誥張氏克承禎貺運偶聖明被沐天光輝華帝澤循懷顧分常抱兢憂省已修躬毎爲烱戒實恐徃世之積瑕未懴此生之累釁將深幽隂有註訟之書冥漠有考延之籍又張氏今年天符臨於木墓之位暗曜住於飛化之年火星照於身宫仍當剋之性分大運逢王金之上火力稍微小運值生金之郷木氣已薄緬思厄㑹倍用憂虞竊惟大道無方施恩普洽式申䖍祝必介休祥是用蠲潔丹心修崇黄籙像瑶壇而肅列按瓊韞以敷陳質信諸天燭蘭缸於午夜告明三界飄檀蕙於九時露懇馳誠希恩悔過伏惟髙尊太上萬聖千眞憫鑒叩祈昭宣渥澤勑天司地府命隂職陽寮黒薄落名青宫著籙和平債訟消解𡨚讎北都除執對之篇年齡増逺南極定延長之紀禄祚尤宜五行祛災滯之文九曜息照臨之咎常歡舜日永廕堯天眷屬樂康子孫忠孝九玄七祖徃逝先亡或拘滯昏衢未超福路願承道力便遂徃生利祐見存允蒙貞吉其有三徒六趣夜府寒郷亦因懴滌之縁盡獲逍遥之果隂陽將吏宅宇龍神長恱豫以安寧俾凶衰而殄息上願皇圖遐廣聖壽延洪卜年克大於姬周享祚更隆於炎漢寰瀛一統書軌混同共傾捧日之心咸沐自天之祐奉化宗祐侍中黄籙齋詞伏聞道本無爲降元精而生二象象而後數羅五緯而備群形維地麗天無違於律曆陽舒隂𢡖咸繫於裁成由是善惡循環吉凶倚伏乾剛坤載不能排九六之期蟾魄烏輪不能革盈虧之勢況乎二儀禀質三命定生未超變化之機固有推遷之理是宜兢懷省己審過知非常加䇿勵之心冀動眞靈之鑒臣夙承玄廕早沐洪休運偶睿明身叨寵任推忠陳力未申匡濟之勞翊聖扶天累荷超逾之渥將壇相印委遇益隆蒼珮行師徽榮彌厚戒滿盈而徒切報君父以何階尚恐動静行藏有乖於素分屬心舉念有忤於神明或在公有失於賞刑統衆有愆於裁斷或徃世之尤違未解或積生之𡨚債未祛有一於斯皆宜懴滌又今年二運俱逢於墓位飛天仍值於火星雖居華蓋禄德之方恐有刑剋照臨之數以兹兢懼倍切懇誠徐氏年運之中亦有災滯大小二運金火氣微飛宫遇於計都天符臨於生月恐爲災滯志在懴祈是敢恭備信儀䖍申齋潔按玄都品格修黄籙道場嚴香花於二日六時召眞聖於諸天諸地凝神注念瀝懇披心伏惟萬聖迴光衆眞流鑒憫其丹𣢾錫以休祥赦已徃之罪瑕息將来之厄滯明星暗曜無臨照之凶三命五行除衝妨之㑹𡨚仇和釋債訟消平嗣㣧繁昌壽禄延益九玄蒙福幽夜開光眷屬康寧龍神安豫上願聖躬萬壽大業永昌布聲教於九圍咸歡舜澤混車書於八極共樂堯仁百榖豐盈六氣均暢誓傾忠孝上酬英睿之慈克勵精誠仰副眞靈之祐上官子榮黄籙齋詞伏以大道玄功至眞妙感隨方流貺應念垂慈佐國濟人恩周於動植祛災降福惠及於幽明凡所啓祈必蒙昭鑒某氏以今年大小行運之内恐三命衰微隂陽宿曜之中恐五星臨照致成災厄無所告祈竊聞黄籙妙齋功德廣大無災不解無厄不禳輙罄丹誠冀蒙玄祐謹依科法開置壇場三日香燈九時懴謝至眞㝠應有感必通伏願三境諸天髙眞衆聖降無涯之澤垂廣覆之恩爲某氏解除積世罪瑕多生𡨚債隨懴消平應時除蕩眷屬安貞公私和泰誓傾忠孝永奉聖期飛龍唐裔僕射受正一籙詞伏聞㝠寂之初混元之首道生一氣分彼兩儀隂陽有昇降之殊清濁有仙凡之異是則紫清金闕髙居太妙之庭黄軸風關下鎭窮泉之域隨機染惑因生進退之疑委跡沉浮遂有飄零之痛既非先覺必在指迷玄元皇帝當東漢之季年啓南宫之寳笈首傳眞籙大拯群生修之則駕景冲虚行之則濟人佐國或蕩平氛沴或懲革兇妖正日月之天元風雲叶候静災邪於地紀生植無愆歷代所尊垂休靡極臣夙承道廕獲奉皇慈功輕而渥澤愈隆力薄而君親未報常思禀窺祕籙宗受靈文勤旦夕之香燈勵精䖍而禱祝所冀家國同納福祥今則嚴備信儀恭開壇墠通宵懴滌稽首歸依蘭燈夜燭於九㝠檀炷晨飛於三境恭馳懇欵冀逹尊靈伏惟太上三尊玄元大帝十方衆聖三洞威神鑒丹懇之誠賜感通之應靈官眞氣咸賜授傳使内保身安外祛災沴名臻道籍罪滅隂曹九玄離積夜之郷永棲長樂舉族享無涯之善常奉休明算壽遐延公私清泰上願龍圖攸乆鳯曆延洪増聖壽於無疆乾坤共永布皇恩於有截海岳咸安同爲至道之風共暢無爲之化皇太子青城山修齋詞臣聞靈寳陳䂓齋戒感希夷之兆眞文設教行蔵通修鍊之功莫不啓之於心弘之於道上可以䖍祈穹昊昭達玄微次可以宣布情誠祗延福祐永言清信敢薦䖍㳟伏以皇帝劃地開基法天垂覆定禍亂而爰承土德闡眞明而克應金行翼翼小心弘朽索薄氷之懼乾乾夕惕有櫛風沐雨之勞備歷嵗時益勤祗敬是致年豐𡻕稔國富兵強定蜀漢之疆圻扼黔巫之襟帶允文允武咸序彛倫至公至平式崇治本四方慕義萬里歸仁梯航無隔於髙深書軌盡同於風教蓋九霄之靈䕃信大道之冥扶是使帝圖聿昌宸算永言戴仰彌切兢持近者以星象留行稍淹時景分野觀矚實資禱祈是用潔志清心忘機滌慮召十洲之法侣約三洞之玄科敬設清齋仍修大醮伏願上眞降鑒衆聖宣慈迴機軸於玄關啓輝光於丹道凡言災沴並獲消除但有吉祥皆承應感増聖壽於千秋之外播皇猷於萬宇之中壽山罙峻於五山福海更深於八海與乾坤而齊固共日月而合明叶華戎推奉之情遂臣子依憑之懇盡繄至教俯𢍆微𠂻冒瀆眞仙無任兢惶戒懼激切屏營之至謹遣得一大師賜紫張茂卿等一十四人䖍修法事願鑒丹誠普康諸公主爲皇帝修金籙齋詞伏聞道混虚無泮玄黄爲九玄之始象凝恍惚標化育爲獨化之源於是覆載以乾坤照臨以日月三才共道剛柔之用迭興品彚攸生善惡之端遂列然後降之以君父佐之以股肱法髙皇不宰之慈體大帝無言之煦弘安疆域大庇黎甿伏惟皇帝陛下出震臨人承乾御曆禀樞機之精耀含嶽瀆之靈源明契三辰運符四序當天人之允屬表䜟瑞之咸臻因念陵夷遂康烝庶鎭寧郡國割裂江山辛勤侔大禹之功化洽嫓成周之德豈忘宵旰莫憚焦勞是用和平永期清㤗某等今以時當端月節遇正陽屬二氣之將交處午位之炎景思弘百福用薦千齡啓金籙之靈壇造玊京之勝地伏願皇帝明齊月桂壽比天榆握金鏡以御寰瀛致衢樽而歡億兆垂旒問道覩元凱之忠貞負扆調元獲夔龍而翊賛四三皇而永固一六合以無虞仰奉虚皇俯垂玄造冀納䖍祈之志獲申懇禱之誠皇太子爲皇帝修金籙齋詞伏以浩邈無涯育乾坤者至道彌綸莫極運造化者玄功凝一氣以生三才周六虚而吹萬有所以春皇秋帝雲紀火官承妙用以御寰瀛體無爲而統天地曷常不含和韞粹端拱穆清執大象以臨人乗飛龍而布化雖流金爍石湯德彌光懷山襄陵堯風益扇皇帝應圖負扆握鏡開基慕玄元慈儉之宗仰黄帝華胥之躅日慎一日雖休勿休故得聲教旁敷京坻積稔俗臻暇豫民樂雍熈交歡自洽於鄰封賝贐爭來於絶域倍増寅畏祗荷穹旻昨以垂象飛芒天文烱戒𨇠次雖殊於分野禱祈勵切於焚修恭啓皇壇敢希鴻福仰玉清之玄化稽首知歸開金籙之道場齋心發願所貴者逹誠碧落薦壽皇躬與日與月之同明共地共天之咸乆青詞奏御俾金慧以韜光丹表通眞致珠囊之叶度災纒永息禎瑞常臻鳯曆克調狼煙不警政隆三五祚越億千位忝儲宫實欽仙境輙傾素懇仰望玄慈中元衆修金籙齋詞伏聞至道希夷眞精玄寂弘化於混元之表凝光於太極之先散淳一之根潜分歩驟鼓生三之氣以制寰瀛所以乗龍𥫄氣之君畫卦垂衣之后順敷道要創厥皇基恢妙用而福寰中布神功而利天下昭彰帝紀炳蔚人文允屬睿朝誕應天睠皇帝儀乾受命應運開圖繼軒黄帝頊之靈源茂亶父文王之至德纂承土運光啓金衡端旒扆以穆清慕唐虞而眞正思洽大同之理以康九土之民稼穡連豐華戎咸泰皇儲輝重明之美遐方賛有道之風中外恬夷生靈輯睦況屬三元令序大宥昌辰宜䖍齋潔之誠共祝君親之壽拂瑶壇而展禮按金籙以陳儀龍綵質心香花備信熖九光之蓮炬下照冥津飄三素之檀煙上聞眞域必冀三天降祐萬聖延慈宗社隆昌寳圖安鎭齊乾坤於聖壽等日月於睿明文德武功綏寧八極天枝寳胤輝映萬齡儲皇享椿桂之年常扶大業妃后潔蘋蘩之德共翼宸居朱邸清朝彌臻景貺外藩内輔益履殊榮常樂雍熈皆登冨壽其有宿殃積釁徃債前𡨚年辰命運之災算紀飛旗之厄乗兹懴謝並乞消平即冀宗廟尊靈生神三境臣等九玄七祖受福諸天貽祚流祥傳休無極上願天文昭著象緯澄清回直符太一之旗息玉彗金芒之耀蕩憂患於井參之野延福祥於梁益之墟九榖無虞五兵斯戢螟蝗水旱無肆沴於農功疫癘凶荒靡非災於閭里幽關舒泰品類滋榮海岳歸仁寰區禀化至有立功將士徃逝都頭勣著勤王忠推致命毎因齋薦皆爲懴祈必離㝠漠之郷更遂逍遥之適或幽隂尚滯渙澤未霑或嗣續已無奠羞多闕九宫符命即爲遷神三籙洪恩俱令濟苦勿爲疵癘速詣福廷動植飛沉盡登眞道皇帝修符瑞報恩齋詞蓋聞歷代帝王受天符命咸宗至道以御鴻圖莫不用慈寳以臨人仗玄功而濟物克致雍熈之運仍頒祥瑞之文顧以薄躬猥臨大寳寰區尚擾思偃武而未臻法令頒行念措刑而莫得内惟兢業莫敢遑寧今年七月漢州十邡縣百姓郭迴芝於仙居觀採藥耕地掘得銅牌長七寸廣四寸上有六十字老子通天記云丁卯年甲戍乙亥人王生享二百年天子王從建王元膺王萬感王嶽王則王道宜五字篆文後云北邙化張弘道天寳留此明聖伏欽承玄貺䖍佩靈符識大道之垂休知卜年之惟永爰傾丹懇用答殊休按九等之科儀修靈寳之法事所願丹心俓逹聖鑒俯臨社稷永昌休徴必應四時合序萬物以嘉俾令率土之賔盡保無疆之福稽首謹詞黄齊助中元黄籙齋詞二首助然燈詞伏聞三元大宥乃諸天降福之辰九夜長幽是厚地重隂之境將消積暗爰假神燈上納三光下照群爽經科所重濟護攸先令屬序屇中元壇開黄籙三時朝懴萬罪蠲消輒備香油同申供養伏冀鸞輝鳳熖凝光地府之中星布蓮敷散景泉扄之内盡超苦趣永出㝠津九祖生天六親介福災祛未兆善洽無疆奉上安家並希元吉黄齊爲二亡男助黄籙齋詞臣聞包容萬象至道爲亭育之尊弘濟群生天尊演虚無之道莫不恩覃纎芥澤普存亡明眞開玊匱之書長夜釋重隂之苦丹誠上感玄貺必臻臣過咎夙彰神明垂譴纔逾一月繼䘮二男憔悴中年寂寥孤影痛蒸嘗之時絶念㝠漠以何依懼彼營魂尚爲拘滯伏思遷㧞唯仗焚修捨其服用之資助此香燈之㑹涼飊韻磬應聞泉曲之中秋月凝壇想照夜臺之下願乗齋福俱出幽關鍊魄朱宫生神絳府各遂逍遥之路盡登清净之鄉永奉正眞長居道域人間天上終際㑹於善縁萬劫千生更團圎於眷屬昭昭願力眞聖鑒知不任涕咽䖍祈之至趙郜助上元黄籙齋詞三首至道流慈元皇垂貺三宫四赦爰孚作解之恩品物昭榮共樂如春之澤皇壇巨祐幽顯無遺臣以庸愚叨逢聖運早承寵禄常戒滿盈猶恐年歷之間星辰之内因纒厄㑹尤切兢憂輒因黄籙道場䖍申悔謝仰希上聖俯鑒冲襟宻賜福祥潜祛災咎壽年増益家眷康宜存殁幽明同臻景祐中元律移朱夏節應素秋鼓夷則於西郊歛火雲於南極裁非戒惡允屬兹辰猥以塵凡叨親道化身叅丹籙名𨽻玄臺而過尤易結世網難祛動静行藏未混融於大道年辰宿曜猶纒集於衆災輙因黄籙寳壇助營香供冀蒙聖力俯鑒愚𠂻開罪書而解赦愆尤豁塵累而蕩蠲厄難九玄受賜舉族霑榮永承祐護之恩誓竭歸依之願下元臣以宿因獲承積祐早叅職務族忝官榮而所主重難常深憂懼尚慮行年災滯星曜加臨遂履困蒙莫知祈告今屬玄㝠屇節水帝司辰星杓方指於孟冬朔氣正雄於北陸年光遷貿修奉彌專敢因九奏之壇䖍瞻上聖盡瀝萬重之懇願降殊慈賜臣罪咎消平災凶殄息前𡨚宿債乗功德以和寧徃世今生荷懴祈而濟拔九玄享福舉族霑榮克承憫祐之功永勵歸依之懇馮㳙大夫助上元齋詞伏以大道垂文澤周存殁天尊演化恩及幽明廣敷九等之科以拯重冥之苦敢持哀懇仰叩玄關今月二十六日亡妣隴西群君贈隴西郡太夫人李氏忌齋詣玉局靈壇因上元勝㑹同修香供用禱福祥伏願亡妣鍊景朱陵棲神玄圃悟恬澹希夷之道契長生永劫之眞玄㑹無爲克臻妙果中元伏聞黄籙明科紫陽具典玄元勝力丹簡宣恩拯拔幽沉照臨㝠夜古今宗禀生死銜恩有感必通所祈克應今月二十六日是臣亡妣贈隴西郡太夫人忌辰輙因玉局壇場中元齋薦同申修奉冀逹眞靈伏願亡妣乗此福縁髙昇道境遊神碧落蛻影丹臺永登快樂之郷克證希夷之道下元伏以黒帝御時玄㝠肇序下元勝㑹大宥昌辰所宜䖍祝上眞勵精下土用祈禎貺以福存亡今以玉局靈墟瑶壇展禮輒持法信用助齋誠敢希衆聖鑒臨萬眞昭祐九玄開度超離㝠漠之郷五族叶和長荷安貞之福災凶殄息罪咎消平永誓丹襟仰承洪澤周庠貟外助上元齋詞伏聞齋敷九等節啓三元是萬方禱福之辰是衆聖宣恩之日今屬玄元眞化玉局靈壇陳黄籙之儀按玄都之品九時奏御三日焚修精助香燈同申懴滌伏冀髙尊錫祐大道流慈採納精誠降頒鴻福九祖遂超昇之願六親霑覆護之仁消厄滯於將來解𡨚讎於既徃罪咎原釋疾苦痊平壽禄増延凶災除蕩克叶發生之德敢忘大道之恩下元㐲以玄帝司辰水官統序乃請福延恩之節是凝心滌慮之期況玉局仙蹤瑶壇盛禮九時焚祝必介於休禎三日齋莊敢同於懴謝所冀災纒殄息𡨚債消平罪咎咸蠲存亡共泰永䖍修奉以答玄慈盧蔚大夫助上元齋詞伏以大道周行三元立訓陟明考校毫末無遺臣早慕玄虛夙宗清浄每展恪勤之懇以祈昭祐之慈今以玉局靈壇上元福㑹輙賫香燭同助焚修所祈消解灾凶滌除罪咎蠲平疾厄延益年齡善功克被於存亡禎貺旁周於眷屬永勤丹慊仰副玄慈上元伏以考校良辰先春令序當上元陟明之節乃群生舒泰之期式罄齋誠以申䖍祝今屬錦都靈化玉局瑶壇啓黄籙之眞儀展玄科之盛禮輙持香信同助良因伏惟衆聖垂慈萬眞昭鑒憫其修奉錫以禎祥惠普存亡遐祛罪咎解災纒於未兆増禄壽於惟新永勵丹心上副玄貺中元伏以四始周行三元定籙陟明顯晦考校無遺臣素奉道科早師玄寂每逢良㑹必勵修崇今以玉局朝元霜壇蕆事輙賫香燭潔助齋功所祈大宥之恩允降自天之澤疾恙痊愈禄筭増延仰薦先靈旁沾眷屬永承丕祐欽賛元勲不任歸命丹切之至下元伏以水德配時玄冬叶候當二氣謹蔵之節是諸天校㑹之期所宜勵志重玄凝心至道滌瑕悔過請福希恩況玉局皇壇錦城福㑹敢營香幣同助齋修三日肅䖍九時朝懴冀蒙昭祐廣賜休祥賜臣玄祖超昇隂冥開泰存亡濟度災咎銷平釋𡨚債於夜庭落罪尤於地簡疾厄痊復筭紀遐長誓傾嚴奉之誠常副眞靈之祐廣成集卷之四
