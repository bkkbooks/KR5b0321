front:
  text: 廣成集卷之十六毀四
  hash: sha256:1373dd04fc0e79f4d2280ce8fd3e56b5b492ee7cbc606c99885633a148c19a6d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0321_SJB_016-110303a, image: sjb/11/110303a.png}
body:
  text: 上都大清宮内供奉應制文章大德賜紫杜光庭進天錫觀告封章李二眞人醮詞伏以稽考前王握圖受命必荷玄貺以賛洪基須屬海嶽多虞生靈靡託遂膺推戴奄宅岷嶓四方之賝貢雖來中土之山川或阻凝懷求理夕惕晝乾砥礪戈矛申嚴號令佇行弔伐以拯顛危非有尚於佳兵蓋欲靖其多難以兹軫念倍用焦勞而郡國諸侯頻獻祥瑞鱗介羽毛之品聚林竹樹之間或挺質稱竒或成文顯迹毎加撝讓累抑奏陳永平二年秋七月於仙居靈山獲古篆銅䜟乃太上通天之記是章眞所鑄之文名姓生辰子孫年數重重顯述一一合符周公探䇿之求郭𤩶揲著之得眞爲天授克驗神功顧寡昧以多慙豈欽承之敢怠是用創新觀宇别署嘉名備像設之儀攺鎮縣之額齋修金籙醮啓瑶壇雖陳昭報之誠難答上玄之賜章眞人親緘秘字李眞人首鎮仙山共洽休禎光于羣國須展褒封之禮以旌賛助之功爰舉彞章式陳歉欵今封章弘道爲鑒聖眞人封李八百爲玄應眞人謹遣廣成先生金紫光禄大夫左諌議大夫蔡國公杜光庭精備香燈虔申醮告伏惟闢九清之日闕降八景之雲輿俯鑒明誠滂流惠渥俾九州六合蕩氛靄以爲家地乆天長混車書而成化誓遵玄訓永勵丹襟不任虔祈之至謹詞天錫觀告封章眞人詞惟君名摽丹簡天付仙才人間之玉軸珠軒何甞眄顧物外之雲棲霞飲自得貞閑早受靈書精窮緯候鉤深索隱藏往知來鏤銅篆於仙山證金行於蜀國二百餘年緘祕蹤迹長新五十八字周旋禎祥盡驗顧惟薄德祗奉靈休雖揆構華居崇嚴塑貌新邑市之額展齋醮之科尚歉素懷未酬玄貺申典禮特舉褒崇今封君爲鑒聖眞人謹遣杜某虔啓霜壇恭申昭告鸞輜鶴轡將從文始之遊緑室瓊幃叙列太元之品眞人更垂幽賛常假靈光俾一統於九圍度永昌於大業唯勤宵旰以泰生靈謹詞封李眞人告詞惟君仙李芳枝關雲金緒玄丘自誌元非促景之才道骨眞風本列長生之品振衣世表抗跡雲間猒駒窻電逝之勞得鼇嶺雲行之趣棲遊蜀國顯晦塵寰三隱靈峯八百餘嵗神丹化石猶存昌利之山㧞宅昇天遂表仙居之宇爰於舊址果獲靈文緘藏乆祕於瑶墟出見克符於金運緬惟涼德祗荷殊休雖繕飾蹤基肅嚴像貌率齊莊而告謝命羽褐以焚修尚歉素懷未酬玄德今則考兹且禮薦以嘉名想星珮霞裳早昇眞位而芝泥露篆願表勤誠循省沖襟良多靦愧今封君爲玄應眞人謹遣杜光庭恭設醮壇虔申昭告冀流玄廕永福皇基聞宣室以遐思佇髙眞之俯鑒謹意漢州太尉於仙居醮詞臣聞至道無爲包萬天而成化玄功有作運四象以陶鎔覆載含弘古今無爽由是三靈克叙五緯循常景福被於幽明鴻休覃於邦國人天荷頼渥澤遐霑臣夙感靈慈獲逢昌運累歴殊寵出居符竹之榮頻洽隆恩入奉重難之寄顧惟虚薄未著勞能省分憂惶兢懷震惕雖傾心勠力誓酬君父之私懼福過災生或履晦蒙之數竊恐主張戎伍宰制封疆理民有獄訟之繁奉職有賦輿之廣沮勸有賞刑之用送迎有宴犒之常殺傷有故誤之憂裁斷有重輕之失因成罪目曽未懴祈或徃債前𡨚未蒙和釋或星文命運猶值災期粤自夏初至于秋月乆嬰微恙未獲痊除非憑至道之縁孰致眞靈之祐今屬醮陳翠墠詔降紫泥髙仙肹蠁以停輿萬聖昭彰而介祉敢因勝㑹輙備香饈披寫丹誠虔祈玄廕伏惟鑒護賜以福祥俾臣罪咎蕩平𡨚仇和釋災凶超度年禄増延疾厄蠲銷休禎臻集將壇師律勵陳翼聖之勤青蓋朱輪敢怠行春之至不任歸命披心之至謹詞前嘉州團練使司空王宗玠本命詞伏以二氣運行五材生化禀形賦命咸繫上玄顧惟微眇之資叨荷裁成之澤克逢昌運累冒寵榮入居近宻之司出領河山之寄主張戎伍臨莅黎元慙非經濟之才常懼滿盈之戒果乗厄㑹遂蹈危機實深睿聖之慈再齒簮𥚑之列夙興夜寐感聖懷恩寸心徒切於勤劬微効未酬於君父伏自累年之内災滯紫仍中秋巳來疾恙頻作雖加醫砭靡就痊瘳竊以土星居身命之宫于兹數歳火曜臨田宅之位猶在子方太歳爲六害之辰小運當歳破之上雖冬首有木星之福而即時值行運之災履此凶衰倍深憂懼又恐理民主務皆繫重難用刑或寡於哀矜主膳或誤於烹宰乆爲𡨚債未遍懴祈又恐徃世罪瑕幽關詿注或住宅有龍神犯觸或郷關有塋壠損傷流逮於身致兹危厄拊心思過惟切禱祈敢因本命之辰虔備香燈之禮仰玄穹而請命罄丹懇以希恩伏惟天地眞靈隂陽主宰降流巨祐采鑒深𠂻蕩滌罪尤銷除災厄和平𡨚舋解釋殃流先人獲泰於𡨋津後嗣期安於聖日三開腠理無壅閼之虞六腑機衡有均調之望賜其痊愈介以福祥續年齡於將盡之秋保形命於再生之日刳心投泣瀝懇祈眞誓傾修奉之誠上答尊靈之祐臣某不任虔祝之至謹詞前漢州令公宗夔上元醮詞臣聞裁成天地陶鑄隂陽三元爲布化之辰五絳爲主生之紀總其宰制歸乎至眞用能福被邦家惠兼幽顯南昌丹籙式弘進善之階北部黑書爰示繩非之旨是申戒勸廣庇人天臣獲奉眞宗常遵明訓惟勤惕勵上副玄慈伏念荷國恩深致君力寡功未刋於鼎鉉賜巳冠於人臣出擁節旄總司戎旅荐新寵澤載踐崇榮青𤨏位隆黄樞寄重循懷増懼報主無階但虔焚祝之儀冀答君親之德今屬天官御節太皡司方少隂敷煦育之仁大宥布生成之令是敢精持香火恭啓醮祈仰景象以㝠心佇休禎之應念上願寳圖悠乆聖壽延長中外樂康寰區寧泰八紘九土咸歸一統之尊歳稔氣和永叶無爲之理𡨋關朗晏動植舒榮率土普天咸登壽域臣某乞災凶蕩滌𡨚債和平罪咎蠲銷福祥臻萃公私有泰眷屬常寧誓傾忠孝之心克賛休明之運不任趙國太夫人某氏疾厄醮詞妾聞天眞憫物大道好生常弘拯護之慈俾遂安全之願顧惟至化育此含靈氤氲之二氣裁形昭灼而三元定命吉凶罪福上禀天司妾以命禄俱衰納音在墓雖值含神之吉又當衝破之凶遊年旣值於天符本命仍逢於五鬼身宮之内暗曜所纒鈍滯宿中土星所歴刑厄位上復值火星重疊災衰遂成疾瘵未復痊退彌切憂惶竊恐前代今生罪尤未解負財負命𡨚債未除非慿大醮之筵難罄懴祈之懇是敢捨其服玩備此香羞嚴設壇場虔申禱祝㐲惟諸天憫護衆聖矜憐申再造之仁全好生之德三官五帝暗曜七元南斗北辰天司列宿嶽瀆尊聖地府明靈及妾本宮遊年八卦内外應感三界靈司賜於曹府之中簡籙之内有𡨚仇罪犯厄運災期勑命所司特賜原赦續其祚禄加以年齡蕩滌凶衰蠲平疾苦百關宣適六腑安和重覩天光再履人事推心勵節永酬濟祐之恩念善參玄上副眞靈之澤不任瀝懇披心希生請命迫切虔祈之至謹詞王宗玠宅弘農郡夫人降聖日修大醮詞妾聞玄元道祖太上老君凝神三境之中屬念普天之下將加拯度爰降眞儀垂太陽五色之華駕旭日九龍之轝夢渦川而寓景攀仙李以誕生陸地開蓮初承玉歩虚庭涌井瑩濯瓊姿宸容彰挺特之儀睿旨闡希微之教萬天宗禀歴代師資摽令節於昌辰錫殊休於品物冝崇勝㑹用表精誠妾早悟眞乗甞參寳籙延生妙篆紫陽丹殿之文飛化靈圖絳闕朱宫之籍正身心於九室撿神氣於三關滌過蠲邪利幽濟顯毎勤修敬敢怠香燈爰因大宥之期恭備醮眞之禮是用馳誠鶴宇矚想龍輿瀝丹欵以騰詞拂碧壇而蕆事天闕地府日域星𨇠三官五帝之曹北部南丹之署下周川嶽旁遍幽靈畢罄明誠冀䝉昭鑒上願皇基隆永睿壽遐長道化和昌聖教宣布九區四裔常尊道德之風庶類羣生共樂昇平之運妾九玄七祖徃逝先靈擢質丹陵生神碧落災祛未兆善降無涯年筭更増罪瑕俱驛誓虔注念上副鴻慈不任歸命之至洋州令公生日拜章詞伏以三天布化正一垂文煥啓玄功廣濟羣品欲使天光下燭隂關息幽翳之悲凡懇上陳陽景遂宣通之願由是敷二十四籙命千二百官統領人倫主張眞籍騰心靈爲騎吏飄香穗爲驛龍積思而感契可期拯護而誠明必達古今宗奉惠渥昭彰臣夙慕正眞常叨廕祐將壇相印未申報國之勞潔己澄心毎切修生之願今則虔膺綸詔暫撫逺邊爰屬生辰輙祈靈貺恭陳醮禮精備章文伏惟大道延慈天師鑒祐降兵官將覆祐護持俾其戍遏成功烽煙罷警殊方革面咸襁負以歸仁獷俗悛心盡梯山而向化佇清寰海永致雍熈臣禄筭増延災凶殄息道運寧泰將吏輯和普及幽明俱承玄祐不任歸命虔祈之至謹詞東院司徒孟春甲子醮伏以大道開光玄元垂化氣分五緯五帝操代謝之權節布三元三官主死生之録由是百神受職品物知歸寒暑推遷成歳功而明罪福支干配合統人事而定吉凶今古攸遵應靈無爽臣叨承玄廕獲佐昌時福過災生毎切持盈之戒才輕任重惟虔報國之誠今者候及上元序新六甲考校當天官之首司明值甲子之初屬此令辰恭修大醮敢期玄聖俯鑒丹誠臣某伏念身逺庭闈禮遥温凊今兹迎侍尚阻江山況隴硤榮紆江波濬險惟慿神力冀保畏途伏惟五帝髙尊三官大聖六十甲子應感威神俯廻肹蠁之靈特降昭彰之祐使輕舟利渉萬里無虞靡勞陟屺之吟速遂綵衣之養俾諧懇願敢負明恩誓勤嚴奉之誠永答眞靈之祐不任歸命披心禱祝祈恩激切之至謹詞刁子趙太尉陽平化醮詞伏以至道分光仙曹列品上浮辰曜下結名山包洞府以深嚴擁雲霞而秀異潜符邦國大庇生靈統録人天主張命籍除災降福有感必通臣獲奉聖明叨榮爵秩總領戎伍慙無韓白之功部握魚符愧乏龔黄之政常虞盈滿以致災衰早罄丹心歸依玄教傳修經籙宗仰眞靈所願國祚延洪聖夀遐永萬方一統四海㑹同臣某削落災危蠲銷罪咎六親蒙福九祖生天禄筭惟增功名克著誓虔忠孝永奉休明庶期修勵之心上副眞仙之祐恭修醮酌庶達明誠不任歸命虔祈之至謹詞廣成集卷之十六
