front:
  text: 廣成集卷之六敢六
  hash: sha256:4e405697c5f45a724fc465c3080249da0c455cabb8a8308db3accafcdf9f507c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0321_SJB_006-110257c, image: sjb/11/110257c.png}
body:
  text: 上都太清宫内供奉應制文章大尤賜紫杜光庭撰衆修北帝衙醮詞伏以五氣玄天北宫太帝司明善惡統御死生壽禄吉凶咸資校録臣竊恐天文宿曜有臨照之災本命行年有刑妨之咎仰祈眞聖特具修禳䖍罄丹誠同伸醮禮伏乞解除災厄延益年齡落死籍於北酆上生名於南極公私和泰眷屬安寜即仰荷帝君慈祐之恩三㑹醮籙詞臣獲奉正眞參受玄籙内期修錬以保身心外冀威靈以禳災沴依科佩受早遂寳持但慮世務所拘塵機所役齋戒之日朝謁有虧修行之辰香燈或闕善功未立過咎易彰眞氣靈官未垂應祐玄司天府譴賁不專三命五行災衰未蕩旦夕憂懼冰炭在懷今以上㑹之辰天官考校之日功過善惡巨細無遺是敢瀝懇披心䖍誠悔過精修醮禮拜奏章文伏惟衆聖垂慈赦其愆咎降流靈應銷解災凶三部吏兵常加祐護動息康泰永享利貞即仰荷法籙眞官濟護之恩軍容安宅醮詞伏以二象既陳三靈配位隂陽陶鑄天地權輿巢居穴處之君澆漓未作上棟下宇之制締構云興由是取則五行定規六紀順之則福延善著違之則禍起災生考其主張實惟五帝臣所居之處經始有年土木之用繼新畚鍤之功累作竊恐上干五帝旁犯衆神又今嵗興修當行年之位近則馮氏忽嬰疾苦懼因犯觸所成輙按玄科䖍伸醮謝備三天之舊格請五帝之靈符乞降正神俯流眞氣永錫安鎭俾獲乂寧凶邪不侵内外康泰疾厄蠲蕩眷屬咸和青宫増禄祚之文黒簡息災蒙之數克勤修奉以答神功不任王䖍常侍北斗醮詞臣以凡微獲逢道化常承覆祐實荷眞慈自頃以龍紀元年奉使支郡方傳上命遽蹈禍機危懼之中眞靈俯祐獲全形命盡脫憂疑而雨地未通三年隔絶臣男延龜懇伸禱祝累告神明天鑒誠深親承應兆仰惟至聖介此殊恩思罄丹心克伸報謝今則上元大節啓福良期輙備醮筵上酬明貺伏冀省臨薄禮采納菲誠答徃願於當年期降恩於此日永當修奉以荷神庥不任馬尚書南斗醮詞伏聞清濁分形髙卑定位南北御死生之籍隂陽有舒惨之殊由是南斗尊神六宫衆聖紀功舉善克揚不死之文主籙定年唯啓長生之本欲使物皆歸道人盡登眞副天尊廣濟之慈遵大道好生之理而塵波易溺意馬爭馳罪網牢籠莫有奮飛之路情關固閉曽無開拓之門臣跡處人寰心拘俗役機權在握須行懲勸之文刑賞是司難徇冲和之用慮其過咎累積隂曹更屬災凶便爲厄㑹雖繼伸祈懴上扣於天曹而未吐明誠仰陳於南極今則考祥吉日崇設醮筵輙按眞科盡披丹懇元元下土䖍露於瑶階昭昭上眞必降於瓊席敢期哀宥俯念凡微釋罪除災落北宫之隂簡錫年増禄上南斗之陽篇六宫永紀其姓名五緯潜資其福祐乞使九玄七祖介福朱陵五族六姻延祥紫府誓勤精奉以答鴻慈不任李綰常侍九曜醮詞伏聞二氣降和乃形品物三光布象以育群生惟兹最靈仰承明祐至於行藏善惡動息吉凶咸繫上天以司下土臣𦍒承前福叨沐道風事主立身得罄忠誠之節循懷省己常持兢愼之心禄秩所霑神明是貺每増憂灼實慮玷危而眼疾所嬰累年爲苦針藥雖至服餌益勤未痊瘳倍増驚懼恐隂陽年運遇此重災宿矅循行成其困厄曽申禱醮冀獲安寧今又身宫之中暗虚所歷當兹乆疾值此災期啓向無門彷徨失據伏聞眞科有格醮酌垂文輙竭丹誠上希神鑒精修醮禮延降尊靈伏惟九曜威神分光照納解其宿咎和釋𡨚允銷彼災纒蠲除疾厄使紫童守衛眼宫無痛惱之侵青帝護持肝臟有安平之候凶衰永息禄算惟新敢忘修勵之誠以答照臨之賜不任馬尚書比帝醮詞臣獲以凡微早聞道化栖心澹泊注念正眞每展祈誠必蒙昭祐昨以公田既闢壠麥初齊遲遲之春日載陽羃羃之油雲未布眷兹農畆正切憂惶輙扣玄關果垂鴻澤爐香散處便呈潤石之容禁水噀時巳變如膏之雨遂使西成有望東作無愆可俟京坻以豐川蜀上聖之延祥既厚下臣之報德何階䖍拂翠壇式陳單菲蘋蘩藴藻誠非仰薦之儀繒燭香花敢備上酬之禮伏惟采納永錫嘉祥謝過祈恩不敢繁啓不任又馬尚書南斗醮詞伏聞大聖無私隨機赴感至眞下濟應念降靈變通不間於塵凡救度豈遺於微眇臣自惟幽陋竊慕玄虚洗心依冥漠之都潜希懴罪稽首仰鴻蒙之境冀滌前非上祈拯拔於七玄次乞和寧於四境纔披素欵遽降鴻慈爰俾神交授其嘉夢魂清氣爽全殊化蝶之時捫腹安懷有𩔖得鮫之夕固可表豐嵗之兆知災息之微緬惟神功申兹景貺兢榮先次感激難勝思答靈恩重修醮禮鴛燈吐熖參差玉斗之光龍霧飄香散漫瑶池之色全祛萬慮共運一心伏惟丹府上眞六宫髙聖俯迴鶴轡暫降霓旂采納寸誠哀憐末俗拂長生之金札開大宥之洪休賜其延永之年増以自新之禄主務則三農告稔訓戎則七德申威罪咎蠲銷公私昭暢存亡介福眷屬延生北元除録過之書九府錫増年之籍況復五緯循行或逢臨照三元繫命時有屯亨遇災生福盡之期當減禄奪年之數常情罔測揣分懷憂非仗道慈無由自濟伏聞太上啓修禳之典天師著祈醮之科謝罪必銷祈恩克降今以本命之日輙披正一之文䖍拜靈章式陳微醮三宫五緯咸罄誠祈六府七元普申懴謝伏冀衆尊昭祐大聖鑒臨赦巳徃之過尤錫將來之福慶息九厄蠲消壽紀潜延禄祚興益七玄九祖超度幽扄五族六親均承道廕公私永泰存没康寧即仰荷大聖罔極之恩不任唐洞郷本命醮詞臣宿運所鍾遭值道化佩奉眞籙獲以禀修而功業未彰愆尤易積隂陽爽候疾疹所嬰憂迫既深扣祈是切果蒙昭祐旋獲痊平又於中元之辰欲陳黄籙之㑹仰告眞聖願遂丹心今則壇席克終功德成就關盟有應風雨無侵冥感聖慈効酬難盡敢因本命䖍備科儀設微醮以展誠拜靈章而請福伏冀髙尊鑒領衆聖照臨前願巳圎殊祥下及使臣罪銷厄滅業著功充奉親既保其安寧薦逺必霑其遷拔永堅誠礪以答眞靈不任告修青城山丈人觀醮詞伏以青城仙山丈人靈觀開九室而數洞觀群嶽以稱尊自軒后錫封漢皇望秩玄宗構宇先帝増崇仙室益嚴清壇彌肅近則良宰興葺靈宫鼎新而正寢之西猶虚隙地䆳牖之北或賭餘基玄元之像設未陳帝子之遺蹤宛在輙欲興修祖殿經始齋房永資焚謁之儀克壯清虚之境將施畚鍤慮犯龍神敢備醮筵䖍伸昭告伏惟允兹丹懇降以玄休使功用必成上下無撓工徒安泰福善攸新不任嚴常侍丈人山九曜醮詞伏聞天地分靈三官定死生之格隂陽懸象九曜垂照燭之功南宫開延夀之符北府顯繩違之簡星𨇠嶽瀆考校無私凡在人寰咸由統御臣自惟微薄獲奉玄慈而履行之間恐隂騭運心之際未合神明因遇災凶復兼愆咎遽成厄㑹莫遂懴祈今年中宮則天符所臨身位乃土星對照大運猶居於劫殺飛旗又寄於行年三命五行恐逢刑剋列星九曜更慮照臨所以轗軻未寜災危頻作非憑至聖無路扣祈是敢䖍罄丹誠克申大醮伏惟衆聖俯降福祥銷災咎於將來釋過尤於既徃六曹司命増福算於丹天七紀尊神介休祥於玄極公私清泰眷屬安康即永荷衆聖祐護之恩不任青城令莫庭乂爲副使修本命周天醮詞伏聞道化宣行玄功䨱載隂陽不測亭育無私由是五帝三皇御六儀而統物天官水府司八㑹以持綱南宫明録善之科北極緫繩非之品吉凶罪福咸繫靈曹竊惟全蜀奥區華陽㑹府隄封八國柔服諸蕃玉悵既崇金臺實峻外清殊俗威懐則文武兼資内握雄兵申令則賞刑俱用臣切以張某乆持重柄獨運赤心上禀聖謀仰遵廟畧或指蹤貔武清蕩邊陲或恢復城池削平疆土或誅鋤姦猾摧挫兇豪或督課賦輿經營軍食以兹多事詎可禁刑深虞斬決之間重輕有失因成譴咎曽未懴祈又恐三命五行或逢衰厄明星暗曜或值照臨神道至幽常情靡逹非聞至聖難滌深瑕是敢依詣靈山修崇大醮遍天地隂陽之府周星辰日月之宫瀝懇披心祈恩悔過伏願靈光逈鑒除巳徃之愆違惠澤下臨息將來之災否允垂嘉祐永介福祥延夀紀於丹篇落罪名於黒籍以康川境永保群生不任莫庭乂爲川主修周天醮詞伏聞元聖開光髙尊俯化澤周品彚慈覆萬天懸罪福之明科標死生之大法上惟邦國下及人臣同歸統御之門咸宗沮勸之訓古今不紊纎芥無遺臣伏念佐聖立功非賢不濟扶危拯難非德靡先節度使王某義貫神明忠衞社稷耀武畧而先朝返正鼓仁化而今聖理平用是茂勛錫兹巨鎭其間或剋收宫禁誅蕩妖兇秦甸行師褒川振旅廓清庸蜀底定天彭外静邊方下戢姦暴蓋不得巳未能去兵至乃宣天子之威用將軍之鉞無非仗順必在爲時尚慮故殺誤傷因成釁咎天曹地簡或紀愆違又恐宿曜所臨行年有厄曆運衰否分野災凶須備懴陳以期昭洗臣叨居寮屬輙按經圖仰罄丹誠恭申大醮潔禮頌於仙嶽奉榛糈於靈壇上扣虚無極諸天而禱祝旁周海宇俯九地以䖍祈冀達精思曲流眞祐願北宫赦罪南極延生五行之否塞清銷三命之災衰弭絶壽將川廣禄與山崇榖稼豐穣蒸𥠖輯恱常扶聖日永福群生上願國祚遐長聖朝寜泰戈鋋自息文軌大同三光順度於上玄萬類繁昌於下土幽明異趣水陸殊階咸沐眞慈共臻鴻澤不任莫庭乂周天醮詞伏以天地萬神隂陽具職敷舒道化拯育群生北極西官秉刑章而定罪南𨇠東府播含養以宣功粤自帝王洎諸臣庶咸歸宰執以判吉凶臣夙荷福因叨塵官籍蹈艱危之路當戈甲之秋一從戎旃再居名邑而疆陲遐邈征稅繁豐寛柔則徴督無功剛峻則疲羸有怨類驅鷄而豈易顧馴雉以殊難況未洽和平猶資刑賞雖絶私自勵惟理是從尚慮重輕或乖中道深憂故誤遂結瑕疵又恐辰耀所臨行年所歷因其厄滯以構災衰境麗仙山雲藏眞觀洞包雷雨地集龍神仰靈都於罔象之中願披丹懇瞻玉相於煙霞之表必降玄慈是用按靈寳舊科設周天大醮普九圍之宫府遍十極之威神拜手歸依傾心祈懴洪纎罪目今昔愆違未兆之災將來之咎並期蠲赦曲賜消禳衆厄清夷宿𡨚和釋更増微禄俾遂遐年九祖超昇三塗開泰臣一家骨肉兩地親縁早獲團圎俱賜貞吉頃因修造慮有侵傷冀獲安寧共貽祥祉當境靈廟川澤職司俯祐生靈旁祛氛沴邑無水旱俗富倉箱其有冥漠無依漂零魂爽霑兹福利亦契逍遥不任莫庭乂青城山本命醮詞伏聞三光表瑞九曜凝輝配金木以司方四時攸叙定隂陽而立象萬彚生成主宰幽明統臨罪福臣自惟凡陋獲奉眞靈懼履行之間易成愆咎修持之道未契神明況職務所司重輕咸繫恐乖彛法更積過尤唯夙夜在公敢忘䖍恪而吉凶難測倍切兢憂兼以宿曜所臨輙罄懴祈之懇爰因本命㳟備醮筵備香火以貢誠列星燈而展禮所冀希夷至聖俯鑒丹心九曜上尊曲流玄貺釋罪尤於既徃解厄運於將來𡨚債銷平凶衰除蕩更増壽福永介祉祥眷屬乂安公私和泰不任丈人觀畫功德畢告眞醮詞伏以青城仙山丈人靈觀乆無營葺近再修崇既畢巨功爰徴繪事輙於廣殿圖肖眞儀鶴貌雲容疑謁潜虚之府瓊姿淑態似來澄碧之宫莞爾可瞻肅然如在必冀降靈威於水德流福澤於人寰克展醮祈仰希鑒祐無任畫五嶽諸神醮詞伏爲丈人觀乆爲荒毀近畢修營土木之後既興粉繪之功是設爰於閟殿圖貌靈儀翠雲丹錦之袍玄璧黄琮之器星景日精之品五華七稱之殊二驂六馬之車雲翼霞軿之輦儲副二職佐命八山嶽君水帝之儀溪女河侯之列山林孟長沼沚靈司帝王咸秩之曹典䇿所封之位或傍司海裔東距方諸或别領洞天西鄰崐嶠莫不振楊雷電嘯㘁蛟鯨按察幽明掌録川澤賛太上正眞之理宣帝王亭育之恩歆彼六氣成乎大化比秋冬春夏遵時令以無虧風雨雪霜均歳功而不爽俱奉軒轅之命皆持宰執之權與嶽瀆衆靈供上司之職則希夷眞君居丈尊之重當臨御之嚴頒序朝宗所宜森列今則揮毫匠手彩布循垣燦若星陳矗如雲擁由是宏𥚑襃䄂玉劔珠旒火佩含星瑶珪歛月或瓊顔蒨䄂若辭姑射之峯異狀竒姿似照潯陽之浦丹青式備絢煥如生固當契彼神明藂兹福祉上扶邦國傍祐黎元調十雨五風以登稼穡普九州六合以致雍熈洪圖齊日月乾坤玄化匝蚳蝝動植䖍修醮酌㳟罄祝祈佇降威靈允孚禎貺謹詞廣成集卷之六
