front:
  text: 廣成集卷之十七毀五
  hash: sha256:34e14f9aff0834b804d6a3ffa11406f204c7669a34294849c592d370cf94cfc4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0321_SJB_017-110306c, image: sjb/11/110306c.png}
body:
  text: 二都太清宫内供奉應制文章大德賜紫杜光虔進宣醮鶴鳴枯栢再生醮詞惟彼仙山奠兹南土雄盤厚地秀拱穹旻控綿洛之川原總岷峨之形勝巖巒捧日洞府棲眞連空之松檜扶踈千載之威靈肅穆果聞祥異顯此福庭垂至陽生化之功變枯栢凋摧之質柔條逈茂灑瑞露以飄香宻葉重榮動晴風而裊翠神仙幽賛宗社福招叶此玄休永兹禎貺是用精嚴醮祝仰荅眞靈凝心宣室之中翹想雲峯之外所冀華夷昭泰海嶽晏安稼穡滋豐氛埃蕩定永期祗奉以副玄私稽首謹詞李忠順司徒拜保護章詞臣聞道用無方神功不測随機應念惟感必通正一垂文傳寳章而拯物盟威立訓陳醮品以濟民粤自古先逮于兹日惠覃顯晦澤普天人臣某夙荷玄慈獲逢聖日天波浩蕩人爵優弘慙無經濟之能深盧寵勞之極況居司戎伍出鎮魚符或賞酬乖善惡之宜刑律有重輕之失俗懷咨怨民抱傷嗟有一於斯式彰譴咎又恐五行三命運值災蒙暗曜明星或當臨照或經過水陸侵觸龍神或土木興修犯于禁忌或前寃徃債或故殺誤傷動結罪條兼逢厄㑹致成疾恙彌切兢憂竊惟大道好生至眞設教著祈禳之典開懴謝之門是敢虔備壇場精修章醮拜天悔過瀝懇希恩伏惟三境髙尊諸天大聖降流慈施憫鑒塵微勑天府地司遍隂曹陽境解消災厄原赦罪尤削落凶衰和平寃債蠲除疾苦安鎮魂神六氯均調百關宣暢易短促之數賜延永之齡萬罪千災咸遂超度誓虔修勵仰奉眞靈臣某不任謝罪祈恩披心請命之至謹詞東院司徒郡夫人某氏醮詞伏聞大道垂科玄眞設教正一有祈恩之品河圖有謝過之文虔告尊靈必賜昭鑒某氏以夙叨靈貺擢質人寰祗荷恩庥常深戒懼近者忽嬰疾恙未獲痊乎竊恐履行立身措情屬念有違誤之過有抵觸之非或結舋流殃有所延注或明星暗曜有所照臨搆此災纒未蒙消解旦夕憂懼罔敢遑寜又以身宫之中當土曜行度命當危迫誠切告祈是敢遵按明科虔修大醮伏惟三寳上聖九曜尊神垂罔極之慈降䕶持之力賜某氏解消災厄和釋𡨚仇延續年齡増加祚禄使百疾痊愈六氣均調蕩滌凶衰蠲除罪咎永期修奉上答玄恩不任謝罪祈眞虔誠請命激切之至謹詞東院司徒冀公醮天羅詞臣聞賦禄禀形資於道化延生保命繄彼神功至有三命興衰五行代謝星𨇠經歴卦象吉凶苟逢厄㑹之期必示修禳之旨是則玄眞愍俗大道好生垂法濟人有感斯應三天正一寳章宣致福之儀太玄河圖醮品啓移災之旨古今遵奉拯護尤多臣叨荷靈休躬逢昭代恩榮隆異名分超逾拊巳循懷每切器盈之戒誓心勠力常思福過之虞今則大運猶住戌郷小運仍當亥位今年之内併值天羅竊慮舉念屬心率成舋咎積生徃世宿有愆瑕雖切秉修寜無違誤又暗曜行於辰分火星在於身宫況寵極才微功輕位重恐貽災滯深積兢憂是敢故按玄經肅恭丹懇精修醮禮拜奏章文謝過九天祈恩衆聖伏冀眞靈鑒省渥澤滂流詔天境地司勑陽官隂府赦罪尤於旣徃蕩衰沴於將來消宿曜之災解天羅之厄豐延祚禄増益年齡得虔忠孝之誠永賛聖明之化誓勤砥礪上副玄慈不任歸命之至田崇謙盧昭又受六甲籙詞伏以至化將行玄丈肇著五千垂教六甲開圖首於虞舜之朝傳自姬周之代修於内則凝眞反一駕日月而躡煙霄行於外則保國寜民康品彚而豐萬宇爲法之本歴代所尊臣等獲頼玄符況逢皇運眞風廣被妙旨遐宣願遂參修永期遵守允當嘉節虔露明誠伏惟元聖融慈衆眞流鑒成其懇願降以威光使存注感通功行圓就九玄開度積過蠲消福善攸臻壽年増益濟人佐國弘道宣經永揚清靜之風克果希夷之道不任歸命之至謹詞范延煦等受正一籙詞伏以正一南宫紫陽玉殿秘陽華之眞籙緘飛化之靈圖下可以制禦兇妖宣和氣序上可以輯寜區宇朝㑹神仙保國安人古今攸毀五四禀臣獲逢聖日咸沐道風早振氛囂俱棲羽褐願期參受克勵焚修伏惟衆聖弘慈俾諧宗尚衣星履斗契九天飛步之蹤佐世立功成大道化時之効炷香拜手歸命祈眞翹望玄恩不任激切之至謹詞王讜修醮拜章詞伏聞河圖寳典垂醮品以濟人正一明科顯章文而助化俱宣道要廣福生靈臣獲奉玄門叨參秘籙而焚修每闕過咎旋彰主務在公動多悔吝或詳評獄訟賞刑有爽於重輕訓撫師徒沮勸有虧於申令捫心省巳夙夜増憂非伏玄功無門懴謝又五月之末土火將入於身宫以此憂惶志希禳救今則精嚴信幣求乞章文伏惟太上衆尊三天化主垂大慈之澤降罔極之恩命天官吏兵依職祐護賜臣罪瑕除蕩寃債和平九曜廻臨照之災三命息刑衝之厄克獲貞吉常遂亨通誓虔焚炷之誠上答尊靈之祐不任刁子宗勉太尉謁靈池朱眞人洞詞伏聞生成妙道弘大教以度人不宰玄功布慈風而及物随迎靡滯極護無遺由是青簡丹篇繼著登眞之品幽關夜府亦該錬化之仁薪火傳明古今攸普某身逢景運名造眞乗每虔焚祝之心潜希道力冀啓延洪之福上答君恩期靈常勵於丹襟屬念早參於玄籙翹勤徒切景仰何階伏惟仙君道逸𡨋鴻壽逾遼鶴指三山而髙舉莫認雲程越累歳而暫歸想悲塵世某慙盧敖之未跡瞻若士之遐蹤瀝懇齋心燃香拜手佇廻眞鑒俯沃玄波俾於修學之中少達希微之趣推誠律已永酬君父之慈見素全眞願奉神仙之躅不任大傅相公修黑符醮詞伏聞至道垂科正一啓醮祈之品河圖著訓太玄開懴謝之門蓋所以拯護人倫恢弘法力恩庥廣被今古攸宗臣運偶昌期叨膺重寄雖竭誠而報國未効㳙埃懼福過以災随因罹疾疹今則黒符飛化五入中宫本禄納音爲災尤重是敢𡨋心玄極稽首清壇恭備香燈虔申醮祝伏惟玄元降鑒五帝宣慈勑九宫貴神命三官曹屬解消厄運和釋𡨚仇蕩滌罪瑕増延禄筭使百關調豫久疾痊平誓傾忠孝之心冀啓聖明之澤永遵妙道仰副玄慈不任洋州令公宗䕫宅陳國夫人某氏拜章設九曜詞伏聞天地萬靈隂陽庶品資元和而覆育禀道氣以生成三命五行是定吉凶之數南宫北府爰司罪福之文善惡無遺錙銖不爽況復三元遷易九曜𨇠移示謫逄祥影隨響答得不兢懷悚惕祗敬眞靈某氏以土火二星行於午地旣當命位仍在身宫小運丑中況爲六害大運戌上又值墓郷大運則午命稍衰小運則王禄初薄以兹憂懼恐履災期是敢精勵丹誠歸依玄象遵拜章之典式稽首三天備祈醮之物儀馳心九曜伏惟至眞憫祐衆聖垂恩赦徃歳之罪瑕解積生之𡨚債消平災厄拯度凶衰延益壽年増加禄祚克蒙覆護常賜安貞永奉靈眞誓勤修敬不任歸命虔祈之至洋州令公宗䕫生曰南斗醮詞伏聞列曜凝光麗天垂象南昌上府生籙是司致福流祥潜資邦國河圖秘戒式明瞻敬之文正一靈科亦備存修之旨敢披玄訓虔罄素誠臣夙荷洪休躬逢景運便蕃寵澤踐歴恩榮無濟時匡國之功叨相印兵符之重循懷震惕難酬造化之私誓志恪恭冀答君親之德但勤砥礪敢怠初終是以輙就生辰精修醮禮仰丹臺而稽首望玄極而𡨋心靈炷騰煙期逹九清之上良宵効懇願通六聖之前賜臣災滯蠲消𡨚仇和釋増加祚禄延益年齡赦巳徃之過尤介將來之禎福元玄昇度舉族康寜誓嚴尊奉之誠永副眞靈之祐不任歸命虔祈之至青城山文人殿功曅安土地醮詞伏聞混元旣判融結分形惟彼岷山廣吞西徼壓二江而作鎮冠五嶽以居尊窟宅神仙含藏洞府層峯疊巘捧日月於雲間積翠堆嵐隔塵埃於人世闢天國而眞靈雜集廓成都而芝术駢羅是曰福庭統兹形勝希夷眞君道成上古名重髙眞軒帝南廵賞展師資之禮明皇西幸仍加崇飾之功敞豐祠於炎漢之年旌懿號於中和之日每彰休應丕祐寰區頃者躬拂煙蘿仰瞻羽衞睟容在目寤寐寜忘近以闕闥層楹風凋雨漬歳華暗貿頽朽可虞爰命慧進大師行眞度木鳩工成兹大壯飛甍耀景碧霤排空四垣之圖像如新重檻之階陛不攺爰復正寢永播玄休俾天地山川神明職秩常加禎貺大庇烝黎鷙暴不侵沴瘥無作稼穡蕃稔風雨以時旻穹觀壁合殊連夷夏覩文修武偃邊烽靜息妖孽殱平車書佇混於萬方正朔期同於九有生靈蒙福宗社永昌式勤蘋藻之儀常奉馨香之薦遣廣成先生杜光庭虔修大醮昭謝眞靈遐望雲軒仰希玄鑒謹詞宣再徃青城安復眞靈醮詞蓋聞天設神墟地開仙府眞靈是宅幽顯攸尊握羣嶽之紀綱司萬方之休否雲峯霞觀歴代所崇垂貺庇人古今受賜頃者以遠披蘿薜躬造軒庭仰堂宇之威容覩四垣之儀衞光靈如在翹屬常深遂命圖繪神姿鋪舒内殿朝燃玉穗夕備銀釭禱祈蓋切於生民注念非關於秘祝欽惟不昧必鑒斯誠今則山觀之中巳加興葺鼎新殿宇别命焚修旣無葷雜之虞益有清嚴之致是用特申醮禮精具告陳謁請眞靈復還仙觀霓幢鶴轡優游松月之郷蕙郁蘭芬瀟灑虚無之路永安眞域丕祐邦家自兹寰海之民常徯厖洪之福不任祝望之至謹詞廣成集卷之十七
