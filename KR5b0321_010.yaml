  text: 廣成集卷之十敢十
  hash: sha256:d2d913b48b09f587d7bba19974bbd355096e58b80f92aeb804c582f65d49f092
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0321_HFL_010-001a, image: hfl/0338/0338-086.png}
body:
  text: 上都太清宫內供奉應制文章大德賜紫杜光庭撰李仇中丞本命醮詞伏以二象陶融三元生化裁成品物亭育群方受命稟形上繫天府至於壽算遐促祿祚短長立身有罪福之因行運有吉凶之數天司地簡主宰無私臣伏恐三命五行或逢災咎九星七曜或值照臨隂陽有刑剋之期祿算有凶衰之會又恐積生所犯𡨚債未除積世所行過尤旋結常情罔測神道難知非託醮祈無由解謝輒因本命之日虔備香燈仰玄象以披心對星壇而瀝懇敢希至聖俯鑒丹誠三官落罪簡之文五帝削災妨之籍臣宿瑕蕩滌積釁銷平輟死北宫上生南極天曹增祿司命延年眷屬和寧公私清泰即荷衆聖之恩不任張道衡常侍還願醮詞伏聞垂象九天流光萬有帝車周運聖力遐通裁四海以無私福群生而不宰惟祈必應有願克從臣頃以大順二年遭逢危厄憂逾蹈火危甚履冰既難保於朝昏敢望全於形命元元丹懇啓訴無門惟注念蒼穹冥祈玄斗潛興大願冀贖深災果蒙大道鑒臨至真通感垂好生之澤開罔極之恩獲洗罪尤盡消𡨚戾仰天慈而積感報玄造以無階旋屬公役所拘道途無暇嵗華纍攺誠願未申況復水陸經過江山往復幾逢俶擾頻值艱危幸脫鋒鉦免罹凶橫皆承廕護倍切兢榮今以本命之辰於玉局靈化諸北斗七元之殿當玄卿大帝之前虔備醮壇恭酬往願昔所許奏錢若干貫請至今年八月五度奏納取畢伏惟斗中衆聖玄府上司鑒領丹誠曲回鴻造使宿願周備賜靈澤遐霑赦過除災延祥介福年祿增益危厄銷平眷屬乂安公私貞吉即永荷斗極衆尊覆祐之恩不任周庠貟外郎為毋轉經設醮詞伏聞三洞寶經九天真訣虛無凝氣混合成文龍篆鳳章發迹杳冥之始瓊編玉檢敷宣天地之先大則制御乾坤保鎮劫運安寧祚曆昭祐帝王次則和揖五行調平六氣蠲邪度厄濟物利人遵修則災咎可銷諷誦則禎祥可降臣等以毋行年衰厄疾苦所嬰憂懼但深告祈無所敢憑玄聖披瀝丹心伏願勑三寶威神命侍經寮屬解五行刑剋却三命凶衰增祿南天延生司契六府詞理百疾痊平永垂覆祐之恩克享遐長之福謹於玉局化轉經設醮冥扣至真不任莫庭又為張副使本命甲子醮詞臣聞天道無親輔兹有德功或及物福必無涯當川安撫副使張琳奉主無私酬知盡節初終一致雖風雨而不渝籌畫萬端越嵗寒而彌徑頃以四郊多壘兩鎮稱兵物力將虛經費逾廣厚斂則生靈必困薄賦則供億不充出自良謀豐其軍食糗糧山積戈甲雲屯人不告勞物無失所益振貔貅之勢佇成弔伐之功但以張某三命之中猶逢災厄二運之內甲祿氣微天符臨受命之宫土星逆愁煩之位慮為災咎輒罄誠祈爰託皇壇旁希玄祐伏願十華降福三聖回光錫善貺於諸天災殃自息蕩過尤於九府祿算增延永俾安寧共康藩屏臣情誠迫切冒瀆髙明不任駱將軍醮詞伏以二氣清凝表天地亨貞之道五材倚伏荷乾坤成育之恩至於命籍短長祿祚豐薄立身罪福行運吉凶莫不上自天司旁資元命主張考校巨細無遺臣竊慮列宿五行𨇠次有照臨之咎九宫三命隂陽有厄會之期以此憂兢恐成災厄今以立冬今節祈福良辰虔罄丹誠精陳醮禮仰天闕而瀝懇瞻地府以冥心佇降恩慈曲流洪福使災凶殄息過咎蠲銷錫以嘉祥增其壽祿落罪書於北府紀生籍於南昌眷屬安寧幽明康乂徊翔天路長親日月之光棲息人寰永沐真靈之祐不任馬尚書醮詞伏聞曆象推移運三元而成嵗隂陽變化資天道以宣功澤霈幽明事均今古其有弘仁秉義體順和光則天錫禎符神彰吉貺或動乖守慎志協回邪乃蹈彼難虞兆兹否塞影響之報理實昭然臣逈以庸虛早塵職祿雖肅恭自立畏愼推誠常懷聚鷸之譏每懼維鵜之誚況復訓齊戎伍祗奉藩垣鋒鏑猶施鉦鞞未息摧堅挫鋭徒申擒討之謀故殺誤傷慮構幽𡨚之咎以兹屬念深用置懷今則秋帝考功地官校籍罪福咸舉毫末無遺或臣有塵忝之非有殺傷之過有六情之罪有三業之辜有注訟未除有𡨚仇未釋事題黑簿名挂隂曹乞垂悔謝之緣並降蠲消之澤俾其克勵得以自新至於宿矅垂災行年值厄亦希超度獲保乂安上祈九祖生天三塗離苦飛沈遂性生植無傷四方之戈甲早寧萬戶之農蠶畢就俗聞謡詠野息氛埃咸歸清淨之風大洽希夷之道虔修醮酌懇薦章詞遙祝仙壇仰望真祐不任馬尚書本命醮詞臣以庸微叻承宿運謬參職秩繼忝官榮統御戎車𥫄行條令或剋收境邑除蕩姦凶外禦寇仇內綏疲瘵而宴賔犒士須有宰傷去弊誅邪必資刑律誠非徇巳務切安人竊慮斬決之間重輕有失傷殺之際故誤難明以此憂惶恐貽譴責又慮臣行年三命或值凶衰宿曜五星或逢臨照因其厄會遂履凶危又恐九祖幽儀未蒙遷拔六親滯識猶有拘留緬長夜以魂驚念隂關而心懼思罄歸依之懇仰申薦奉之誠輒憑本命之辰式備資薰之力冥心靈化遐想寶壇陳醮禮以肅恭貢章詞而精禱伏冀玄元錫祐大道流慈光開泉曲之庭詔下鄷都之府使九玄超度衆苦蠲銷生神碧落之天蛻影朱陵之洞福延後嗣惠被宗親其有往世愆瑕無窮𡨚對咸承懴滌並使和平乞臣罪簡落書生宫注籍災凶弭息祿算遐長兼祈福介川源澤覃逺近戈鋋早戢疵癘不生野復耕桑人歸富壽洎乎沈潛異質溟漠殊庭同沐玄風咸升道域誓虔丹懇永奉鴻慈不任司徒青城山醮詞伏以灝氣漸凝羣山挺秀髙扶宸極厚鎮坤輿惟彼西南上通參井結靈積瑞含藏日月之華疊翠堆嵐包括神仙之宅位崇衆嶽祑亞三山為天下之福庭冠域中之勝概崇臺比立黃軒之祕迹猶存巨浸旁分大禹之神功可覩每彰符應以祐生靈頃屬雨澤踰旬泉源坌涌丹崖翠巘雖傳隕圯之聲紺殿彤軒靡有震驚之變緬兹羣異益驗光靈臣叨荷殊恩膺兹重寄綏撫之能未著兢憂之懇常深恐臣過咎所招仙嶽降異常之兆災蒙所𥫄神峯垂警告之祥夙夜省循若據冰炭莫展披陳之路惟虔禱謝之誠輒按明科恭申大醮庶蒙鑒祐以贖愆違不任馬尚書本命醮詞伏聞元化運行三才資始體乾坤而成象感陶煦以凝神由是懸命籍於天關繫生死於斗極其有行藏巨細舉措纎微八靈伺察以無遺十直考讎而畢至善功潛著則名列仙曹過目所彰則書編鬼録用兹懲勸以導于人其惟本命尊神主張校録緬思玄旨實切稟修臣猥以凡微曾無機略唯奉公克巳效命為時未展勞能纍驚塵忝揣循增懼委任益深況封畿戈甲之餘壠畝榛蕪之後疲羸未復瘡痏未平撫之則濡沫𦆵通撓之則溝湟甫及而驟司六邑務彼三農暑耨寒耕雖勤劬於人力有秋望嵗殊即俟於天時但罄丹心顒祈玄祐敢因本命之日虔申醮謝之儀所期真聖鑒臨福祥臻萃赦臣叨據之過奬臣肅奉之誠使鋒鏑早寧京坻有積人無疵癘之苦年祛水旱之虞俾臣九祖超升三塗清晏其或宿曜運行之厄嵗年刑剋之災淫刑濫賞之非故誤殺傷之咎並希昭祐普錫蠲消永誓歸依以酬真貺不任莫庭乂青城本命醮詞伏以稟氣分形上資玄化主算定祿仰繫真曹臣伏恐履行之間或貽愆咎年運之內或過災凶非仗神功難申懴滌輒千真鑒虔備醮儀頃以此山嶽瀆上司神仙福地洞裏之玉樓金闕塵俗難窺人間之古殿荒臺蹤基易變梁摧螮蝀瓦落鴛鴦若無營葺之興巳雜蒿箂之徑某叨居宰字竊備繕修既俾功庸仍申藻繢圖五嶽九江之像貌河侯溪女之真肅穆冕旒駢羅珠翠如登貝闕似挹驪宫既輝煥於素垣益深嚴於玄德所冀少城天府永賴休禎秋報春祈克承嘉祐敢因元命之日虔修讃祝之筵伏惟應念回軒分靈降澤錫臣以增延祿算助臣以消解災凶兩地之骨肉安寧一境之牛靈蘇泰誓傾丹悃上副鴻慈不任莫庭乂青城甲申夲命周天醮詞伏聞妙本應期元精啓運三光分照萬有陶形圓清方濁之間遞為主寄日域星𨇠之內各備職寮大則司劫曆施張小則察人倫善惡有逾衡鏡無隱鋒毫竊惟九室洞天羣真會府丹崖蕩日翠谷呀雲鸞旗之所往還霓節之所遊集叨膺宰字獲請仙山雖食蘖苦心飲冰潔巳功應無輔過必彰聞況於咫尺之中敢罔真仙之鑒更慮九辰行運三命推移福善不常災凶靡測拳拳素懇若履顚危輒因本命之辰載申祈醮之禮天衢地壤水府星宫咸罄血誠仰祈明祐伏乞解災釋過延貺垂祥壽祿惟增凶危自息已往則九玄開度見存則兩地安寧一境生靈同承福廕兵車休駕封部無虞長欣靜謐之期永荷靈真之澤不任莫庭乂九曜醮詞伏以二象分華三元列曜司悔吝吉凶之契操死生罪福之權主宰無遺幽明咸繫臣自惟凡昧夙奉正真叨荷寵章獲參位祿循涯省分常懼於曠官恤物安人敢忘於勵巳尚慮動違恭慎曰積愆瑕上瀆真靈潛貽厄會又恐五星進退四曜運行或居身命之宫或臨惡弱之位況臣今年天符臨於命卦木星未出身宫第二十宿中蝕神所歷小運行直又值天羅竊憂福過災生命衰祿薄按河圖內品太玄祕文瀝懇貢詞披心備禮仰華蓋儀璘之闕若對九芒瞻星辰日月之宫盡傾丹欵伏冀宸光下燭開昏晦而洗沈冥靈景延暉碎禍車而焚罪網使年齡克保品秩攸升一境之士庶康寧兩地之親緣安泰仙山表貺人無瘥疫之傷靈府垂禎嵗有京坻之望唯虔素悃上答玄功不任川主相公北帝醮詞伏以七政上尊五靈玄老位司北極部制中天至於地分吉凶天文災福五行六氣三命九宫萬彚慘舒咸歸考校臣以兵戈既久殘瘁逾年念彼生靈痛深肌骨敢因醮謁載罄祝祈瀝懇紫微扣心玄象實希憫鑒俯降禎祥消沴氣於郊原退災星於井絡一川康泰萬有昭穌永戢戈矛惟新祿算九天霧卷重披日月之光三蜀煙清再播雲雷之澤即仰荷帝君憫護之恩不任川主相公周天后土諸神醮詞伏以天府名區少城奧壤龍神福地天帝雄藩豈以凡微叨兹臨鎮而謬分朝寄總此封疆十載于兹日深兢懼但以粵初蒞任便屬艱難黃巾犯秦翠輿幸蜀行朝萬衆駐蹕五年力盡扶天誠深報國功宣匡復以及回鑾其間有師立稱兵旰能竊發秀升擁師於下瀨郭琪奮臂於中軍咫尺乘輿震驚輦轂上資睿武旁假神威相繼克平以安大駕感兹靈祐常貯血誠今則時未砥寧人方肆亂帝車順動又幸陳倉中原有焚燎之災六合靡晏寧之所雖誠深憂國志切匡君難申嵇紹之忠山川杳隔空抆袁安之淚扈衛無由緬想神功必垂濟祚爰申醮禮仰冀靈通希回助順之恩共安天步少借害盈之力遠掃凶渠復黃屋於上京延寶圖於萬葉椒漿之奠永答明慈臣不任歷懇披心虔請之至葛仙山化醮詞惟彼仙山鎮兹坤壤八十一洞分日月於地中二十四峯繚煙霞於天際潛司罪福以統生靈臣夙慕玄微早崇清靜躬逢聖日既叨輔贊之榮夢想靈山常貯逍遙之志尚縈多事徒鬱素懷今節及仲秋禮當望秩遐瞻翠巘杳隔紅塵虔備醮壇用申誠祝伏冀虎旗龍斾遠辭八極之宫鶴馭鴻驂𦕅降三仙之駕歆兹薄禮錫以殊休俾稼檣有年凶災不起幽明共福家國咸安比帝祚於崇岡續唐年於劫曆必期修潔以奉靈光不任川主九星醮詞臣聞九元御極綜列宿於紫微七政垂光統衆星於黃道指攝提而臨萬象運招搖而主百靈生死吉凶咸繫司牧臣以受年之時此月火星及暗曜罡星皆臨本命以兹戰悚恐蹈災危敢以丹誠上祈玄祐虔修大醮備瀝微𠂻伏惟九聖延慈乘帝車而降福七真垂貺回杓建以祛災二十八宿行藏皆資祥慶一十二宫分度永息屯蒙誓勤忠赤之心以答靈真之念不任中和周天醮詞臣以庸虛猥當大任極台衡之抶居藩屏之崇雖傾捧日之心莫著匡君之績頃以四郊多壘中國不寧戎馬載馳兵車尚駕或近臣肆逆或遠鎮辜恩𦆵滅梟巢初回鑾輅又聞薄伐再致省巡凡在人臣豈勝憤惋惟炷香冥想望聖祖之貽休拜表祈真待隂兵之助役果見偽王孽相連頸殱夷凶師朱致繼蹤斬馘緬惟幽讃更切明誠近又太一運行巳照蜀分五星移度或在身宫慮薄德所招即凶災荐至常加愓勵罔敢遑寧遂有鄭君雄韓球兩地結連遽興兵甲隔絶恩信凌犯聞防殘掠生靈焚燒郡邑數州塗炭千里傷夷憫此幽𡨚痛深骨髓臣所以上祈至道明禱真靈志先憂國憂人誠匪為家為巳由是上天悔禍大道降靈包藏者尋就誅鋤黨附者皆從剪撲封疆繼靜凋瘵旋穌韓球敗亡君雄梟戮漸通道路將雪𡨚沈尚以芟刈之時殺傷非一仰則好生之旨震悼何安俯嗟遊岱之魂淒涼莫巳是用凝神扣寂拜手歸心陳謝恩謝過之儀瀝祝地祝天之懇庶祈玄聖曲鑒丹誠輝映清壇降流洪澤蠲除愆咎弭息災凶使生者乂寧幽途開泰臣又聞衆星拱極百谷朝宗蠢彼不庭敢違天道更鄰近境綿亘數州山寨相望久為凶逆欲恃其蜂合蟻聚之勢仗鋤耰白挺之徒垂二十年不賔睿化擬因揭瓴之便將申破竹之功為國誅姦與人除害重希神力克震軍聲酆都以三十萬兵常祛沴氣洞泉有二十五將𢡚制妖徒正道殛邪神明助順敢緣斯旨再罄赤心伏惟俯鑒奏陳克回明祐使昌瀘梓遂永無蛇豕之災草木藂林盡化鋒鋋之狀咸知帝力主復王謡然後疇賞龜城拜章鳯闕韜弓解甲歸馬休牛長諧魚水之歡克暢君臣之道明明血懇大道鑒之不任歸命祈恩屏營憤切之至謹詞廣成集卷之十
