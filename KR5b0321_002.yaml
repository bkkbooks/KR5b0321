body:
  text: 上都太清宫內供奉應制文章大德賜紫杜光庭撰詔與黃萬祐相見謝表臣某言伏奉宣旨令臣就內樞密院與弘道大師黃萬祐相見者天慈軫念俯及孱微荷戴難勝兢榮增極臣某中謝伏惟陛下化弘有道理尚至仁憂勞普及於萬方軫念無遺於一物故得眠雲逸士遙馳向闕之心傲世髙人盡識朝天之禮弘道大師夙探至術深隱㠌巖名姓可聞儀形莫覩今者爰隨徵詔直詣闕庭捨草帶荷裳寵紫衣師號事光史筆榮耀道門伏蒙聖慈宣命微臣與之相見獲奉睿明之奬得瞻雲鶴之容步武壼天躋升蓬島祗膺異渥榮耀萬生顧惟鷦鷃之微何報乾坤之德臣某不任敢二一奏於龍興觀醮玉局箚子右臣先蒙今年十月二十二日宣腸舊王局洞門官舍一所并石像老君一座移在當觀其舍今於殿後講堂墓上起立功畢便用安置石像老君焚修供養伏以名山大川二十四化春秋常祀著在舊儀其玉局化所修常醮伏請起天漢元年二月八日委本府縣祗就龍興觀玉局石像老君前修設冀免曠闕以叶敬恭又北邙化在嶲州積年巳來醮祝皆闕泛居率土之內冝申咸秩之丈前件已化今亦欲就龍興觀一處與玉局同用延祝景貺永福聖朝謹舉如前伏聽勑旨皇帝為太子生日設齊表右臣伏奉聖㫖為皇太子生辰宣賜莊宅庫錢陸拾貫文省除於北帝院差選道衆二十一人於七月八日開置黃籙道場七𥁞夜至十五日散齊者伏以紫氣充庭青宫誕睿動歡聲於六合凝喜氣於九重凡在寰區皆䖍祝賀伏惟陛下恩周中外念軫臣寮以皇太子素切修行常思憸約懼無名之破費使衆力之煩勞應諸司欲有齊修並令止約頒賜內庫錢物特開仙觀壇場祈玉京金闕之真廣宸殿離方之福美髙典冊事邁古先臣某獲奉絲綸將申焚祝覩惟新之寵澤垂鴻大之宏規不任抃蹈之至謹録狀陳賀謹奏諸老君殿修黃籙齊表臣某伏奉宣旨於北帝院奉太上老君修黃籙道場三日設齊散壇給內莊宅庫錢陸拾貫文省除差選道衆二十一人行道禮懴須令精潔伏惟陛下功包五帝德懋三皇凝旒敷有道之風端扆暢無為之化宸心密感萬靈響應以潜通睿想遐周四海雲隨而奉聖故得乾坤交泰日月貞華嵗阜年康風恆雨若神戈所指長蛇與封豕皆誅惠渥所覃虐魃與潜螭自屏由是仙山邃洞休瑞繼聞玉印銅符禎祥問出今則拯橫流之難興時雨之師將廓八溟同歸一統而猶翹心玄教讓德皇穹於中元齊潔之期備三境香花之會上答玄元聖力持開黃籙寶堙用臻巨福洪休克固瑶圖睿夀臣獲隆聖奬祗奏德音唯勵精誠以䖍焚祝不任荷載之至宣示解泰邊垂謝恩表臣某伏奉聖旨宣示東北靣軍前所奏得鳯翔出歸官健王彥劉等分析賊中事冝并有謡言泰邊垂曲子待來年者臣某言伏以天道玄微潜司兆聯神功幽晦實主福祥必憑謡詠之言以告休禎之㫖昔吳時青童謡於廣陌尋驗吳亡陳時異烏下於髙臺果彰陳滅五星飛落為虞舜受國之期一馬化龍乃元帝興王之應斯皆發於天意感契人心詳考嘉言尤歸聖德伏惟陛下繼天誕睿應運啓圖徇億兆之樂推撫臨海嶽承昊穹之眷命拯救生靈國寶珍符不求自至夷賝塞賮望日爭來而猶北境負恩孤城背義坐積薪之上即致焚燒巢折葦之端立期虀粉果見明神示䜟里巷傳謡竊聞所告之詞便生剋平之義所言邊垂者乃國家散關之外即是國之時兩之師神道言祥光陳徯后之詠成功克敵翹足可期即當蕩定三秦統臨萬國瑶圖寶曆地久天長臣獲奉天慈躬聆吉語輒陳淺見干凂宸嚴不任之至謝宣賜天鍚觀莊表臣某伏䝉聖慈宣賜漢州通記縣天鍚觀唐則莊一所永充常住者伏惟陛下繼天受命應運垂裳鴻圖豫定於上清寶冊遽呈於厚地鼎新觀宇允答休禎三殿之像貌崇嚴終嵗之香花精潔今則特頒睿澤廣錫莊田輟彼膏腴永為常住皇慈逈降玄教增榮自兹日給齊羞免有旁求之闕晨香暮燭益專焚祝之心祈聖夀之延洪保宏基之隆永臣某叨榮聖奬躬荷殊恩不任之至謝恩令僧行真修丈人觀表臣某伏覩惠進大師僧行真狀奏奉聖旨修青城山丈人真君殿功畢者伏惟陛下恩無萬方仁深二教祗園蓬島咸均崇飾之慈鹿苑鱉宫俱被興修之賜爰於仙宇特命髙僧載申剞劂之功克就莊嚴之勝俄成邃殿永鎮福庭期五山十洞之靈增彌劫齊天之壽臣獲居玄教躬荷皇慈不任之至宣為皇子修生日道場散齊表臣某伏以九天集貺三景凝祥動樞殿以飛光降春宫而誕秀華夷增抃億兆同歡皇帝廣捨緍錢精崇齊福必冀上清照鑒隆萬壽於聖躬至道貽休介千祥於儲后克昌大寶永統九圍臣某等獲勵焚修榮頒襯鍚不任惶懼之至謝允上尊號表臣某伏奉恩制俞允宰臣等所上尊號者丹懇上陳皇明下矚自天有命率土同歡中謝伏惟皇帝陛下玄鳥誕商赤符興漢救焚拯溺神資命世之才日角月玄天啓乘時之瑞懋宏勳而崇睿德功蓋前朝總曆數而廓洪墓祗膺寶運由是三靈攺卜萬國攸歸鄙成湯周武之君陳師用鉞笑創魏開隋之主侮寡淩孤振衣而康濟九圍凝旒而光臨太寶承耀魄中黃之祚執招拒西白之符握金鏡而照寰灜人神交泰撫璿璣而觀海島億兆樂推故得御端門而嘉氣橫軒登圓丘而神兵扈仗謁清廟而玄雲四卷月瑩中宵膺鴻名而白氣輕飛煙籠廣砌麟呈沼沚龍躍江湍草樹舍文雲霞絢綵金符踴篆玉璽流光雖讓德於上玄己盈編於太史又若天涯地表右塞南荒列竒貨於明庭貢神駒於天厩寶香來於絶域美玉薦於殊封漢孝武之四隅請頒正朔唐髙宗之諸國願混車書將復禹封更開堯土百揆時叙六樂克和信及豚魚恩加動植矜逋巳責恤獄省刑天無入牢之星地絶成牛之氣俘囚繫頸咸蠲鈇鉞之威孽黨臨誅特有緍錢之錫牲牷肥腯粢盛潔豐敢昭事於神明致仁賢乎紱冕逹誠心於天地罄恭恪於郊禋感無不通動叶喜應不樹奢靡不御纎華無沉湎之遊無𢜃懘之惑不尚馳騁靡徇畋漁靜必肅嚴舉惟典禮豐財和衆禁暴安人大閲以正武威大搜以示軍實貔貅百萬皆蒙輪拔拒之豪騋牝千群盡驥子龍孫之駿延奬忠孝博採器能片善無遺微功必録專經雉子激之以髙科靖節幽人縻之以好爵賞勤敦本務穡勸農嵗多栖畝之糧時豐廪寶野有如雲之稼國富家肥四隅無𤇺燧之勞百里有歌謡之樂星芒武將功髙而武列洸洸嶽秀儒臣業贍而儒風穆穆雖仲謀之興江表玄德之有坤維較美籌功曾何倣佛今則關河克靜䩵柝無喧鄰封之王帛交馳近境之干戈載戢人歡富壽政洽雍熙文武誠臣願增徽懿中外瀝懇華裔同辭果回日月之光俯降允俞之詔戴圓履矩率土普天觀盛禮而有期仰髙穹而增抃臣與道衆等不任踊躍歡呼激切之至代人請歸姓表臣聞磐石之宗義非他族維城之重實自本枝將垂久大之規合定親踈之分臣自乘文律識昧武經獲履戎行早塵天渥提戈擊劒惟傾報主之心北伐南征每誓勤王之節伏自皇帝陛下駕驅豪傑掃蕩寰瀛念其纎芥之勞假以殊常之澤賜為骨肉列在宗枋但勵捐軀冀酬睿造今屬以乾坤改卜天地降休土德潜移金行啓運徇華夷之推戴副億兆之歸依端居而神器自來遙同舜禪恭巳而龍圖肇創不假周征緱山之寶祚天長淮水之瑶源地久巍峩帝緒須承綿瓞之宗浩蕩皇基難雜蓬門之子循襟省巳榮極增憂輒披昧死之誠甘置逆鱗之罪期分貴賤永叙仙凡伏乞聖慈許臣却還本姓干冒宸嚴無任待罪望恩涕泗隕越之至賀太陽合虧不虧表臣某伏覩司天奏今月一日丁未巳時四刻太陽合虧於軫宿十一度至未時四刻復圓今測驗不虧者日華騰景君德齊尊超術曆而不虧彰睿明之通感中謝伏惟皇帝陛下元陽誕聖二曜均明升若木於震宫曜貞輝於乾道體冬㬢而流愛九有咸恩比春煦以廷慈二無並照故得大明增彩推策難窺契覆載之殊休越隂陽之常度祥光彌盛玄德動天逾漢日之再中邁堯輝之合璧書之青史實冠瑶圖臣獲奉昌期叨觀嘉貺退顧桑榆之景倍傾葵藿之心不任歡躍之至謝恩宣示修丈人觀殿功畢表臣某言伏覩長平山惠進禪師行真奏伏惟宣旨重起立丈人觀真君大殿功畢者聖造旁敷仙祠重創巨功克懋靈跡增榮伏惟陛下德洽萬方惠分二教文風遐布殊庭效柔服之誠武烈光宣異俗禀雪霜之令蓬宫奈苑咸遂興修寰區瞻禮樂之容夷夏識玄緇之訓功侔太古美冠前王去冬以丈人觀置立年深堂廡凋壞命髙僧而制度賜物力以興隆於是運石他山伐材幽谷楩柟入用剞劂程能俄成大壯之功克致齊天之固虛簷瞰日廣砌橫空雲拂危梁風生踈牖垣墉不攺圖晝如新截岡阜而豁庭除闢溝源而護階磴衝流莫及迸石難侵遙符睿聖之慈顯此殊常之績集竒功於不朽增聖夀以無疆臣叨列玄關夙深皇澤唯䖍焚炷上答休明不任宣醮丈人觀新殿安土地回龍恩表臣某伏奉宣旨以青城山丈人觀新殿功畢修醮安謝者伏以陛下仁周海嶽澤溥儒玄翹屬靈山垂恩仙觀殿宇之凋摧既久教門之興葺無由詔命真僧頒宣國力宏麗有疑於化出巍峩遽比於神功鎮彼福承與天齊永臣獲承睿漿䖍啓醮壇嚴香燭以焚修遍真靈而告謝霞峯雲壑如聆萬嵗之音玉曆金符更廣千椿之夀以今月二十三日設醮訖却回謹詣閣門奉表起居以聞賀獲神劒進詩表臣某言伏覩今日趙匡業所進合州江上得神劒一口宣示中外者伏以將啓升平祥符必降欲清凶孽神劒斯呈助聖明斬斷之功表天地匡扶之力伏惟陛下功超三五威肅寰瀛仁格幽明道均天地故得山川林谷吐金熖於層崖風兩雷霆見霜鋒於萬里一條秋水初觀出地之姿數尺練光宛耀倚天之勢仍彰變化顯著神竒昔嬴帝得之於水心果吞六合今陛下獲之於江上即統萬方刜鍾切玉者詎可比倫斬馬斷蛇者那堪儔擬臣榮逢昌運獲覩殊祥輒貢詠歌願揚睿感謹課頌聖德七言四韻詩一首陳進干浼宸嚴無任之至賀誅劉知俊表臣某伏覩勑旨劉知俊以凶橫暴常巳誅戮訖者罪惡貫盈人神共憤允符聖斷克正嚴誅臣某誠抃誠快頓首頓首伏惟劉知俊性惟凶狡器本凡庸有貪狼苟且之心無報德懷恩之志傾思危迫歸我大朝顯敷雨露之慈旋受節麾之寄委之非次待以不疑更隆推轂之恩特付專征之任而咆哮自恣殘忍為懷屠害𥠖元罔遵刑憲隳大國撫柔之旨辜聖朝吊伐之仁既負鴻慈難逃顯戮伏惟陛下恩弘天地仁冠堯湯體至道以好生布春和而照物夷蠻戎狄皆知慈育之深日月星辰共鑒包荒之廣而知俊獨違聖造肆用淫刑致遐激之未通阻四方之向化今則雷霆震令斧鉞興誅使普天率土之人荷去惡除凶之德克昌祚曆永福生靈臣某獲覩宸威無任歡躍快抃之至賀鶴鳴化枯樹再生表臣某伏覩卭州團練使張敬周奏大邑縣鶴嗚化玄一大師郭昭美申當化有古柏樹內有七株枯多年今再生枝葉鬱茂異常州司差人覆驗有實者仙山表貺嘉樹呈祥符睿德之感通彰神功之茂育臣某誠歡誠抃頓首頓首臣按瑞圖云帝王德及草木政致升平則松柏常生木有楨異伏惟陛下圖啓運握紀承天修文化而服遐荒武威而平九有恩周草木惠及蚳蝝窮蕃解辮以歸仁獷俗梯山而納賮由是涵濡異類感動殊倫雪兔霜禽栖翔接影應龍神蔡表見為常今者玉洞雲峯靈墟古化當炎漢理平之際乃天師修道之鄉林麓森踈煙霞熻赩蒼崖蘚織淩空之轍跡猶存翠墠莎封化鶴之壇基尚在而巖前古柏枯朽多年霑雨露以重榮吐黃芽而再茂喬柯裊翠密葉凝隂彼王廙之豫章難偕繁盛雖瀨鄉之仙檜莫繼禎祥惟七柏之興榮契卜年之遐永祥編瑞諜古昔無倫臣獲奉昌期頻聆嘉瑞敢陳謡詠願播寰瀛謹課頌聖德七言四韻詩一首陳進稱賀以聞賀西域胡僧朝見表臣某伏以西域天竺僧到闕朝覲者天慈遐被異域懷歸致萬里之蕃僧朝千年之聖主華夷率化億兆同歡臣中賀伏惟陛下繼聖統天體元立極惠周覆載仁匝寰區戎蠻夷狄之鄉皆遵聲教舜禹商周之德莫繼欽明由是賝寶川馳梯航霧集貢無虛月史不絶書今者天笠逺戎葱山敻俗在積雪流沙之外比峯岑鹿島之間遙望干霄之雲遂起朝天之意言須重譯路想經年﨑嶇不憚於窮荒匍匐願瞻於聖日雖圖澄入夏秪辭于闐之東羅什依秦亦自龜兹之北校其迢遞亦驗專勤緬惟臣子之心允自聖明之感永編國史克廣聖功臣獲奉天光不任壽春節進元始天尊幀并功德疏表臣某伏以九曲澄瀾二儀交泰星渚表流虹之應斗樞開飛電之祥瑞叶千年歡周萬國伏惟陛下握符受命端扆承天弘至道而繼三皇敷上德而超五帝化覃海嶽恩普華夷辦髮氊裘常修職貢四荒八極畢贄琛珍平六府而天降殊祥洞三泉而地呈嘉貺莫不書彼玉篆波躍金鱗獸顯霜姿禽飄雪翅芝英菌蠢膏露葳蕤靈仙時見於煙巖貞檜重榮於雲谷瓊儲歲稔寶貨川臻無向隅不獲之夫有比屋可封之俗故得遐方慕聖異域歸庭鼓舞翹誠歡呼率化桑乾瀚海僧法靜則稽首朝天身毒罽賔三滿多則傾心入貢皆贍北極共祝南山今屬日麗九芒風和八景壽春大節誕聖昌辰輒繪真容願崇睿福臣某與當院道衆起今月一日開置靈寶延壽道場七晝夜香燈蠲潔焚誦精䖍冀憑妙道之功永祝無疆之壽前件畫像及功德疏一通謹輒陳進干冒宸聰無任謝恩賜陽平山吕延昌紫衣表臣某伏奉勑恩賜陽平山主吕延昌紫衣仍𥙷充內殿焚修大德者恩垂霄漢榮及巖林草木增輝煙霞動彩凡栖簮褐共感休明臣某中謝伏惟皇帝陛下惟睿開圖握符御宇仁覃九土咸臻禎昱之私政布八荒巳洽雍熙之化由是群方述職重譯賔庭屬祝聖之昌辰標壽春之大節布鴻私於二教灑皇澤於萬區吕延昌久處煙蘿深精藥餌方專心於葺理敢企望於寵榮豈謂陛下念切勳臣奬深術學以吕延昌醫方著效致彥諲危疾蠲除逈降隆恩顯頒命服霓裳象簡難勝天地之私暮燭朝香誓答聖明之照臣某與道衆等不任廣成集卷之二
