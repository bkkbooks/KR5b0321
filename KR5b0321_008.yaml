front:
  text: 廣成集卷之八敢八
  hash: sha256:8b58f26c2803a0a81c2a8ef45c41490a547722d94810bc7125db517520846507
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0321_HFL_008-001a, image: hfl/0338/0338-028.png}
body:
  text: 上都大清宫內供奉應制文章大德賜紫杜光庭撰川主令公南斗醮詞伏聞天覆地載資大道以生成禀質孕靈由至真而潜運用能彌綸不極生化無窮真宰主張玄功統御雖太虛遼邈劫曆遐長庶品喧闐九闈曠蕩刑政繁雜分野幽深災福攸司安危是繫臣遭逢聖運塵忝恩榮授以節旄委之輔相地雄巴蜀境控羌蠻慙無綏撫之能常切兢憂之懇況舉善疸惡須用賞刑伐叛誅凶仍施斧檟戎祀有往牷之具賦輿有徴督之勞有土有之蓋不得己實恐詮材不當委任失宜因起怨咨遂成災沴今又土星行度對照此方地一移宮將離益部五鬼臨於坤位火曜𨇠於升宫又臣大運在衝破之鄉小運當命墓之歲木既薄弱火亦衰微天符臨於行年遊行逢於絶命土方對照又在妻宮金火伏行亦居滯位木星處愁煩之宿暗曜出乖背之方垂象至明隂陽有數得無警懼以自勵修尚恐過咎易深尤違旋積因其愆失災及生靈省已拊心不遑寧息竊聞正陽之月丙午之辰是六星降鑒之期南斗定生之㑹滌瑕介福宥罪覃恩輒按明科願申昭謝詣玄元真府玉局靈壇精備信儀肅䖍香火普日月星辰之界遍山川海嶽之司咸罄丹心恭修大醮伏冀回無私之鑒垂不測之神降彼南宮盻兹下土共流真貺俯察微誠解地分之災𨇠銷天文之謫見息三命五行之厄除九宫八卦之凶靜土星所照之方克承嘉祐禳地一將移之數允錫休禎𥠖元咸保於乂康榖稼必期於豐衍連營有泰四境無虞疫毒不侵戈鋒弭戢上願三光表瑞循黃道而福帝躬五緯順常扶紫微而拱玄極龍圖永固鳯曆攸昌其有境土龍神山川祠廟共延祥祉用拯幽明至於地府隂關遊魂苦爽蛸翹飛走水陸沉潜仰承濟護之恩永享安寧之祐不任川主周天南斗醮詞伏以蜀之星躔上當鶉首蜀之分野下接坤維當申未之方在參井之度今以土星對照金火正臨五鬼方寄於二宮地一將移於益部恐政乖慈育法爽哀矜野有怨嗟人罹災眚又行年之內本命之中刑剋衰微慮成災厄敢以正陽令月丙午良辰䖍備醮祈以申懴滌伏冀大開恩宥俯念精修解天文地分之凶去三命五行之咎曲回禎貺永錫乂安誓傾求理之心以答好生之澤不任川主周天地一醮詞伏以天皇大帝司察萬方太一十神巡遊八極垂災降福巨細無遺凡在君臣敢忘炯誡今以地一行位將出蜀鄉深虞刑政之間必有愆違之失唯增震惕輒備懴祈䖍修香火之儀用表依歸之懇伏願鑒其䖍切錫以禎祥俾宇安寧生靈蘇泰時和歲稔偃革韜弓克新憫祐之恩敢負照臨之賜周常侍序周天醮詞伏以道氣運行元和亭育分萬靈而布化垂列宿以麗天凡曰含靈咸歸禀受仍俾主宰以定吉凶臣猥以庸虛叨承渥澤運壽藩閫慙無制勝之謀剖竹方州實寡綏懷之績況地連夷落境控巴賨短才常慮於闕遺雜俗尤難於撫諭惟精兢愼獲保初終既卷隼旗復依戎幕顧恩榮而益厚在循省以何安憂畏所深疾恙因作每慮積生之始以洎此身三業構非六情結釁前𡨚未弭往債所纒或理務之間賞刑不當烹殺之際故誤難明或天文宿度之中有逢臨照或三命五行之內有值刑衝又今年五鬼在於妻宮天符入於財位小運則丙祿值墓大運則子水向衰金火行於身宮綱星加於驛馬皆為厄㑹倍切危疑所以疾苦之時𡨋心禱祝佇其銷解用辰效酬今則萬聖垂慈衆真憫祐拯其疾厄賜以痊平仰玄造以知歸感鴻恩而上答披河圖真格詣玉局靈壇備蠲潔之儀設周天大醮星辰日月畢罄誠祈地府天關遍申昭謝伏願鑒臨丹懇采納素誠永錫吉祥克加濟護使罪尤除蕩算紀遐長𡨚債和平災凶超度誓勤修奉以副玄慈不任王宗瑑六甲醮詞伏以大道凝華元尊布化肇分一氣品列五材終始循環生成萬有上惟劫曆資運數以推移下統人倫配吉凶而陶鑄禀形育質咸賴玄功臣早慕清虛志親沖漠獲參祕籙常冀遵修昨以奉使京華經途險逺每虞曠闕冥有祝祈果蒙道力潜扶殊休密衛逹秦甸有安貞之吉回蜀城無敗纍之愛仰感靈恩實思昭報今屬重陽懿節甲子佳辰䖍備菲誠恭申醮禮伏冀神威俯鑒微願克酬採納丹襟頒宣洪澤使罪尤蠲蕩𡨚債和平災咎清消福祥臻㑹事親奉國常蒙憫護之恩守職進身永荷真靈之貺不任孟彥暉西亭子南北斗醮詞伏聞大道孕靈天尊演化乘機誕瑞命世降賢所以匡國濟時宣功利物禀星辰之正氣總嶽瀆之英華莫不受命上天凝神中土恢弘器業極祐生靈臣以節度使琅瑘郡王生屬休期纍承聖澤以武威扶持唐祚以忠節翼贊睿圖光啓中興克安天步貢賦常盈於內府明誠首冠於藩維推此勳傭宜承禎祐今以誕生令序禱福佳辰輒備信儀䖍修醮禮依太一祈真之品詣真人朝斗之壇香散虛庭燈繁靜夜傾心上奏冀獲感通普垂象以冥思遍真靈而醮祝伏願星𨇠日域地局天司衆聖回光萬神昭鑒錫祥符而延巨貺開壽域而懋鴻勳永佐聖朝長扶帝座然願龍神叶贊川境安寧百穀滋豐五兵韜戢俗洽和平之美年無災沴之虞動植幽明同臻道化不任勇勝司空宗恪九曜醮詞伏以大道垂慈萬靈分職隂陽布化星象垂文照燭幽明裁成品彚主張有度罪福無差臣獲以塵微仰蒙覆燾謬叨寵祿早忝恩榮久統師徒仍分符竹實慮才輕任重福過災生夙夜兢憂不敢寧處又以今年行運天符入於中宫寄王之方復臨大運況驛馬為五鬼所對小運與大運相衝生月及本命之辰皆遇土星所歷遂成災疾未獲痊平省巳循懷伏增憂懼竊聞天曹上聖主録死生北斗南宫司明罪福是敢披心瀝懇拜醮希恩䖍詣靈壇精修奏薦雖物儀單菲而誠願拳勤伏惟萬聖衆尊開恩鑒祐赦臣積生罪咎解臣三命災凶落北斗之死名上南宮之生録銷平厄㑹和釋𡨚讎疾苦蠲除祿算延益誓勤修勵以答玄恩不任衙內宗䕫本命醮詞伏以大道生成隂陽亭育主張有度罪福無遺臣叨荷恩榮常增戒懼雖側身思過省巳捫心每虞操履之間難免纎微之失今年三命之內土木氣微行運之中命祿皆薄天符臨官祿之位遊年當絶命之方大運則土曜所加小運乃元辰所主計都居鈍滯之宿金星入乖背之鄉旦夕憂兢恐為災厄是敢按遵科典精潔醮祈望靈化以馳神仰玄穹而勵懇伏願天司地府九曜南宮克鑒丹誠俯垂玄祐賜臣自新之澤赦臣既往之非解五行三命之災銷列宿暗虛之厄罪瑕清滌𡨚債和平遂推公去巳之心傾奉主事親之懇公私昭暢家眷康宜普及存亡咸希福利不任徐耕司空九曜醮詞伏聞天府地司主張命籍南宫北斗統録死生三官持考校之文五帝領裁成之籍顧惟下土實繫上玄況乎處世立身善功難著秉非蹈過罪目易盈早忝殊榮靡申續效或理務有刑章之失或專城有賞罰之差積尤違於地府天曹結罪咎於星𨇠日域曽無悔謝莫遂蠲除又自行運之中方當厄㑹火星飛於小運天符入於中宫水曜伏刑厄之鄉土星退愁煩之宿祿火雖王辰土尚衰數年以來疾苦未減元元之懇實切憂惶竊惟上聖至真垂慈育物𡨋心注念有感必通輒憑香火之緣精展醮祈之禮䖍誠悔過稽首希恩伏惟愍鑒庸微俯弘慈祐解巳成之災厄赦既往之罪尤南斗延生北宫落死潜增年算克賜乂安疾瘵痊平眷屬康恭即永荷衆聖再生罔極之恩不任川主太師南斗大醮詞伏聞大化權與元精剖判生成天地陶鑄隂陽正三統以疏基役四時而成嵗由是萬靈受職五氣分鏕天府地司領生校籍罪福以之銓叙報應以之㢮張毫末無遺古今不紊況復上標𨇠次下制山河隨運曆而𢡖舒因恭惕而昭戒仰窺玄訓得不禀修臣夙荷天慈克符睿奬峻台衡之位提斧鉞之權玉律金科慮爽重輕之信五申三令慙乖訓撫之宜雖盡力匡君傾心許國剪長蛇而復宫闕清巨祲而息戈矛再拔城池頻摧寨壘變蟻結蜂攢之俗穆為賔向化之人三蜀乂寧四民和穆實乃上資聖力明禀靈恩猶恐政理或虧罪瑕難逭審巳或違於道德遊心未契於神明或分野災期或行年厄㑹臣今年小運逢於劫𢼢大運遇於天符土曜對於身宮行年衝於命位每懷憂戒思展懴祈竊以丙午良辰是南斗降真之日六宫衆聖主籍是司輒申醮酌之儀願逹依歸之懇伏冀天關流貺斗極延慈赦既往之尤違錫將來之休祐災凶弭息境寓安寧逺近昭蘇龍神輯睦風雨均暢疾癘清銷以俗泰為嘉祥以年豐為上瑞忠以扶於社稷靜以答於神祇䖍肅丹誠上副玄澤不任賈璋醮青城丈人真君詞伏以岷蜀雄都西南巨鎮下蟠萬壑上拱九清為造化之殊庭乃神仙之奧府瑶宫璿闕深祕於洞臺翠壁丹崖仰呀於雲霧髙真之所棲息上聖之所宴遊實掌休祥以福寰海臣獲逢道化夙荷玄慈慙無塵芥之功難報乾坤之德而立身處俗易結罪尤往世此生寧無過咎五行三命恐值災衰𨇠次星文慮為臨照或𡨚讎所滯或債訟未明有一於兹是用憂懼輒敢披心靈嶠稽首仙都輒備信儀遙申禱祝伏願鑒其丹懇錫以玄恩使景福潜資壽涯延並災凶銷蕩罪咎蠲除𡨚債和寧祿祚繁永兼乞子孫嗣續宗緒昌隆誓傾䖍奉之心以答仙靈之祐不任蜀州宗夔為太師於丈人山生日醮詞伏聞道化裁成天元立極申命真宰主張衆靈於是乎賦命禀神流形挺質咸資籙籍以繫上玄臣荷大道生成感睿明倚注地分岷楚任極鈞衡功業所彰未禪於造化恩榮所錫巳冠於古今況屬天步艱難星輿省狩恨不得手扶宸極身衛帝車克定乾坤重清日月永安大寶以致中興唯叩真靈冀扶忠節仰惟青城巨鎮天國仙都群聖依棲列真統制必能振揚神力驅役隂兵蕩災運而靜中原拯橫流而匡大業爰遵祕格䖍啓醮壇願回不測之威以介無疆之福使妖氛寧息帝祚隆昌鳯曆龍圗天長地久臣積生咎釁未兆災蒙因此懴祈咸希消解臣今年大小二運俱在酉鄉與命辰對衝又火星所照既臨分野仍在身宫土𨇠厄㑹之方金伏乖背之宿年臨三殺之位仍當六害之門恐災咎所加伏深憂惕惟憑醮酌以達精䖍所祈災數剋平忠誠大展盡報主酬君之節成摧凶定難之謀光佐聖朝實佇靈祐不任宴設使宗汝九曜醮詞伏以二象炳靈三元運化禀形育質仰資大道之仁賦命受生率荷神明之德臣獲承玄廕叨偶休期纍忝恩榮載塵職祿顧勳勞而未立感寵澤以殊深而愼行謹身敢忘惕勵運心屬念尚慮曠遺況所至重難矜當宰膳宴賔犒士須備烹羞撫衆訓戎時行懲賔實恐刑章之內或爽於重輕庖割之中寧無於故誤因成𡨚債遂積罪瑕或往世此生宿愆未解五行三命厄運未祛今年則暗曜土星在身宫之上天符五鬼臨行運之方火星近刑厄之宫金星𨇠剋性之位忽成疾苦久未痊除伏恐災咎方深扣祈無所竊惟至真濟物大道好生廣開禳謝之門俯示感通之力是敢按遵科典䖍啓醮壇遍九曜以披心瞻列星而瀝懇伏冀天光下鑒聖造旁資解故傷誤殺之𡨚赦積世他生之罪銷平厄㑹清蕩災凶六氣宣通百痾痊復績將盡之福祿祚增延賜再生之恩算命遐益公私昭泰眷屬乂安仰望玄慈不任遂府相公周天醮詞伏以虛無大道孕育於群生天地萬神主張於庶品至于誕形禀氣垂象縱靈咸資鼓鑄之功率賴生成之力臣內惟涼德夙荷道慈勳勞未贊於聖朝寵遇巳隆於藩翰隼旟龍節疊奉殊榮相印兵符頻叨睿奬顧兹虛薄實切憂兢每慮賞罰不明刑章不當舉措有乖於理體綏和未叶於物情與修有土木之煩宴犒有烹燔之費故傷誤殺往債宿𡨚兼此罪尤成其譴貴或五行三命暗曜列星共結災纒遂為疾厄尚未痊復倍用驚危臣今年大運居衰氣之鄉小運在馬破之位木星退身宫之上土星照三合之方金水二星臨乖背之宿飛天火曜居本命之辰九宫土星復當生月覩此災運深切禱祈是敢按靈寶玄科河圖祕格設周天大醮懴謝上玄伏冀萬聖感通衆神昭鑒納其懇志介以福祥解宿債前𡨚赦深災重過續其祚祿增其壽年五星四景之中永銷危厄天府地司之內别注休禎所疾蠲平克賜安豫益堅忠孝上奉君親即仰荷衆尊祐護之恩不任親隨為大王修九曜醮詞臣聞垂象炳靈代天行化發揮道用昭著神功粵自剖判之初即顯司明之力生靈動植咸賴玄恩臣獲禀天慈深叨帝澤功業未酬於覆載寵榮已冠於人臣常慮無乖宜賞刑有失金科玉律或爽於哀矜伐叛誅凶或輕於鈇鑕前代之𡨚讎未解此生之過咎旋彰以此省循常懷震惕又臣今年大小一運俱值對衝首尾蝕神皆為臨照支干火木在衰氣之中天符飛行居驛馬之上併為災滯尤切憂惶近則微恙所嬰尚未痊復希恩謝過倍切禱祈輒因本命之辰䖍誠奏醮伏惟至聖俯鑒丹襟赦已往之罪瑕解將來之厄㑹增延算祿和釋𡨚疑得以罄竭微衷扶持大寶撫安疲俗匡讃中興誓傾修勵之心永答真靈之貺不任廣成集卷之八
