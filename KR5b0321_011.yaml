front:
  text: 廣成集卷之十一敢十一
  hash: sha256:df801b9781bd0abdb9bf8cf3e2867b3e901e66e08dad90ff243a1bdeda266b25
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0321_HFL_011-001a, image: hfl/0338/0338-116.png}
body:
  text: 上都太清官內供奉應制文章大德賜紫社光庭撰程德柔醮水府修堰詞伏聞大道垂功裁成品物真靈設位主宰群生至於水府明神山林正職各司罪福以庇蒸𥠖當縣地控上遊素名劇邑賦輿重大耕稼兹繁堤堰所防安危是繫某所修堰分當彼濬流自泛溢以來纍有摧壞雖俾夜作晝竭力焦心旋有葺完尋聞傾陷豈水脈所注不可備防豈龍神所為未容障塞憂惶迫切無所告祈且食乃民天人為邦本或虧秋稔必致年凶況天府膏腴勢連下瀨少城戶口旁接通波若為侵軼之災必有泥沙之變救兹墊溺須仗玄威伏惟大道開恩明神流鑒愍其農畝念彼生靈回不測之神功借無私之聖力特垂濟護俾獲安全使黍稷永豐京坻有望息襄陵懷山之禍叶年豐俗富之期蘋藻效誠敢負靈貺不任川主醮五符石文詞三寶開光五文孕化凝水火木金之氣成雲霞龍鳯之書保制乾坤鎮寧天地洎乎降傳下土濟護群生夏禹得之以成功仲尼奉之而興詠有家有國罔不遵修所以伏御神祇鎮安川嶽禳除氛沴清肅宫城至於居宅之興亦在鎮禳之例臣頃於所部特創新居既畢巨功爰申大醮按河圖品格依靈寶文儀篆刻真符清修香火所冀解銷犯觸安集正神召彼靈官永垂擁衛伏惟玄元鑒祐衆聖流慈勑勒職司錫其禎貺居止寧泰眷屬康安分近天皇大火之鄉況屬身宫或鄰對照捫心震惕循巳驚虞是用瞻本命福山仰列仙靈化歷三元而禱祝遍九曜以虔祈伏冀洞府神真披香奉御玄天尊聖垂澤降臨賜臣以景貺禎符解臣以災期厄會克承祐護允洽康寧上願皇業天齊聖圖嶽鎮伊川洛汭運叶中興八水三山俗諧昭泰戢鋒鋋於九野共文於萬方臣得勵忠貞永扶英睿不任蜀王為月虧身官於玉局化醮詞伏聞大道縱靈元和肇化燭三光而上列運六氣於中天播裁成字育之功物無不遂持寒暑暄涼之柄政無不均所以五星秉大帝之符司明罪福十神行太一之令統御吉凶律曆難欺古今所稟臣遭逢聖運塵忝殊榮山河控井絡之雄封壤握坤維之重常虞福過實懼災纒今則涼德靡修太穹垂戒月朔則太陽薄蝕當對照之方既望則太隂變虧在身宫之位飛天火曜臨於命辰干祿納音仍逢衰氣恐成災咎彌切憂惶是用遵按玄科勵精丹懇奉香羞於玉局陳醮禮於瑶壇仰三景以希恩普周天而禱福伏冀昭彰俯鑒肹蠁垂休錫禎貺於三命五行解災期於身宫分野至有故傷誤殺往債宿𡨚咸賜蠲除永俾貞吉上願皇圖攸久聖壽延長還秦符大漢之隆宅洛契宗周之盛干戈偃戢夷夏昭蘇得傾報國之心克叶自天之祐不任激切虔祈之至謹詞安宅醮詞伏聞道氣流布三才乃分隂陽陳變化之機水木肇相生之象巢穴之風既替宅宇之作遂興順二氣以營修體五行而制度實資神化大庇生靈臣以庸愚不明玄理因時攺作隨力興修土木之功曽無避忌穿鑿之處深有驚喧或抵犯王方或背違天道致使龍神未守居止非宜恐迫凶衰更延災厄謹歸心大道稽首三尊按靈寶明科修五帝大醮虔恭懴謝拜請符文懴巳往犯觸之非祈將來安寧之福伏冀二儀介瑞五帝垂祥凶惡蠲除龍神鎮守人口清泰動靜康寧營運興生常蒙利祐公私和暢眷屬乂安即永荷太上衆尊五帝祐護之恩不任八節醮詞伏以大道垂化元氣流形鼓鑄群生有清濁剛柔之異舒張八節定春秋冬夏之方所以考校吉凶司明罪福惠既周於家國恩亦普於存亡臣等獲值昌期早欽道化資神功而生育荷聖力以裁成竊慮處俗立身寧無過咎前生今世必有𠍴瑕或五行三命之中遭逢厄會或暗曜明星之下因值照臨以此兢憂輒思祈醮爰逢令節同竭丹誠是天元啓候之期當大聖延慈之日翹心靈化稽首瑶壇精潔香花虔恭醮祝伏冀髙尊鑒祐衆聖衰憐垂岡極之慈賜無疆之澤使積生罪惱纍世𡨚仇巳往𠎝非將來厄運乘八節自新之力降三宫肆赦之恩並賜蕩除永錫貞吉使臣等九玄七祖受福祉於南宫眷屬親緣落死名於北府公私和洽壽祿遐長即永荷衆聖祐護之恩不任都監將軍周天醮詞伏聞大道混融群材昭著隂陽升降吉凶之理肇分善惡循環罪福之文是啓玉虛大帝金闕元皇申命真靈俾其主宰三官五帝爰居勸沮之司南斗北元以統死生之録洪纎備舉億劫無差所以丹簡玄經有修禳之祕訣祈天悔過有懴滌之明科竊仰弘慈敢陳微願臣獲膺宿會運偶昌期猥以凡庸遭逢異寵伏念戴清履濁寓世立身事主奉親自家刑國雖忠貞勵節勤瘁在公而休祉難臻愆違易集況臣頃因扈衛時屬艱憂豺豕欺天氛霾蔽日層巖瑞氣但布護於帝車九陌妖塵正昏蒙於輦道乃忠義奮身之際是人臣效命之期得以手捧天樞身排鯨浪克寧皇極以罄丹心遂叨非次之恩遽荷重難之寄連營貔武千里隄封慙無監撫之能但切兢憂之懇竊恐臣前生今代歷劫以來未達正真動成罪目或上虧天理下犯地宜中忤人情旁違物性十纒外積三業內興或助順除姦誅邪佐命或故傷誤殺乘法持綱或星曜運行時逢臨照或三命經歷因值衰危八卦九宮有刑妨之數𡨚仇債訟有考對之文幽晦常情眇然難測唯資修奉上叩玄虛冀獲感通克承覆祐是用按河圖真格披正一靈科漙海嶽以貢誠遍乾坤而瀝懇恭陳醮禮以展肅虔伏惟三寶回光衆聖流鑒赦其宿過鍚以殊休罪簡蠲消生名列品和平𡨚債清蕩災凶九玄七祖同霑洪澤六姻九族咸沐玄慈俾川境安寧生靈輯睦俗無疵癘野有謳歌幽府𡨋司神輝朗徹飛行蠢類惠渥滋濡上願國步夷平聖躬和暢五兵韜偃萬宇乂康鑾旗早復於秦京象法重懸於魏闕瞻天望日言發心馳不任衆修本命醮詞伏聞大道垂光三靈資始人天設位萬化互分稟氣有清濁之殊賦運有吉凶之異昏明既判罪福亦彰於是太上弘慈元尊愍護南上闢延生之符北都陳銓善之科兩曜列星布無私而照燭三官五帝開大宥以君臨蓋欲使共洽無為俱臻清靜品登道果名列真階臣等叨沐神功𦍒逢昌運聞玄儒之妙旨履仁義之康衢坐挹堯樽行歌睿德揣躬省已榮抃伏深但慮往劫此生立身舉措動成違戾率忤幽明六情之愛染難祛三業之愆非易積文昌簡上未紀善名酆部宫中巳摽罪目又恐行年災咎宿曜加臨或土木興功犯干禁忌或故傷誤殺結聚𡨚尤遂使暗奪年齡潛消福祿非憑勝會難寫深誠今屬白露凝晨清秋屇節是懴罪祈真之日乃延恩致福之期輒率慕同誠歸依至道齎持法信稽首靈壇遍天府以披心望星宫而注想伏冀三元上聖十界衆尊南極威神北臺寮輔念其虔懇降以光靈流福祚於存亡息災凶於永遠使臣等九玄七祖咸得生天五族六親並蒙安泰罪瑕除蕩祿壽延長門宇清寧運求諧遂五行三命永無刑剋之災私室公庭長荷利貞之福不任張道衡還北斗願詞伏以玄象垂先物無不照帝車周運感無不通臣以幽微仰蒙鑒祐頃以大順二年身陷危厄性命是虞輒瀝丹心上祈玄造遂發誠願奉錢十萬貫文旋獲安寧克蒙清雪螻蟻之生巳保真靈之澤未酬尋以奔迫道途辛勤南北難逢良會莫報宿恩冰炭在懷寢食增懼今則歸心靈化稽首瑶壇虔備香燈精修醮酌自今年四月至今月五度奏錢滿十萬貫兼於玉局化北帝殿塑造北斗真君八身功德用申素懇上答玄恩伏惟聖慈曲賜昭納使誓圓昔日願滿茲辰宿罪蠲消餘災蕩滌𡨚仇和解年祿增延公私叶貞吉之期眷屬享乂寧之福存亡咸泰品彚沾恩不任行軍僕射醮宅詞伏聞大道融真天尊演教赤明御運靈寶開圖八會成文凝結太空之表五符流迹昭宣大有之中五帝受之以度人九天得之以定位降於下土護國濟人摧伏凶祅誅滅邪惡凡所興造皆許遵行臣頃以營繕所居土木將畢恐有干犯難備考詳竊按玄科請行符命修崇黃籙關奏清都刻五方太帝之文依三洞鎮禳之格下告五土上奏九微伏願衆聖垂慈萬靈孚祐勑命符吏頒示職司降以威靈布其真氣蕩除魔怪安靜龍神八卦九宫五行六甲隂陽刑殺太歲將軍各鎮方隅永祛災咎其有伏尸故氣金土邪精滯爽遊魂幽靈暗魄各乘善力俱遂逍遙克保安寧永臻福祐不任衆輔修三會醮詞伏聞人之稟生資於二氣隂陽定體魂魄守身稍或愆和即成災否三會之日是三魂攢奏之辰罪福吉凶纎毫無失增壽奪算賞罰甚明所宜積善除非立功輔過用祈吉應以保遐齡玄聖格言真經明訓敢不遵守以戒身心臣等數年以來於下會之日共申祈醮以罄焚修昨者迫以塵緣偶過佳節中心憂惕不敢遑安今則别選良辰旁招善友同營香火特展醮祈靜夜寒更𡨋心注念真靈必降誠願冀通伏惟萬聖回光千真鑒映餳其禱祝除彼災凶制魄拘魂各遂修生之望回凶變吉咸開遐永之程臣等或三命衰微九宫厄滯或星文臨照災運縈纒或宿債未平餘殃未息或故傷誤殺積過深瑕俱乞蕩除克賜昭祐合家蒙福九祖生天公私有通泰之祥眷屬荷乂安之澤不任皇帝設南斗醮詞伏以三光麗天照臨萬有衆星垂象統御群形南斗文昌實掌主籙為正陽煦物之本乃帝王壽命之司按天元上清等經若五月五日值丙午之辰則啓福延恩濟生利物和寧品類安鎮邦家陽德所資普亨其福今年以火水金土四星聚於實沈之墟又逢日度所經皆為順伏五月合朔太陽當蝕而不蝕洎乎既望太隂當虧而不虧斯乃五日得丙午之辰純陽所應顧惟寡昧欽荷玄功慙化理之未周念聲教之未普敢期流貺以及微躬所願大道延慈上天錫祐俾九州四海俗泰民康年豐而六氣均調候正而四時和暢韜弓偃革歸馬休牛咸臻保命之祥克廣好生之德冥心丹禁稽首玄壇曕八景以低臨冀九光之遐燭鑒兹醮酌介以禎休辰輝炳靈幽讃之功巳著人天交感協符之契可期佇混車書大同寰宇式虔祗荷上副玄慈不任皇帝周天醮詞臣聞風兩霜雪之不時則星辰示象蘋蘩藴藻之可薦乃天地垂休緬是前修實為通論臣恭臨大寶虔奉丕圖不敢遑寧若臨冰谷而頻移圭律七變槐檀慮兆庶未康恐一物失所或刑政乖謬或恩信未孚干戈猶駐於疆場正朔未同於夷夏水旱不節富庶莫臻昏墊札瘥繼聞於郡縣盜賊欺誑尚恣於鄉閭雖則務嗇勸分貶食省用不邇聲色永絶畋遊瓦器蚌盤敢忘於刻巳雉頭虎魄豈事於娛情猶慮上曹重書厥罪顓蒙有愧首謝無由近則金火二星水土兩曜併聚蜀分皆次實沈日月為薄蝕之期朔望却史臣之筆太陽順伏分野垂休豈此禎祥併歸沖渺益勵退修之志彌彰戒懼之心敢因午日之嘉辰聊答上玄之厚貺靈官渺紫府深嚴雖昭告之備申慮誠明之莫逹齋潔選日懇𢙫陳詞寂寂玄壇儼威儀泠乙夜飄飄仙賢降福祐於人寰伏冀八表乂安𥠖民清泰邦家鞏固社稷永寧六府孔修九功攸敘簮𥚑奉職書軌同文不任醮瀘州安樂山詞伏以楚蜀連封西南重地江馳萬泒嵐積千峯天帝以之會昌龍神以之固護惟兹奧壤獨擅雄名三層燭煙月之光八洞閟靈仙之宅常弘勝利以祐蒸人年無旱潦之傷俗保安貞之吉致泝沿之攸濟俾絲枲之蕃豐銜三觀威靈荷二真慈貺傳諸遠近載彼經圖翹首注心共歌玄澤臣名拘輦轂望切林泉每憐素豹玄猿帝戲芝巖桂岫延頸企踵迹滯神遊輒贄微香遙陳孤懇臣以所居北帝院齋醮所給鍾簴未周雖申降福之儀幾闕飛霜之韻始聞仙山之內法器且多既無考擊之期虛蔽鏘洋之美道隨誠感鍾固可移願減有餘資其不足輟於翠嶽遷就皇都清聲漸遠於彤雲洪響佇聞於紫禁願俞誠祝永鎮京華不任廣成集卷之十一
